<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube — Қазақстан видеохостингі</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #005c8a 0%, #003b5c 50%, #002238 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 59, 92, 0.9);
            backdrop-filter: blur(20px);
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 200;
            gap: 15px;
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #fff200);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo i { background: none; color: #ffd700; }
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        
        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 40px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .search-bar:focus-within { border-color: #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        .search-bar input {
            background: none;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            width: 240px;
            outline: none;
        }
        .search-bar input::placeholder { color: #aad5ff; }
        .search-bar button {
            background: none;
            border: none;
            color: #ffd700;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.2s;
        }
        .search-bar button:hover { transform: scale(1.1); }
        
        .lang-select {
            background: #004b75;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            outline: none;
        }
        
        button {
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #ffd700, #ffea00); color: #002238; box-shadow: 0 2px 10px rgba(255,215,0,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,215,0,0.5); }
        .btn-outline { background: rgba(255,255,255,0.05); border: 1px solid #ffd700; color: #ffd700; }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.15); }
        .btn-danger { background: #ff4444; color: white; }
        .btn-danger:hover { background: #cc0000; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            padding: 6px 18px 6px 8px;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .user-info:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); }
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #fff200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #002238;
        }
        .hidden { display: none !important; }
        
        .nav-links {
            display: flex;
            gap: 30px;
            padding: 0 24px;
            background: rgba(0, 34, 56, 0.5);
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }
        .nav-link {
            padding: 14px 0;
            cursor: pointer;
            font-weight: 600;
            color: #82c0e0;
            position: relative;
        }
        .nav-link.active { color: #ffd700; }
        .nav-link.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: #ffd700;
        }
        
        .home-container { max-width: 1600px; margin: 0 auto; padding: 25px; }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .video-card {
            cursor: pointer;
            background: rgba(0, 59, 92, 0.4);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,215,0,0.15);
            transition: all 0.3s;
        }
        .video-card:hover { transform: translateY(-5px); border-color: #ffd700; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #001a2b; position: relative; }
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; }
        .video-details { display: flex; gap: 12px; padding: 15px; }
        .video-channel-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ffea00);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #002238; flex-shrink: 0;
        }
        .video-channel-avatar:hover { transform: scale(1.05); }
        .video-meta { flex: 1; overflow: hidden; }
        .video-title { font-weight: 600; font-size: 15px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-name { font-size: 13px; color: #82c0e0; margin-bottom: 3px; }
        .channel-name:hover { color: #ffd700; }
        .video-stats { font-size: 12px; color: #6baecf; }
        
        .profile-container { max-width: 1200px; margin: 0 auto; padding: 25px; }
        .profile-header {
            display: flex; align-items: center; gap: 35px; padding: 35px;
            background: rgba(0, 59, 92, 0.5); border-radius: 24px;
            margin-bottom: 35px; border: 1px solid rgba(255,215,0,0.25);
        }
        .profile-big-avatar {
            width: 110px; height: 110px; border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ffea00);
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; font-weight: bold; color: #002238;
        }
        .profile-stats { display: flex; gap: 40px; margin-top: 15px; }
        .profile-stat-value { font-size: 24px; font-weight: 700; color: #ffd700; }
        .profile-stat-label { font-size: 13px; color: #82c0e0; }
        
        .watch-container { display: flex; max-width: 1500px; margin: 0 auto; padding: 25px; gap: 30px; }
        .video-section { flex: 2.5; }
        .video-wrapper { width: 100%; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,215,0,0.2); }
        .main-video-player { width: 100%; display: block; aspect-ratio: 16/9; background: #000; }
        
        .video-info-section { margin-top: 20px; background: rgba(0, 59, 92, 0.3); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,215,0,0.1); }
        .watch-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .watch-stats { font-size: 14px; color: #82c0e0; margin-bottom: 20px; }
        
        .channel-info {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .channel-left { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .channel-avatar-big { width: 48px; height: 48px; border-radius: 50%; background: #ffd700; color: #002238; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        
        .action-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .action-btn {
            background: rgba(255,255,255,0.07); padding: 10px 20px; border-radius: 40px;
            font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            border: 1px solid rgba(255,215,0,0.2); transition: all 0.2s;
            user-select: none;
        }
        .action-btn:hover { background: rgba(255,215,0,0.15); border-color: #ffd700; }
        .action-btn.active-like { background: #ffd700; color: #002238; border-color: #ffd700; font-weight: 700; }
        .action-btn.active-dislike { background: #ff4444; color: white; border-color: #ff4444; font-weight: 700; }
        
        .comments-section { margin-top: 30px; background: rgba(0, 34, 56, 0.4); padding: 25px; border-radius: 16px; border: 1px solid rgba(255,215,0,0.15); }
        .comment-input-area { display: flex; gap: 15px; margin-top: 20px; margin-bottom: 25px; }
        .comment-input {
            flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px; padding: 12px; color: white; font-family: inherit; resize: none; outline: none;
        }
        .comment-input:focus { border-color: #ffd700; }
        
        .comments-list { display: flex; flex-direction: column; gap: 15px; }
        .comment-item { display: flex; gap: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .comment-author { font-weight: 700; color: #ffd700; margin-bottom: 5px; font-size: 14px; }
        
        .recommendations-section { flex: 1; }
        .recommendation-card { display: flex; gap: 12px; margin-bottom: 15px; cursor: pointer; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 12px; }
        .recommendation-card:hover { background: rgba(255,215,0,0.1); }
        .rec-thumb { width: 140px; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
        .rec-thumb video { width: 100%; height: 100%; object-fit: cover; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 22, 38, 0.9); backdrop-filter: blur(10px); z-index: 300;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #003b5c; padding: 35px; border-radius: 24px; width: 90%; max-width: 450px;
            border: 2px solid #ffd700; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-content h2 { margin-bottom: 20px; color: #ffd700; }
        .modal-content input, .modal-content textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3); background: #002238; color: white; font-family: inherit; outline: none;
        }
        .modal-content input:focus { border-color: #ffd700; }
        
        .custom-toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ffd700; color: #002238; padding: 14px 30px; border-radius: 50px;
            font-weight: 700; z-index: 500; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .footer { text-align: center; padding: 30px; color: #82c0e0; border-top: 1px solid rgba(255,215,0,0.1); margin-top: 50px; font-size: 14px; }
        @media (max-width: 900px) {
            .watch-container { flex-direction: column; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-stats { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="showHome()"><i class="fab fa-youtube"></i> QazaqTube</div>
    <div class="controls">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Іздеу...">
            <button onclick="searchVideos()"><i class="fas fa-search"></i></button>
        </div>
        <select id="langSelect" class="lang-select">
            <option value="kk">🇰🇿 Қазақша</option>
            <option value="ru">🇷🇺 Русский</option>
        </select>
        <div id="unauthButtons">
            <button class="btn-outline" onclick="openModal('login')">Кіру</button>
            <button class="btn-primary" onclick="openModal('register')">Тіркелу</button>
        </div>
        <div id="authButtons" class="hidden">
            <div class="user-info" onclick="showMyProfile()">
                <span id="userNameSpan"></span>
                <div class="avatar" id="avatarSpan"></div>
            </div>
            <button class="btn-danger" onclick="logout()" style="padding: 6px 14px; font-size: 11px; margin-left: 5px;">Шығу</button>
        </div>
    </div>
</div>

<div class="nav-links" id="navLinks" style="display: none;">
    <div class="nav-link active" id="navHomeLink" onclick="showHome()">🏠 Басты</div>
    <div class="nav-link" id="navProfileLink" onclick="showMyProfile()">👤 Менің каналым</div>
</div>

<div id="homePage" class="home-container">
    <div class="videos-grid" id="homeVideosGrid"></div>
</div>

<div id="profilePage" class="profile-container" style="display: none;">
    <div class="profile-header">
        <div class="profile-big-avatar" id="profileBigAvatar"></div>
        <div>
            <h2 id="profileName"></h2>
            <p style="color:#82c0e0; margin-top: 5px;">@<span id="profileLoginName"></span></p>
            <div class="profile-stats">
                <div class="profile-stat"><div class="profile-stat-value" id="profileSubsCount">0</div><div class="profile-stat-label" id="lblSubs">жазылушы</div></div>
                <div class="profile-stat"><div class="profile-stat-value" id="profileVideosCount">0</div><div class="profile-stat-label" id="lblVids">видео</div></div>
                <div class="profile-stat"><div class="profile-stat-value" id="profileLikesCount">0</div><div class="profile-stat-label" id="lblLikes">лайк</div></div>
            </div>
            <button class="btn-primary" id="uploadBtn" onclick="openUploadModal()" style="margin-top: 20px;"><i class="fas fa-upload"></i> Видео жүктеу</button>
            <button class="btn-primary" id="subChannelBtn" onclick="toggleSubscribeFromProfile()" style="margin-top: 20px; display:none;">Жазылу</button>
        </div>
    </div>
    <h3 style="margin-bottom: 25px; color:#ffd700;" id="myVideosTitle">📹 Видеолар</h3>
    <div class="videos-grid" id="profileVideosGrid"></div>
</div>

<div id="watchPage" class="watch-container" style="display: none;">
    <div class="video-section">
        <div class="video-wrapper">
            <video id="mainVideo" class="main-video-player" controls autoplay></video>
        </div>
        
        <div class="video-info-section" id="watchInfoSection"></div>
        
        <div class="comments-section">
            <h3 id="commentsTitle">Комментарийлер (0)</h3>
            <div class="comment-input-area">
                <textarea id="commentInput" class="comment-input" rows="2" placeholder="Пікір қалдырыңыз..."></textarea>
                <button class="btn-primary" onclick="postComment()" id="commentBtn">Жіберу</button>
            </div>
            <div class="comments-list" id="commentsList"></div>
        </div>
    </div>
    
    <div class="recommendations-section">
        <h3 style="color:#ffd700; margin-bottom: 15px;" id="recTitle">🎬 Ұсыныстар</h3>
        <div id="recommendationsList"></div>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>📤 Видео жүктеу</h2>
        <input type="text" id="uploadTitle" placeholder="Бейне атауы *">
        <textarea id="uploadDesc" placeholder="Сипаттама" rows="3"></textarea>
        <input type="file" id="uploadFile" accept="video/mp4,video/webm,video/mkv">
        <button class="btn-primary" onclick="confirmUpload()" style="width:100%;">✅ Жүктеу</button>
        <button class="btn-outline" onclick="closeModal('upload')" style="width:100%; margin-top: 10px;">Жабу</button>
    </div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2>📝 Тіркелу</h2>
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPass" placeholder="Пароль">
        <button class="btn-primary" onclick="completeRegistration()" style="width:100%">✅ Тіркелу</button>
        <button class="btn-outline" onclick="closeModal('register')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Кіру</h2>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button class="btn-primary" onclick="login()" style="width:100%">Кіру</button>
        <button class="btn-outline" onclick="closeModal('login')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="customToast" class="custom-toast"></div>

<script>
    let currentLang = 'kk';
    let users = [];
    let videos = [];
    let likes = {};     
    let dislikes = {};  
    let subs = {};      
    let comments = {};  
    let currentUser = null;
    let currentPage = 'home';
    let currentVideoId = null;
    let viewProfileChannelId = null; // Для просмотра чужих профилей

    const translations = {
        kk: {
            search: "Іздеу...", noResults: "Ештеңе табылмады", views: "көрсетілім",
            subs: "жазылушы", vids: "видео", likes: "лайк", myVids: "📹 Видеолар",
            rec: "🎬 Ұсыныстар", comms: "Комментарийлер", send: "Жіберу", place: "Пікір қалдырыңыз...",
            needLog: "Алдымен жүйеге кіріңіз!", fill: "Барлық өрістерді толтырыңыз!",
            succLog: "Қош келдіңіз!", wrong: "Қате логин немесе пароль!",
            succReg: "Тіркелу сәтті өтті!", titleErr: "Атауын енгізіңіз!", fileErr: "Файлды таңдаңыз!",
            mainNav: "🏠 Басты", channelNav: "👤 Менің каналым"
        },
        ru: {
            search: "Поиск...", noResults: "Ничего не найдено", views: "просмотров",
            subs: "подписчиков", vids: "видео", likes: "лайков", myVids: "📹 Видео",
            rec: "🎬 Рекомендации", comms: "Комментарии", send: "Отправить", place: "Оставьте комментарий...",
            needLog: "Сначала войдите в аккаунт!", fill: "Заполните все поля!",
            succLog: "Добро пожаловать!", wrong: "Неверный логин или пароль!",
            succReg: "Регистрация успешна!", titleErr: "Введите название!", fileErr: "Выберите файл!",
            mainNav: "🏠 Главная", channelNav: "👤 Мой канал"
        }
    };

    // СТАРТОВЫЕ ВИДЕО ДЛЯ СИМУЛЯЦИИ ЖИВОГО САЙТА
    const defaultVideos = [
        {
            id: 'v_default_1', title: 'Қазақстанның ғажайып табиғаты 4K', desc: 'Шарын шатқалы мен Көлсай көлдерінің әдемі көріністері.',
            authorId: 'u_default_kaz', authorName: 'KazakhTravel', views: 1420,
            src: 'https://assets.mixkit.co/videos/preview/mixkit-beautiful-aerial-view-of-a-mountain-valley-41634-large.mp4'
        },
        {
            id: 'v_default_2', title: 'Космическое путешествие — Трейлер', desc: 'Фантастический ролик про полет к далеким звездам.',
            authorId: 'u_default_space', authorName: 'SpaceX_Fan', views: 985,
            src: 'https://assets.mixkit.co/videos/preview/mixkit-tunnel-of-futuristic-blue-lights-42330-large.mp4'
        },
        {
            id: 'v_default_3', title: 'Жаңа Жыл 2026 Алматы', desc: 'Алматы қаласындағы мерекелік отшашулар хроникасы.',
            authorId: 'u_default_almaty', authorName: 'AlmatyLife', views: 2450,
            src: 'https://assets.mixkit.co/videos/preview/mixkit-fireworks-illuminating-the-night-sky-41582-large.mp4'
        }
    ];

    function showToast(msg) {
        const toast = document.getElementById('customToast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    function initDefaultData() {
        // Заполнение лайков для стартовых видео
        defaultVideos.forEach(v => {
            if (!likes[v.id]) likes[v.id] = ['u_sim_1', 'u_sim_2', 'u_sim_3'];
            if (!dislikes[v.id]) dislikes[v.id] = [];
            if (!comments[v.id]) comments[v.id] = [
                { name: 'Алихан', text: 'Керемет бейнебаян! Маған қатты ұнады.', date: '10.05.2026' },
                { name: 'Elena_K', text: 'Очень красивое качество съемки, автору лайк!', date: '11.06.2026' }
            ];
            if (!subs[v.authorId]) subs[v.authorId] = ['u_sim_1', 'u_sim_2', 'u_sim_3', 'u_sim_4'];
        });
    }

    function loadData() {
        try {
            const data = localStorage.getItem('qaztube_master_storage');
            if (data) {
                const parsed = JSON.parse(data);
                users = parsed.users || [];
                videos = parsed.videos || [];
                likes = parsed.likes || {};
                dislikes = parsed.dislikes || {};
                subs = parsed.subs || {};
                comments = parsed.comments || {};
            }
            
            // Если видео в базе вообще нет, загружаем стартовые видео
            if (videos.length === 0) {
                videos = [...defaultVideos];
            }
            initDefaultData();

            const cur = localStorage.getItem('qaztube_current_user');
            if (cur) currentUser = JSON.parse(cur);
        } catch(e) { console.error("Data load error", e); }
    }

    function saveData() {
        const data = { users, videos, likes, dislikes, subs, comments };
        localStorage.setItem('qaztube_master_storage', JSON.stringify(data));
        if (currentUser) localStorage.setItem('qaztube_current_user', JSON.stringify(currentUser));
        else localStorage.removeItem('qaztube_current_user');
    }

    function updateLanguage() {
        currentLang = document.getElementById('langSelect').value;
        const t = translations[currentLang];
        
        document.getElementById('searchInput').placeholder = t.search;
        document.getElementById('navHomeLink').innerText = t.mainNav;
        document.getElementById('navProfileLink').innerText = t.channelNav;
        document.getElementById('lblSubs').innerText = t.subs;
        document.getElementById('lblVids').innerText = t.vids;
        document.getElementById('lblLikes').innerText = t.likes;
        document.getElementById('myVideosTitle').innerText = t.myVids;
        document.getElementById('recTitle').innerText = t.rec;
        document.getElementById('commentBtn').innerText = t.send;
        document.getElementById('commentInput').placeholder = t.place;
        
        if (currentPage === 'home') renderHomePage();
        if (currentPage === 'profile') openChannelProfile(viewProfileChannelId);
        if (currentPage === 'watch' && currentVideoId) renderWatchPage();
    }

    function updateUI() {
        if (currentUser) {
            document.getElementById('unauthButtons').classList.add('hidden');
            document.getElementById('authButtons').classList.remove('hidden');
            document.getElementById('navLinks').style.display = 'flex';
            document.getElementById('userNameSpan').innerText = currentUser.login;
            document.getElementById('avatarSpan').innerText = currentUser.login[0].toUpperCase();
        } else {
            document.getElementById('unauthButtons').classList.remove('hidden');
            document.getElementById('authButtons').classList.add('hidden');
            document.getElementById('navLinks').style.display = 'none';
        }
    }

    function completeRegistration() {
        const login = document.getElementById('regLogin').value.trim();
        const pass = document.getElementById('regPass').value;
        const t = translations[currentLang];
        if(!login || !pass) { showToast(t.fill); return; }
        if(users.find(u => u.login.toLowerCase() === login.toLowerCase())) { showToast("Логин бос емес! / Логин занят!"); return; }
        
        const newUser = { id: 'u_' + Date.now(), login: login, password: pass };
        users.push(newUser);
        currentUser = newUser;
        if (!subs[newUser.id]) subs[newUser.id] = [];
        saveData();
        updateUI();
        closeModal('register');
        showToast(t.succReg);
        showHome();
    }

    function login() {
        const login = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('loginPass').value;
        const t = translations[currentLang];
        
        const user = users.find(u => u.login.toLowerCase() === login.toLowerCase() && u.password === pass);
        if(!user) { showToast(t.wrong); return; }
        
        currentUser = user;
        saveData();
        updateUI();
        closeModal('login');
        showToast(t.succLog);
        showHome();
    }

    function logout() {
        currentUser = null;
        saveData();
        updateUI();
        showHome();
    }

    // ПОИСКОВИК
    function searchVideos() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        renderHomePage(query);
    }

    function renderHomePage(query = '') {
        currentPage = 'home';
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('profilePage').style.display = 'none';
        document.getElementById('watchPage').style.display = 'none';
        
        document.getElementById('navHomeLink').classList.add('active');
        document.getElementById('navProfileLink').classList.remove('active');

        const grid = document.getElementById('homeVideosGrid');
        const t = translations[currentLang];
        
        let filtered = [...videos];
        if (query) {
            filtered = videos.filter(v => v.title.toLowerCase().includes(query) || v.authorName.toLowerCase().includes(query));
        }

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;">${t.noResults}</div>`;
            return;
        }

        grid.innerHTML = filtered.map(v => {
            if (!likes[v.id]) likes[v.id] = [];
            return `
                <div class="video-card">
                    <div class="thumbnail" onclick="openWatchPage('${v.id}')"><video src="${v.src}"></video></div>
                    <div class="video-details">
                        <div class="video-channel-avatar" onclick="openChannelProfile('${v.authorId}')">${v.authorName[0].toUpperCase()}</div>
                        <div class="video-meta">
                            <div class="video-title" onclick="openWatchPage('${v.id}')">${escapeHtml(v.title)}</div>
                            <div class="channel-name" onclick="openChannelProfile('${v.authorId}')">${escapeHtml(v.authorName)}</div>
                            <div class="video-stats">${v.views || 0} ${t.views} • ❤️ ${likes[v.id].length}</div>
                        </div>
                    </div>
                </div>
            `;
        }).reverse().join(''); // Свежие сверху
    }

    // ПРОФИЛИ КАНАЛОВ (СВОЙ И ЧУЖОЙ)
    function showMyProfile() {
        if(!currentUser) { showToast(translations[currentLang].needLog); return; }
        openChannelProfile(currentUser.id);
    }

    function openChannelProfile(authorId) {
        if (!authorId) return;
        viewProfileChannelId = authorId;
        currentPage = 'profile';
        
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('watchPage').style.display = 'none';
        document.getElementById('profilePage').style.display = 'block';
        
        document.getElementById('navHomeLink').classList.remove('active');
        if(currentUser && authorId === currentUser.id) {
            document.getElementById('navProfileLink').classList.add('active');
            document.getElementById('uploadBtn').style.display = 'inline-block';
            document.getElementById('subChannelBtn').style.display = 'none';
        } else {
            document.getElementById('navProfileLink').classList.remove('active');
            document.getElementById('uploadBtn').style.display = 'none';
            document.getElementById('subChannelBtn').style.display = 'inline-block';
        }

        // Находим имя автора
        let authorName = "Колданұшы";
        if (currentUser && authorId === currentUser.id) {
            authorName = currentUser.login;
        } else {
            const v = videos.find(vid => vid.authorId === authorId);
            if (v) authorName = v.authorName;
            else {
                const u = users.find(usr => usr.id === authorId);
                if (u) authorName = u.login;
            }
        }

        document.getElementById('profileBigAvatar').innerText = authorName[0].toUpperCase();
        document.getElementById('profileName').innerText = authorName;
        document.getElementById('profileLoginName').innerText = authorName.toLowerCase();

        // Статистика канала
        const chVids = videos.filter(v => v.authorId === authorId);
        document.getElementById('profileVideosCount').innerText = chVids.length;
        
        let totalLikes = 0;
        chVids.forEach(v => { if(likes[v.id]) totalLikes += likes[v.id].length; });
        document.getElementById('profileLikesCount').innerText = totalLikes;

        if (!subs[authorId]) subs[authorId] = [];
        document.getElementById('profileSubsCount').innerText = subs[authorId].length;

        // Кнопка подписки на странице профиля
        if (currentUser && authorId !== currentUser.id) {
            const isSubbed = subs[authorId].includes(currentUser.id);
            document.getElementById('subChannelBtn').innerText = isSubbed ? 'Жазылдыңыз ✓' : 'Жазылу';
        }

        const grid = document.getElementById('profileVideosGrid');
        const t = translations[currentLang];

        if(chVids.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;color:#82c0e0;padding:20px;">Видео әлі жоқ / Видео еще нет.</div>`;
            return;
        }

        grid.innerHTML = chVids.map(v => `
            <div class="video-card" onclick="openWatchPage('${v.id}')">
                <div class="thumbnail"><video src="${v.src}"></video></div>
                <div class="video-details">
                    <div class="video-channel-avatar">${v.authorName[0].toUpperCase()}</div>
                    <div class="video-meta">
                        <div class="video-title">${escapeHtml(v.title)}</div>
                        <div class="video-stats">${v.views || 0} ${t.views}</div>
                    </div>
                </div>
            </div>
        `).reverse().join('');
    }

    function toggleSubscribeFromProfile() {
        toggleSubscribe(viewProfileChannelId);
        openChannelProfile(viewProfileChannelId);
    }

    function openUploadModal() {
        if(!currentUser) { showToast(translations[currentLang].needLog); return; }
        openModal('upload');
    }

    function confirmUpload() {
        const title = document.getElementById('uploadTitle').value.trim();
        const file = document.getElementById('uploadFile').files[0];
        const desc = document.getElementById('uploadDesc').value.trim();
        const t = translations[currentLang];

        if(!title) { showToast(t.titleErr); return; }
        if(!file) { showToast(t.fileErr); return; }

        showToast("Бейнебаян өңделуде... Күте тұрыңыз / Видео обрабатывается...");

        const reader = new FileReader();
        reader.onload = function(e) {
            const newVideo = {
                id: 'v_' + Date.now(),
                title: title,
                desc: desc,
                authorId: currentUser.id,
                authorName: currentUser.login,
                views: 0,
                src: e.target.result
            };
            
            videos.push(newVideo);
            likes[newVideo.id] = [];
            dislikes[newVideo.id] = [];
            comments[newVideo.id] = [];
            
            saveData();
            closeModal('upload');
            
            document.getElementById('uploadTitle').value = '';
            document.getElementById('uploadDesc').value = '';
            document.getElementById('uploadFile').value = '';

            showToast("Жүктелді! / Успешно загружено!");
            openChannelProfile(currentUser.id);
        };
        reader.readAsDataURL(file);
    }

    // СТРАНИЦА ПРОСМОТРА
    function openWatchPage(id) {
        currentVideoId = id;
        currentPage = 'watch';
        
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('profilePage').style.display = 'none';
        document.getElementById('watchPage').style.display = 'flex';

        const video = videos.find(v => v.id === id);
        if(video) {
            video.views = (video.views || 0) + 1; // Увеличиваем просмотры
            saveData();
        }
        renderWatchPage();
    }

    function renderWatchPage() {
        const video = videos.find(v => v.id === currentVideoId);
        if(!video) return;

        const t = translations[currentLang];
        const mainVideo = document.getElementById('mainVideo');
        if(mainVideo.src !== video.src) {
            mainVideo.src = video.src;
            mainVideo.load();
        }

        if (!likes[video.id]) likes[video.id] = [];
        if (!dislikes[video.id]) dislikes[video.id] = [];
        if (!subs[video.authorId]) subs[video.authorId] = [];

        const isLiked = currentUser && likes[video.id].includes(currentUser.id);
        const isDisliked = currentUser && dislikes[video.id].includes(currentUser.id);
        const isSubbed = currentUser && subs[video.authorId].includes(currentUser.id);

        document.getElementById('watchInfoSection').innerHTML = `
            <div class="watch-title">${escapeHtml(video.title)}</div>
            <div class="watch-stats">${video.views} ${t.views}</div>
            <div class="channel-info">
                <div class="channel-left" onclick="openChannelProfile('${video.authorId}')">
                    <div class="channel-avatar-big">${video.authorName[0].toUpperCase()}</div>
                    <div>
                        <div style="font-weight:700;">${escapeHtml(video.authorName)}</div>
                        <div style="font-size:12px; color:#82c0e0;">${subs[video.authorId].length} ${t.subs}</div>
                    </div>
                </div>
                <button class="btn-primary" onclick="toggleSubscribe('${video.authorId}')">
                    ${isSubbed ? 'Жазылдыңыз ✓' : 'Жазылу'}
                </button>
            </div>
            <p style="margin-top:15px; font-size:14px; color:#aad5ff; white-space: pre-wrap;">${escapeHtml(video.desc || '')}</p>
            <div class="action-buttons">
                <div class="action-btn ${isLiked ? 'active-like' : ''}" onclick="handleReaction('like')">
                    <i class="fas fa-thumbs-up"></i> <span>${likes[video.id].length}</span>
                </div>
                <div class="action-btn ${isDisliked ? 'active-dislike' : ''}" onclick="handleReaction('dislike')">
                    <i class="fas fa-thumbs-down"></i> <span>${dislikes[video.id].length}</span>
                </div>
            </div>
        `;

        renderComments();
        renderRecommendations();
    }

    // ОДНОВРЕМЕННЫЕ ЛАЙКИ И ДИЗЛАЙКИ
    function handleReaction(type) {
        if(!currentUser) { showToast(translations[currentLang].needLog); return; }
        
        if (!likes[currentVideoId]) likes[currentVideoId] = [];
        if (!dislikes[currentVideoId]) dislikes[currentVideoId] = [];

        let vLikes = likes[currentVideoId];
        let vDislikes = dislikes[currentVideoId];

        if (type === 'like') {
            if (vLikes.includes(currentUser.id)) {
                // Если уже лайкнуто — снимаем лайк
                likes[currentVideoId] = vLikes.filter(id => id !== currentUser.id);
            } else {
                // Добавляем лайк, убираем дизлайк
                vLikes.push(currentUser.id);
                likes[currentVideoId] = vLikes;
                dislikes[currentVideoId] = vDislikes.filter(id => id !== currentUser.id);
            }
        } else {
            if (vDislikes.includes(currentUser.id)) {
                // Если уже дизлайкнуто — снимаем дизлайк
                dislikes[currentVideoId] = vDislikes.filter(id => id !== currentUser.id);
            } else {
                // Добавляем дизлайк, убираем лайк
                vDislikes.push(currentUser.id);
                dislikes[currentVideoId] = vDislikes;
                likes[currentVideoId] = vLikes.filter(id => id !== currentUser.id);
            }
        }

        saveData();
        renderWatchPage();
    }

    // ПОДПИСКИ
    function toggleSubscribe(authorId) {
        if(!currentUser) { showToast(translations[currentLang].needLog); return; }
        if(currentUser.id === authorId) { showToast("Өзіңізге жазыла алмайсыз! / На себя нельзя подписываться!"); return; }

        if (!subs[authorId]) subs[authorId] = [];
        
        if (subs[authorId].includes(currentUser.id)) {
            subs[authorId] = subs[authorId].filter(id => id !== currentUser.id);
        } else {
            subs[authorId].push(currentUser.id);
        }

        saveData();
        renderWatchPage();
    }

    // КОММЕНТАРИИ
    function renderComments() {
        if (!comments[currentVideoId]) comments[currentVideoId] = [];
        const vComments = comments[currentVideoId];
        document.getElementById('commentsTitle').innerText = `${translations[currentLang].comms} (${vComments.length})`;
        
        const list = document.getElementById('commentsList');
        if (vComments.length === 0) {
            list.innerHTML = `<div style="color:#82c0e0; font-size:14px; padding:10px 0;">Пікірлер жоқ. Бірінші болыңыз!</div>`;
            return;
        }

        list.innerHTML = vComments.map(c => `
            <div class="comment-item">
                <div class="video-channel-avatar" style="width:30px; height:30px; font-size:12px;">${c.name[0].toUpperCase()}</div>
                <div>
                    <div class="comment-author">${escapeHtml(c.name)} <span style="font-size:10px; color:#82c0e0; margin-left:10px;">${c.date}</span></div>
                    <div style="font-size:14px;">${escapeHtml(c.text)}</div>
                </div>
            </div>
        `).join('');
    }

    function postComment() {
        if(!currentUser) { showToast(translations[currentLang].needLog); return; }
        const text = document.getElementById('commentInput').value.trim();
        if(!text) return;

        if(!comments[currentVideoId]) comments[currentVideoId] = [];
        
        comments[currentVideoId].push({
            name: currentUser.login,
            text: text,
            date: new Date().toLocaleDateString()
        });

        saveData();
        document.getElementById('commentInput').value = '';
        renderComments();
    }

    function renderRecommendations() {
        const list = document.getElementById('recommendationsList');
        const listVids = videos.filter(v => v.id !== currentVideoId).slice(-6);
        const t = translations[currentLang];

        if(listVids.length === 0) {
            list.innerHTML = `<div style="color:#82c0e0; font-size:13px;">Видеолар жоқ</div>`;
            return;
        }

        list.innerHTML = listVids.map(v => `
            <div class="recommendation-card" onclick="openWatchPage('${v.id}')">
                <div class="rec-thumb"><video src="${v.src}"></video></div>
                <div>
                    <div style="font-size:13px; font-weight:600; line-height:1.3; max-height:2.6em; overflow:hidden;">${escapeHtml(v.title)}</div>
                    <div style="font-size:11px; color:#82c0e0; margin-top:4px;">${escapeHtml(v.authorName)}</div>
                    <div style="font-size:10px; color:#6baecf;">${v.views || 0} ${t.views}</div>
                </div>
            </div>
        `).join('');
    }

    function showHome() {
        document.getElementById('searchInput').value = '';
        renderHomePage();
    }
    function openModal(type) { document.getElementById(type + 'Modal').style.display = 'flex'; }
    function closeModal(type) { document.getElementById(type + 'Modal').style.display = 'none'; }
    function escapeHtml(str) { return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ''; }

    window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
    document.getElementById('langSelect').onchange = updateLanguage;

    loadData();
    updateUI();
    updateLanguage();
</script>

<div class="footer">
    QazaqTube — Қазақстан видеохостингі | 2026
</div>
</body>
</html>
