<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a2463;
            color: white;
        }
        .header {
            background: #030c1f;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f5b042;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #f5b042;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-primary {
            background: #f5b042;
            color: #0a2463;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #f5b042;
            color: #f5b042;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(245,176,66,0.2);
            padding: 5px 15px;
            border-radius: 40px;
        }
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f5b042;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a2463;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .upload-area {
            background: #0a1b44;
            border: 1px solid #f5b042;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .upload-area input, .upload-area textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #f5b042;
            background: #061b44;
            color: white;
        }
        .upload-area input[type="file"] {
            background: #061b44;
        }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-card {
            background: rgba(6, 28, 78, 0.8);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(245,176,66,0.3);
        }
        .video-card:hover {
            transform: translateY(-3px);
            border-color: #f5b042;
        }
        .video-thumb {
            width: 100%;
            height: 160px;
            background: #071c47;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-info {
            padding: 12px;
        }
        .video-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .video-stats {
            font-size: 12px;
            color: #bbd4ff;
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .video-actions {
            display: flex;
            gap: 10px;
        }
        .video-actions button {
            padding: 5px 12px;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0a1b44;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #f5b042;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #f5b042;
            background: #061b44;
            color: white;
        }
        .modal-content h2 {
            margin-bottom: 15px;
            color: #f5b042;
        }
        .video-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .video-player video {
            max-width: 90%;
            max-height: 80%;
        }
        .close-video {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: #f5b042;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5b042;
            color: #0a2463;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 300;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #f5b042aa;
            border-top: 1px solid #f5b04233;
            margin-top: 30px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🎬 QAZAQ TUBE</div>
    <div class="controls">
        <select id="langSelect" style="background:#0f2b6e; color:#f5b042; border:1px solid #f5b042; border-radius:20px; padding:5px 10px;">
            <option value="kk">Қазақша</option>
            <option value="ru">Русский</option>
        </select>
        <div id="unauthButtons">
            <button class="btn-outline" onclick="openModal('login')" id="loginBtn">Кіру</button>
            <button class="btn-primary" onclick="openModal('register')" id="registerBtn">Тіркелу</button>
        </div>
        <div id="authButtons" class="hidden">
            <div class="user-info">
                <span id="userNameSpan"></span>
                <div class="avatar" id="avatarSpan"></div>
                <button class="btn-outline" onclick="openSettings()" id="settingsBtn">⚙️</button>
                <button class="btn-outline" onclick="logout()" id="logoutBtn">Шығу</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="uploadSection" class="upload-area hidden">
        <h4 id="uploadTitle">📤 Жаңа бейне жүктеу</h4>
        <input type="text" id="videoTitle" placeholder="Бейне атауы">
        <textarea id="videoDesc" placeholder="Сипаттама" rows="2"></textarea>
        <input type="file" id="videoFile" accept="video/mp4,video/webm">
        <button class="btn-primary" onclick="uploadVideo()" id="uploadBtn">➕ Жүктеу</button>
    </div>
    <div id="videosContainer"></div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2 id="regTitle">📝 Тіркелу</h2>
        <input type="email" id="regEmail" placeholder="Email">
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPass" placeholder="Құпия сөз">
        <button class="btn-primary" onclick="register()" id="regSubmitBtn" style="width:100%">Тіркелу</button>
        <button class="btn-outline" onclick="closeModal('register')" id="regCloseBtn" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 id="loginTitle">🔐 Кіру</h2>
        <input type="text" id="loginInput" placeholder="Логин немесе Email">
        <input type="password" id="loginPass" placeholder="Құпия сөз">
        <button class="btn-primary" onclick="login()" id="loginSubmitBtn" style="width:100%">Кіру</button>
        <button class="btn-outline" onclick="closeModal('login')" id="loginCloseBtn" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2 id="settingsTitle">⚙️ Профиль</h2>
        <div id="settingsAvatar" style="width:80px;height:80px;border-radius:50%;background:#f5b042;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:bold;"></div>
        <input type="text" id="settingsName" placeholder="Жаңа есім">
        <input type="text" id="settingsAvatarUrl" placeholder="Аватарка URL">
        <button class="btn-primary" onclick="saveSettings()" id="settingsSaveBtn" style="width:100%">Сақтау</button>
        <button class="btn-outline" onclick="closeModal('settings')" id="settingsCloseBtn" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="videoPlayer" class="video-player">
    <div class="close-video" onclick="closePlayer()">✕</div>
    <video id="playerVideo" controls></video>
</div>

<script>
    // ============ ПЕРЕВОД ============
    const translations = {
        kk: {
            login: "Кіру",
            register: "Тіркелу",
            settings: "⚙️",
            logout: "Шығу",
            uploadTitle: "📤 Жаңа бейне жүктеу",
            uploadBtn: "➕ Жүктеу",
            videoTitlePlaceholder: "Бейне атауы",
            videoDescPlaceholder: "Сипаттама",
            regTitle: "📝 Тіркелу",
            regEmailPlaceholder: "Email",
            regLoginPlaceholder: "Логин",
            regPassPlaceholder: "Құпия сөз",
            regSubmit: "Тіркелу",
            regClose: "Жабу",
            loginTitle: "🔐 Кіру",
            loginInputPlaceholder: "Логин немесе Email",
            loginPassPlaceholder: "Құпия сөз",
            loginSubmit: "Кіру",
            loginClose: "Жабу",
            settingsTitle: "⚙️ Профиль",
            settingsNamePlaceholder: "Жаңа есім",
            settingsAvatarPlaceholder: "Аватарка URL",
            settingsSave: "Сақтау",
            settingsClose: "Жабу",
            emptyVideos: "🎬 Бейнелер жоқ. Бірінші болып жүктеңіз!",
            fillAll: "Барлық өрістерді толтырыңыз!",
            emailExists: "Бұл email тіркелген!",
            loginExists: "Бұл логин алынған!",
            registerSuccess: "Тіркелу сәтті! Қош келдіңіз!",
            wrongCredentials: "Қате логин/email немесе құпия сөз!",
            loginSuccess: "Қош келдіңіз!",
            logoutSuccess: "Сіз шықтыңыз",
            needLogin: "Кіру қажет!",
            enterTitle: "Бейне атауын енгізіңіз!",
            selectFile: "Бейне файлды таңдаңыз!",
            videoUploaded: "Бейне жүктелді!",
            needLoginLike: "Лайк басу үшін кіріңіз!",
            needLoginSubscribe: "Жазылу үшін кіріңіз!",
            profileSaved: "Профиль жаңартылды!",
            like: "лайк",
            subscribed: "✅ Жазылдыңыз",
            subscribe: "🔔 Жазылу"
        },
        ru: {
            login: "Вход",
            register: "Регистрация",
            settings: "⚙️",
            logout: "Выйти",
            uploadTitle: "📤 Загрузить новое видео",
            uploadBtn: "➕ Загрузить",
            videoTitlePlaceholder: "Название видео",
            videoDescPlaceholder: "Описание",
            regTitle: "📝 Регистрация",
            regEmailPlaceholder: "Email",
            regLoginPlaceholder: "Логин",
            regPassPlaceholder: "Пароль",
            regSubmit: "Зарегистрироваться",
            regClose: "Закрыть",
            loginTitle: "🔐 Вход",
            loginInputPlaceholder: "Логин или Email",
            loginPassPlaceholder: "Пароль",
            loginSubmit: "Войти",
            loginClose: "Закрыть",
            settingsTitle: "⚙️ Профиль",
            settingsNamePlaceholder: "Новое имя",
            settingsAvatarPlaceholder: "URL аватара",
            settingsSave: "Сохранить",
            settingsClose: "Закрыть",
            emptyVideos: "🎬 Видео нет. Будьте первым!",
            fillAll: "Заполните все поля!",
            emailExists: "Этот email уже зарегистрирован!",
            loginExists: "Этот логин уже занят!",
            registerSuccess: "Регистрация успешна! Добро пожаловать!",
            wrongCredentials: "Неверный логин/email или пароль!",
            loginSuccess: "Добро пожаловать!",
            logoutSuccess: "Вы вышли",
            needLogin: "Нужно войти!",
            enterTitle: "Введите название видео!",
            selectFile: "Выберите видео файл!",
            videoUploaded: "Видео загружено!",
            needLoginLike: "Войдите чтобы поставить лайк!",
            needLoginSubscribe: "Войдите чтобы подписаться!",
            profileSaved: "Профиль обновлён!",
            like: "лайков",
            subscribed: "✅ Вы подписаны",
            subscribe: "🔔 Подписаться"
        }
    };
    
    let currentLang = 'kk';
    
    function applyTranslation() {
        const t = translations[currentLang];
        
        document.getElementById('loginBtn').innerText = t.login;
        document.getElementById('registerBtn').innerText = t.register;
        if(document.getElementById('settingsBtn')) document.getElementById('settingsBtn').innerHTML = t.settings;
        if(document.getElementById('logoutBtn')) document.getElementById('logoutBtn').innerText = t.logout;
        
        const uploadTitle = document.getElementById('uploadTitle');
        if(uploadTitle) uploadTitle.innerText = t.uploadTitle;
        const uploadBtn = document.getElementById('uploadBtn');
        if(uploadBtn) uploadBtn.innerText = t.uploadBtn;
        const videoTitle = document.getElementById('videoTitle');
        if(videoTitle) videoTitle.placeholder = t.videoTitlePlaceholder;
        const videoDesc = document.getElementById('videoDesc');
        if(videoDesc) videoDesc.placeholder = t.videoDescPlaceholder;
        
        const regTitle = document.getElementById('regTitle');
        if(regTitle) regTitle.innerText = t.regTitle;
        const regEmail = document.getElementById('regEmail');
        if(regEmail) regEmail.placeholder = t.regEmailPlaceholder;
        const regLogin = document.getElementById('regLogin');
        if(regLogin) regLogin.placeholder = t.regLoginPlaceholder;
        const regPass = document.getElementById('regPass');
        if(regPass) regPass.placeholder = t.regPassPlaceholder;
        const regSubmit = document.getElementById('regSubmitBtn');
        if(regSubmit) regSubmit.innerText = t.regSubmit;
        const regClose = document.getElementById('regCloseBtn');
        if(regClose) regClose.innerText = t.regClose;
        
        const loginTitle = document.getElementById('loginTitle');
        if(loginTitle) loginTitle.innerText = t.loginTitle;
        const loginInput = document.getElementById('loginInput');
        if(loginInput) loginInput.placeholder = t.loginInputPlaceholder;
        const loginPass = document.getElementById('loginPass');
        if(loginPass) loginPass.placeholder = t.loginPassPlaceholder;
        const loginSubmit = document.getElementById('loginSubmitBtn');
        if(loginSubmit) loginSubmit.innerText = t.loginSubmit;
        const loginClose = document.getElementById('loginCloseBtn');
        if(loginClose) loginClose.innerText = t.loginClose;
        
        const settingsTitle = document.getElementById('settingsTitle');
        if(settingsTitle) settingsTitle.innerText = t.settingsTitle;
        const settingsName = document.getElementById('settingsName');
        if(settingsName) settingsName.placeholder = t.settingsNamePlaceholder;
        const settingsAvatar = document.getElementById('settingsAvatarUrl');
        if(settingsAvatar) settingsAvatar.placeholder = t.settingsAvatarPlaceholder;
        const settingsSave = document.getElementById('settingsSaveBtn');
        if(settingsSave) settingsSave.innerText = t.settingsSave;
        const settingsClose = document.getElementById('settingsCloseBtn');
        if(settingsClose) settingsClose.innerText = t.settingsClose;
    }
    
    document.getElementById('langSelect').onchange = function() {
        currentLang = this.value;
        applyTranslation();
        renderVideos(); 
    };
    
    // ============ ДАННЫЕ ============
    let users = [];
    let videos = [];
    let likes = {};
    let subs = {};
    let currentUser = null;
    
    function loadData() {
        const savedUsers = localStorage.getItem('qaz_users');
        const savedVideos = localStorage.getItem('qaz_videos');
        const savedLikes = localStorage.getItem('qaz_likes');
        const savedSubs = localStorage.getItem('qaz_subs');
        const savedCurrent = localStorage.getItem('qaz_current');
        
        if(savedUsers) users = JSON.parse(savedUsers);
        if(savedVideos) videos = JSON.parse(savedVideos);
        if(savedLikes) likes = JSON.parse(savedLikes);
        if(savedSubs) subs = JSON.parse(savedSubs);
        if(savedCurrent) {
            const cur = JSON.parse(savedCurrent);
            const exists = users.find(u => String(u.id) === String(cur.id));
            if(exists) currentUser = exists;
        }
    }
    
    function saveData() {
        localStorage.setItem('qaz_users', JSON.stringify(users));
        localStorage.setItem('qaz_videos', JSON.stringify(videos));
        localStorage.setItem('qaz_likes', JSON.stringify(likes));
        localStorage.setItem('qaz_subs', JSON.stringify(subs));
        if(currentUser) localStorage.setItem('qaz_current', JSON.stringify(currentUser));
        else localStorage.removeItem('qaz_current');
    }
    
    // Регистрация
    function register() {
        const t = translations[currentLang];
        const email = document.getElementById('regEmail').value.trim();
        const login = document.getElementById('regLogin').value.trim();
        const pass = document.getElementById('regPass').value;
        
        if(!email || !login || !pass) {
            toast(t.fillAll);
            return;
        }
        
        if(users.find(u => u.email === email)) {
            toast(t.emailExists);
            return;
        }
        
        if(users.find(u => u.login === login)) {
            toast(t.loginExists);
            return;
        }
        
        const newUser = {
            id: String(Date.now()),
            login: login,
            email: email,
            password: pass,
            name: login,
            avatar: login[0].toUpperCase()
        };
        
        users.push(newUser);
        currentUser = newUser;
        saveData();
        
        closeModal('register');
        updateUI();
        renderVideos();
        toast(t.registerSuccess);
        
        document.getElementById('regEmail').value = '';
        document.getElementById('regLogin').value = '';
        document.getElementById('regPass').value = '';
    }
    
    // Вход
    function login() {
        const t = translations[currentLang];
        const input = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('loginPass').value;
        
        const user = users.find(u => (u.login === input || u.email === input) && u.password === pass);
        
        if(!user) {
            toast(t.wrongCredentials);
            return;
        }
        
        currentUser = user;
        saveData();
        closeModal('login');
        updateUI();
        renderVideos();
        toast(t.loginSuccess);
        
        document.getElementById('loginInput').value = '';
        document.getElementById('loginPass').value = '';
    }
    
    // Выход
    function logout() {
        const t = translations[currentLang];
        currentUser = null;
        localStorage.removeItem('qaz_current');
        updateUI();
        renderVideos();
        toast(t.logoutSuccess);
    }
    
    // Обновление интерфейса
    function updateUI() {
        if(currentUser) {
            document.getElementById('unauthButtons').classList.add('hidden');
            document.getElementById('authButtons').classList.remove('hidden');
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('userNameSpan').innerText = currentUser.name || currentUser.login;
            
            const av = document.getElementById('avatarSpan');
            if(currentUser.avatarUrl) {
                av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
                av.style.backgroundSize = 'cover';
                av.innerText = '';
            } else {
                av.style.backgroundImage = 'none';
                av.style.background = '#f5b042';
                av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
            }
        } else {
            document.getElementById('unauthButtons').classList.remove('hidden');
            document.getElementById('authButtons').classList.add('hidden');
            document.getElementById('uploadSection').classList.add('hidden');
        }
    }
    
    // Загрузка видео
    function uploadVideo() {
        const t = translations[currentLang];
        if(!currentUser) {
            toast(t.needLogin);
            return;
        }
        
        const title = document.getElementById('videoTitle').value.trim();
        const desc = document.getElementById('videoDesc').value.trim();
        const file = document.getElementById('videoFile').files[0];
        
        if(!title) {
            toast(t.enterTitle);
            return;
        }
        
        if(!file) {
            toast(t.selectFile);
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const newVideo = {
                id: String(Date.now()),
                title: title,
                desc: desc,
                authorId: currentUser.id,
                authorName: currentUser.name || currentUser.login,
                date: new Date().toISOString(),
                views: 0,
                src: e.target.result
            };
            videos.push(newVideo);
            saveData();
            
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDesc').value = '';
            document.getElementById('videoFile').value = '';
            
            renderVideos();
            toast(t.videoUploaded);
        };
        reader.readAsDataURL(file);
    }
    
    // Лайк
    function likeVideo(videoId) {
        videoId = String(videoId);
        const t = translations[currentLang];
        if(!currentUser) {
            toast(t.needLoginLike);
            return;
        }
        
        if(!likes[videoId]) likes[videoId] = [];
        const index = likes[videoId].indexOf(currentUser.id);
        
        if(index === -1) {
            likes[videoId].push(currentUser.id);
        } else {
            likes[videoId].splice(index, 1);
        }
        
        saveData();
        renderVideos();
    }
    
    // Подписка
    function subscribeTo(authorId) {
        authorId = String(authorId);
        const t = translations[currentLang];
        if(!currentUser) {
            toast(t.needLoginSubscribe);
            return;
        }
        
        if(!subs[currentUser.id]) subs[currentUser.id] = [];
        const index = subs[currentUser.id].indexOf(authorId);
        
        if(index === -1) {
            subs[currentUser.id].push(authorId);
        } else {
            subs[currentUser.id].splice(index, 1);
        }
        
        saveData();
        renderVideos();
    }
    
    function isLiked(videoId) {
        if(!currentUser) return false;
        return likes[videoId] && likes[videoId].includes(currentUser.id);
    }
    
    function isSubscribed(authorId) {
        if(!currentUser) return false;
        return subs[currentUser.id] && subs[currentUser.id].includes(authorId);
    }
    
    // Просмотр видео
    function playVideoById(videoId) {
        const video = videos.find(v => String(v.id) === String(videoId));
        if(!video) return;
        
        const player = document.getElementById('playerVideo');
        player.src = video.src;
        video.views++;
        saveData();
        renderVideos();
        document.getElementById('videoPlayer').style.display = 'flex';
    }
    
    function closePlayer() {
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('playerVideo').pause();
    }
    
    // Настройки
    function openSettings() {
        if(!currentUser) return;
        
        document.getElementById('settingsName').value = currentUser.name || '';
        document.getElementById('settingsAvatarUrl').value = currentUser.avatarUrl || '';
        
        const av = document.getElementById('settingsAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = '#f5b042';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        
        openModal('settings');
    }
    
    function saveSettings() {
        const t = translations[currentLang];
        const newName = document.getElementById('settingsName').value.trim();
        const newAvatar = document.getElementById('settingsAvatarUrl').value.trim();
        
        if(newName) currentUser.name = newName;
        if(newAvatar) {
            currentUser.avatarUrl = newAvatar;
        } else {
            delete currentUser.avatarUrl;
        }
        
        const index = users.findIndex(u => String(u.id) === String(currentUser.id));
        if(index !== -1) users[index] = currentUser;
        saveData();
        updateUI();
        closeModal('settings');
        renderVideos();
        toast(t.profileSaved);
    }
    
    // Рендер видео
    function renderVideos() {
        const t = translations[currentLang];
        const container = document.getElementById('videosContainer');
        
        if(videos.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:50px;">${t.emptyVideos}</div>`;
            return;
        }
        
        let html = '<div class="videos-grid">';
        
        for(let i = videos.length - 1; i >= 0; i--) {
            const v = videos[i];
            const likeCount = likes[v.id] ? likes[v.id].length : 0;
            const liked = isLiked(v.id);
            const subscribed = isSubscribed(v.authorId);
            const likeText = t.like;
            
            html += `
                <div class="video-card">
                    <div class="video-thumb" onclick="playVideoById('${v.id}')">
                        <video src="${v.src}" style="width:100%;height:100%;object-fit:cover;"></video>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(v.title)}</div>
                        <div class="video-stats">
                            <span>👤 ${escapeHtml(v.authorName)}</span>
                            <span>❤️ ${likeCount} ${likeText}</span>
                            <span>👁️ ${v.views}</span>
                        </div>
                        <div class="video-actions">
                            <button class="${liked ? 'btn-primary' : 'btn-outline'}" onclick="likeVideo('${v.id}')">❤️ ${likeCount}</button>
                            <button class="${subscribed ? 'btn-primary' : 'btn-outline'}" onclick="subscribeTo('${v.authorId}')">${subscribed ? t.subscribed : t.subscribe}</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        html += '</div>';
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function openModal(type) {
        document.getElementById(type + 'Modal').style.display = 'flex';
    }
    
    function closeModal(type) {
        document.getElementById(type + 'Modal').style.display = 'none';
    }
    
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    window.onclick = function(e) {
        if(e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
        }
        if(e.target.classList.contains('video-player')) {
            closePlayer();
        }
    };
    
    // Инициализация
    loadData();
    applyTranslation();
    updateUI();
    renderVideos();
</script>

<div class="footer">
    💙💛 QazaqTube — Видео хостинг. Барлық деректер браузерде сақталады.
</div>
