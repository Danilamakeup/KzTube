<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube — Полный YouTube</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #fff; }
        
        .header {
            background: #0f0f0f;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #272727;
            position: sticky;
            top: 0;
            z-index: 200;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .lang-select {
            background: #272727;
            border: none;
            color: #f5b042;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }
        button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: #f5b042; color: #0f0f0f; }
        .btn-outline { background: #272727; color: #fff; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #272727;
            padding: 5px 15px 5px 10px;
            border-radius: 30px;
            cursor: pointer;
        }
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #0f0f0f;
            background-size: cover;
            background-position: center;
        }
        .hidden { display: none !important; }
        
        /* Навигация */
        .nav-links {
            display: flex;
            gap: 30px;
            padding: 0 20px;
            border-bottom: 1px solid #272727;
        }
        .nav-link {
            padding: 12px 0;
            cursor: pointer;
            font-weight: 500;
            position: relative;
        }
        .nav-link.active { color: #f5b042; }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #f5b042;
        }
        
        /* Главная страница */
        .home-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; }
        .video-details { display: flex; gap: 12px; margin-top: 12px; }
        .video-channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f5b042;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .video-meta { flex: 1; }
        .video-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-name { font-size: 13px; color: #aaa; margin-bottom: 3px; }
        .video-stats { font-size: 12px; color: #aaa; }
        
        /* Страница профиля */
        .profile-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 30px;
            background: #1a1a1a;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .profile-big-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            background-size: cover;
        }
        .profile-stats { display: flex; gap: 40px; margin-top: 15px; }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 24px; font-weight: bold; }
        .profile-stat-label { font-size: 13px; color: #aaa; }
        
        /* Страница просмотра */
        .watch-container { display: flex; max-width: 1600px; margin: 0 auto; padding: 20px; gap: 30px; }
        .video-section { flex: 2.5; }
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 16px; overflow: hidden; }
        .custom-player { position: relative; width: 100%; }
        .custom-player video { width: 100%; display: block; }
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 16px 20px 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .custom-player:hover .player-controls { opacity: 1; }
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: #f5b042;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }
        .controls-row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
        .control-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 5px; transition: all 0.2s; }
        .control-btn:hover { color: #f5b042; }
        .time-display { color: white; font-size: 13px; font-family: monospace; }
        .volume-container { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 80px; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #f5b042; border-radius: 50%; cursor: pointer; }
        .right-controls { margin-left: auto; display: flex; gap: 15px; align-items: center; }
        .settings-btn { position: relative; }
        .settings-menu {
            position: absolute;
            bottom: 40px;
            right: 0;
            background: #202020;
            border-radius: 12px;
            padding: 10px;
            width: 180px;
            display: none;
            z-index: 300;
        }
        .settings-menu.show { display: block; }
        .settings-menu button {
            background: none;
            color: white;
            padding: 8px 12px;
            width: 100%;
            text-align: left;
            border-radius: 8px;
        }
        .settings-menu button:hover { background: #3a3a3a; }
        
        .video-info-section { margin-top: 20px; }
        .watch-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .watch-stats { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        .channel-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid #272727;
            border-bottom: 1px solid #272727;
        }
        .channel-left { display: flex; align-items: center; gap: 12px; }
        .channel-avatar-big { width: 48px; height: 48px; border-radius: 50%; background: #f5b042; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .subscribe-btn { background: #f5b042; color: #0f0f0f; padding: 8px 20px; }
        .subscribe-btn.disabled { background: #3a3a3a; color: #aaa; cursor: not-allowed; }
        .action-buttons { display: flex; gap: 20px; margin-top: 15px; }
        .action-btn { background: #272727; padding: 8px 16px; border-radius: 40px; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .action-btn.liked { background: #f5b042; color: #0f0f0f; }
        
        .recommendations-section { flex: 1; }
        .rec-title { font-size: 18px; margin-bottom: 15px; }
        .recommendation-card { display: flex; gap: 12px; margin-bottom: 15px; cursor: pointer; padding: 10px; border-radius: 12px; transition: background 0.2s; }
        .recommendation-card:hover { background: #272727; }
        .rec-thumb { width: 168px; height: 94px; background: #1a1a1a; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .rec-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .rec-info { flex: 1; }
        .rec-video-title { font-weight: 500; font-size: 14px; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Субтитры */
        .subtitles {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .subtitle-text {
            display: inline-block;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
        }
        
        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #202020;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
        }
        .modal-content h2 { margin-bottom: 20px; color: #f5b042; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            background: #121212;
            color: white;
            font-family: inherit;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5b042;
            color: #0f0f0f;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 400;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .footer { text-align: center; padding: 20px; color: #5a5a5a; border-top: 1px solid #272727; margin-top: 30px; }
        @media (max-width: 1000px) { .watch-container { flex-direction: column; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="showHome()"><i class="fab fa-youtube"></i> QazaqTube</div>
    <div class="controls">
        <select id="langSelect" class="lang-select">
            <option value="kk">🇰🇿 Қазақша</option>
            <option value="ru">🇷🇺 Русский</option>
        </select>
        <div id="unauthButtons">
            <button class="btn-outline" onclick="openModal('login')">Кіру</button>
            <button class="btn-primary" onclick="openModal('register')">Тіркелу</button>
        </div>
        <div id="authButtons" class="hidden">
            <div class="user-info" onclick="openProfileMenu()">
                <span id="userNameSpan"></span>
                <div class="avatar" id="avatarSpan"></div>
            </div>
        </div>
    </div>
</div>

<!-- Навигация -->
<div class="nav-links" id="navLinks" style="display: none;">
    <div class="nav-link active" onclick="showHome()">🏠 Басты</div>
    <div class="nav-link" onclick="showProfile()">👤 Менің каналым</div>
</div>

<!-- Главная страница -->
<div id="homePage" class="home-container">
    <div class="videos-grid" id="homeVideosGrid"></div>
</div>

<!-- Страница профиля -->
<div id="profilePage" class="profile-container" style="display: none;">
    <div class="profile-header">
        <div class="profile-big-avatar" id="profileBigAvatar"></div>
        <div>
            <h2 id="profileName"></h2>
            <p style="color:#aaa;">@<span id="profileLoginName"></span></p>
            <div class="profile-stats">
                <div class="profile-stat">
                    <div class="profile-stat-value" id="profileSubsCount">0</div>
                    <div class="profile-stat-label">жазылушы</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-value" id="profileVideosCount">0</div>
                    <div class="profile-stat-label">видео</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-value" id="profileLikesCount">0</div>
                    <div class="profile-stat-label">лайк</div>
                </div>
            </div>
            <button class="btn-outline" onclick="openSettings()" style="margin-top: 15px;"><i class="fas fa-edit"></i> Профильді өңдеу</button>
        </div>
    </div>
    <h3 style="margin-bottom: 20px;">📹 Менің видеоым</h3>
    <div class="videos-grid" id="profileVideosGrid"></div>
</div>

<!-- Страница просмотра -->
<div id="watchPage" class="watch-container" style="display: none;">
    <div class="video-section">
        <div class="video-wrapper">
            <div class="custom-player" id="customPlayer">
                <video id="mainVideo" src=""></video>
                <div class="subtitles" id="subtitlesContainer" style="display: none;">
                    <div class="subtitle-text" id="subtitleText"></div>
                </div>
                <div class="player-controls">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="controls-row">
                        <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                        <div class="volume-container">
                            <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
                        </div>
                        <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                        <div class="right-controls">
                            <div class="settings-btn">
                                <button class="control-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                                <div class="settings-menu" id="settingsMenu">
                                    <button onclick="changeQuality('auto')">Авто качество</button>
                                    <button onclick="changeQuality('1080p')">1080p</button>
                                    <button onclick="changeQuality('720p')">720p</button>
                                    <button onclick="changeQuality('480p')">480p</button>
                                    <hr style="margin:5px 0; border-color:#3a3a3a;">
                                    <button onclick="changeSpeed(0.5)">0.5x</button>
                                    <button onclick="changeSpeed(0.75)">0.75x</button>
                                    <button onclick="changeSpeed(1)">1x</button>
                                    <button onclick="changeSpeed(1.25)">1.25x</button>
                                    <button onclick="changeSpeed(1.5)">1.5x</button>
                                    <button onclick="changeSpeed(2)">2x</button>
                                    <hr style="margin:5px 0; border-color:#3a3a3a;">
                                    <button onclick="toggleSubtitles()">Субтитры (AI)</button>
                                </div>
                            </div>
                            <button class="control-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="video-info-section" id="watchInfoSection"></div>
    </div>
    <div class="recommendations-section">
        <div class="rec-title">Ұсыныстар</div>
        <div id="recommendationsList"></div>
    </div>
</div>

<!-- Модалка загрузки видео -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2><i class="fas fa-upload"></i> 📤 Видео жүктеу</h2>
        <input type="text" id="uploadTitle" placeholder="Бейне атауы">
        <textarea id="uploadDesc" placeholder="Сипаттама" rows="3"></textarea>
        <input type="file" id="uploadFile" accept="video/mp4,video/webm">
        <button class="btn-primary" onclick="confirmUpload()" style="width:100%; margin-top:10px;">✅ Жүктеу</button>
        <button class="btn-outline" onclick="closeModal('upload')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка регистрации -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2>📝 Тіркелу</h2>
        <input type="email" id="regEmail" placeholder="Email (только @gmail.com, @mail.com)">
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPass" placeholder="Пароль">
        <button class="btn-primary" onclick="sendVerificationCode()" style="width:100%">📧 Код жіберу</button>
        <input type="text" id="regCode" placeholder="6 таңбалы код" style="margin-top:10px;">
        <div class="code-hint" id="codeHint" style="display:none; font-size:12px; text-align:center; margin:10px 0;"></div>
        <button class="btn-primary" onclick="completeRegistration()" style="width:100%; margin-top:10px;">✅ Тіркелу</button>
        <button class="btn-outline" onclick="closeModal('register')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Кіру</h2>
        <input type="text" id="loginInput" placeholder="Логин немесе Email">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button class="btn-primary" onclick="login()" style="width:100%">Кіру</button>
        <button class="btn-outline" onclick="closeModal('login')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>⚙️ Профиль</h2>
        <div id="settingsAvatar" style="width:80px;height:80px;border-radius:50%;background:#f5b042;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:32px;background-size:cover;"></div>
        <input type="text" id="settingsName" placeholder="Жаңа есім">
        <input type="text" id="settingsAvatarUrl" placeholder="Аватарка URL">
        <button class="btn-primary" onclick="saveSettings()" style="width:100%">Сақтау</button>
        <button class="btn-outline" onclick="closeModal('settings')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<script>
    // ============ ПЕРЕВОД ============
    let currentLang = localStorage.getItem('qaz_lang') || 'kk';
    
    // ============ ДАННЫЕ ============
    let users = [];
    let videos = [];
    let likes = {};
    let subs = {};
    let currentUser = null;
    let pendingRegistration = null;
    let currentPlayingVideo = null;
    let viewedVideos = new Set(); // Хранит ID видео, которые уже получили просмотр
    
    // AI субтитры
    let subtitlesEnabled = false;
    let currentSubtitles = [];
    let subtitleInterval = null;
    
    function generateAISubtitles(text) {
        const words = text.split(' ');
        const subtitles = [];
        let time = 0;
        for(let i = 0; i < words.length; i += 3) {
            const chunk = words.slice(i, i + 3).join(' ');
            subtitles.push({ time: time, text: chunk });
            time += 3;
        }
        return subtitles;
    }
    
    function loadData() {
        const savedUsers = localStorage.getItem('qaz_users');
        const savedVideos = localStorage.getItem('qaz_videos');
        const savedLikes = localStorage.getItem('qaz_likes');
        const savedSubs = localStorage.getItem('qaz_subs');
        const savedCurrent = localStorage.getItem('qaz_current');
        const savedViewed = localStorage.getItem('qaz_viewed');
        
        if(savedUsers) users = JSON.parse(savedUsers);
        if(savedVideos) videos = JSON.parse(savedVideos);
        if(savedLikes) likes = JSON.parse(savedLikes);
        if(savedSubs) subs = JSON.parse(savedSubs);
        if(savedCurrent) {
            const cur = JSON.parse(savedCurrent);
            const exists = users.find(u => String(u.id) === String(cur.id));
            if(exists) currentUser = exists;
        }
        if(savedViewed) viewedVideos = new Set(JSON.parse(savedViewed));
    }
    
    function saveData() {
        localStorage.setItem('qaz_users', JSON.stringify(users));
        localStorage.setItem('qaz_videos', JSON.stringify(videos));
        localStorage.setItem('qaz_likes', JSON.stringify(likes));
        localStorage.setItem('qaz_subs', JSON.stringify(subs));
        localStorage.setItem('qaz_viewed', JSON.stringify([...viewedVideos]));
        if(currentUser) localStorage.setItem('qaz_current', JSON.stringify(currentUser));
        else localStorage.removeItem('qaz_current');
    }
    
    // Подсчет подписчиков для канала
    function getSubscriberCount(channelId) {
        let count = 0;
        for(let userId in subs) {
            if(subs[userId] && subs[userId].includes(channelId)) count++;
        }
        return count;
    }
    
    // Подсчет лайков на видео пользователя
    function getUserLikesCount(userId) {
        let total = 0;
        const userVideos = videos.filter(v => v.authorId === userId);
        for(let video of userVideos) {
            total += likes[video.id] ? likes[video.id].length : 0;
        }
        return total;
    }
    
    function isValidEmail(email) {
        const allowed = ['gmail.com', 'mail.com', 'yandex.com', 'yandex.kz', 'mail.ru', 'bk.ru'];
        const domain = email.split('@')[1];
        return email.includes('@') && domain && allowed.some(d => domain.toLowerCase() === d);
    }
    
    function sendVerificationCode() {
        const email = document.getElementById('regEmail').value.trim();
        const login = document.getElementById('regLogin').value.trim();
        const password = document.getElementById('regPass').value;
        
        if(!email || !login || !password) { toast("Барлық өрістерді толтырыңыз!"); return; }
        if(!isValidEmail(email)) { toast("Қате email! Тек @gmail.com, @mail.com"); return; }
        if(users.find(u => u.email === email)) { toast("Бұл email тіркелген!"); return; }
        if(users.find(u => u.login === login)) { toast("Бұл логин алынған!"); return; }
        
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        pendingRegistration = { email, login, password, code };
        document.getElementById('codeHint').style.display = 'block';
        document.getElementById('codeHint').innerHTML = `📧 Код жіберілді! <strong>${code}</strong>`;
        toast(`Код: ${code}`);
    }
    
    function completeRegistration() {
        const enteredCode = document.getElementById('regCode').value.trim();
        if(!pendingRegistration) { toast("Алдымен код жіберіңіз!"); return; }
        if(enteredCode !== pendingRegistration.code) { toast("Қате код!"); return; }
        
        const newUser = {
            id: String(Date.now()),
            login: pendingRegistration.login,
            email: pendingRegistration.email,
            password: pendingRegistration.password,
            name: pendingRegistration.login,
            avatar: pendingRegistration.login[0].toUpperCase(),
            avatarUrl: null
        };
        users.push(newUser);
        currentUser = newUser;
        saveData();
        closeModal('register');
        updateUI();
        renderHomePage();
        toast("Тіркелу сәтті! Қош келдіңіз!");
        clearRegForm();
        pendingRegistration = null;
    }
    
    function clearRegForm() {
        document.getElementById('regEmail').value = '';
        document.getElementById('regLogin').value = '';
        document.getElementById('regPass').value = '';
        document.getElementById('regCode').value = '';
        document.getElementById('codeHint').style.display = 'none';
    }
    
    function login() {
        const input = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('loginPass').value;
        const user = users.find(u => (u.login === input || u.email === input) && u.password === pass);
        if(!user) { toast("Қате логин немесе пароль!"); return; }
        currentUser = user;
        saveData();
        closeModal('login');
        updateUI();
        renderHomePage();
        toast("Қош келдіңіз!");
        document.getElementById('loginInput').value = '';
        document.getElementById('loginPass').value = '';
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem('qaz_current');
        updateUI();
        renderHomePage();
        toast("Шықтыңыз");
        showHome();
    }
    
    function updateUI() {
        if(currentUser) {
            document.getElementById('unauthButtons').classList.add('hidden');
            document.getElementById('authButtons').classList.remove('hidden');
            document.getElementById('navLinks').style.display = 'flex';
            document.getElementById('userNameSpan').innerText = currentUser.name || currentUser.login;
            const av = document.getElementById('avatarSpan');
            if(currentUser.avatarUrl) {
                av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
                av.style.backgroundSize = 'cover';
                av.innerText = '';
            } else {
                av.style.backgroundImage = 'none';
                av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
                av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
            }
        } else {
            document.getElementById('unauthButtons').classList.remove('hidden');
            document.getElementById('authButtons').classList.add('hidden');
            document.getElementById('navLinks').style.display = 'none';
        }
    }
    
    function openUploadModal() {
        if(!currentUser) { toast("Кіру қажет!"); return; }
        document.getElementById('uploadTitle').value = '';
        document.getElementById('uploadDesc').value = '';
        document.getElementById('uploadFile').value = '';
        openModal('upload');
    }
    
    function confirmUpload() {
        const title = document.getElementById('uploadTitle').value.trim();
        const desc = document.getElementById('uploadDesc').value.trim();
        const file = document.getElementById('uploadFile').files[0];
        
        if(!title) { toast("Атауын енгізіңіз!"); return; }
        if(!file) { toast("Файл таңдаңыз!"); return; }
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            const newVideo = {
                id: String(Date.now()),
                title: title,
                desc: desc,
                authorId: currentUser.id,
                authorName: currentUser.name || currentUser.login,
                date: new Date().toISOString(),
                views: 0,
                src: ev.target.result,
                subtitles: generateAISubtitles(title)
            };
            videos.push(newVideo);
            saveData();
            closeModal('upload');
            renderHomePage();
            toast("Видео жүктелді!");
        };
        reader.readAsDataURL(file);
    }
    
    function renderHomePage() {
        const container = document.getElementById('homeVideosGrid');
        
        if(videos.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px;color:#aaa;"><i class="fas fa-video" style="font-size:50px;margin-bottom:15px;display:block;"></i>🎬 Видео жоқ. Бірінші болып жүктеңіз!</div>';
            return;
        }
        
        let html = '';
        for(let i = videos.length - 1; i >= 0; i--) {
            const v = videos[i];
            const likeCount = likes[v.id] ? likes[v.id].length : 0;
            html += `
                <div class="video-card" onclick="openWatchPage('${v.id}')">
                    <div class="thumbnail">
                        <video src="${v.src}" muted></video>
                    </div>
                    <div class="video-details">
                        <div class="video-channel-avatar">${v.authorName[0].toUpperCase()}</div>
                        <div class="video-meta">
                            <div class="video-title">${escapeHtml(v.title)}</div>
                            <div class="channel-name">${escapeHtml(v.authorName)}</div>
                            <div class="video-stats">${v.views} көрсетілім • ❤️ ${likeCount}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        document.querySelectorAll('.thumbnail video').forEach(vid => {
            vid.addEventListener('mouseenter', () => vid.play());
            vid.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
        });
    }
    
    function showProfile() {
        if(!currentUser) { toast("Кіру қажет!"); return; }
        
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('watchPage').style.display = 'none';
        document.getElementById('profilePage').style.display = 'block';
        
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        document.querySelectorAll('.nav-link')[1].classList.add('active');
        
        // Заполняем профиль
        const av = document.getElementById('profileBigAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        document.getElementById('profileName').innerText = currentUser.name || currentUser.login;
        document.getElementById('profileLoginName').innerText = currentUser.login;
        document.getElementById('profileSubsCount').innerText = getSubscriberCount(currentUser.id);
        document.getElementById('profileVideosCount').innerText = videos.filter(v => v.authorId === currentUser.id).length;
        document.getElementById('profileLikesCount').innerText = getUserLikesCount(currentUser.id);
        
        // Свои видео
        const userVideos = videos.filter(v => v.authorId === currentUser.id).reverse();
        const container = document.getElementById('profileVideosGrid');
        
        if(userVideos.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;">📭 Сізде әлі видео жоқ</div>';
            return;
        }
        
        let html = '<div class="videos-grid">';
        for(let v of userVideos) {
            const likeCount = likes[v.id] ? likes[v.id].length : 0;
            html += `
                <div class="video-card" onclick="openWatchPage('${v.id}')">
                    <div class="thumbnail"><video src="${v.src}" style="width:100%;height:100%;object-fit:cover;"></video></div>
                    <div class="video-details">
                        <div class="video-channel-avatar">${v.authorName[0].toUpperCase()}</div>
                        <div class="video-meta">
                            <div class="video-title">${escapeHtml(v.title)}</div>
                            <div class="video-stats">${v.views} көрсетілім • ❤️ ${likeCount}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        container.innerHTML = html;
    }
    
    function openWatchPage(videoId) {
        const video = videos.find(v => v.id === videoId);
        if(!video) return;
        
        currentPlayingVideo = video;
        
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('profilePage').style.display = 'none';
        document.getElementById('watchPage').style.display = 'flex';
        
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        document.querySelectorAll('.nav-link')[0].classList.add('active');
        
        const mainVideo = document.getElementById('mainVideo');
        mainVideo.src = video.src;
        mainVideo.load();
        
        const likeCount = likes[video.id] ? likes[video.id].length : 0;
        const isLikedByUser = currentUser && likes[video.id] && likes[video.id].includes(currentUser.id);
        const isSubscribed = currentUser && subs[currentUser.id] && subs[currentUser.id].includes(video.authorId);
        const isOwnChannel = currentUser && currentUser.id === video.authorId;
        
        document.getElementById('watchInfoSection').innerHTML = `
            <div class="watch-title">${escapeHtml(video.title)}</div>
            <div class="watch-stats" id="watchStats">${video.views} көрсетілім • ${likeCount} лайк</div>
            <div class="channel-info">
                <div class="channel-left">
                    <div class="channel-avatar-big">${video.authorName[0].toUpperCase()}</div>
                    <div>
                        <div class="channel-name-big">${escapeHtml(video.authorName)}</div>
                        <div style="font-size:12px; color:#aaa;">${getSubscriberCount(video.authorId)} жазылушы</div>
                    </div>
                </div>
                <div>
                    <button class="subscribe-btn ${isOwnChannel ? 'disabled' : ''}" onclick="subscribeFromWatch('${video.authorId}')" ${isOwnChannel ? 'disabled' : ''}>${isOwnChannel ? 'Бұл сізсіз' : (isSubscribed ? '✅ Жазылдыңыз' : '🔔 Жазылу')}</button>
                </div>
            </div>
            <div class="action-buttons">
                <div class="action-btn ${isLikedByUser ? 'liked' : ''}" onclick="likeFromWatch()">
                    <i class="fas fa-thumbs-up"></i> <span id="likeCountDisplay">${likeCount}</span>
                </div>
            </div>
        `;
        
        // Просмотр только один раз!
        if(currentUser && currentUser.id !== video.authorId && !viewedVideos.has(video.id)) {
            video.views++;
            viewedVideos.add(video.id);
            saveData();
            const statsEl = document.getElementById('watchStats');
            if(statsEl) statsEl.innerHTML = `${video.views} көрсетілім • ${likeCount} лайк`;
        }
        
        currentSubtitles = video.subtitles || generateAISubtitles(video.title);
        renderRecommendations(video.id);
        setupPlayer();
    }
    
    function renderRecommendations(currentVideoId) {
        const container = document.getElementById('recommendationsList');
        const otherVideos = videos.filter(v => v.id !== currentVideoId);
        
        if(otherVideos.length === 0) {
            container.innerHTML = '<div style="color:#aaa;">🎬 Басқа видео жоқ</div>';
            return;
        }
        
        let html = '';
        for(let v of otherVideos.slice().reverse()) {
            const likeCount = likes[v.id] ? likes[v.id].length : 0;
            html += `
                <div class="recommendation-card" onclick="openWatchPage('${v.id}')">
                    <div class="rec-thumb"><video src="${v.src}" style="width:100%;height:100%;object-fit:cover;"></video></div>
                    <div class="rec-info">
                        <div class="rec-video-title">${escapeHtml(v.title)}</div>
                        <div class="rec-channel-name">${escapeHtml(v.authorName)}</div>
                        <div class="rec-video-stats">${v.views} көрсетілім</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function subscribeFromWatch(authorId) {
        if(!currentUser) { toast("Кіру қажет!"); return; }
        if(currentUser.id === authorId) { toast("Өзіңізге жазыла алмайсыз!"); return; }
        
        if(!subs[currentUser.id]) subs[currentUser.id] = [];
        const idx = subs[currentUser.id].indexOf(authorId);
        if(idx === -1) subs[currentUser.id].push(authorId);
        else subs[currentUser.id].splice(idx, 1);
        saveData();
        if(currentPlayingVideo) openWatchPage(currentPlayingVideo.id);
    }
    
    function likeFromWatch() {
        if(!currentPlayingVideo) return;
        if(!currentUser) { toast("Кіру қажет!"); return; }
        const videoId = currentPlayingVideo.id;
        if(!likes[videoId]) likes[videoId] = [];
        const idx = likes[videoId].indexOf(currentUser.id);
        if(idx === -1) likes[videoId].push(currentUser.id);
        else likes[videoId].splice(idx, 1);
        saveData();
        openWatchPage(videoId);
    }
    
    function showHome() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('watchPage').style.display = 'none';
        document.getElementById('profilePage').style.display = 'none';
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        document.querySelectorAll('.nav-link')[0].classList.add('active');
        const video = document.getElementById('mainVideo');
        if(video) video.pause();
        renderHomePage();
    }
    
    // Настройки видео
    function changeQuality(quality) { toast(`Качество: ${quality}`); document.getElementById('settingsMenu').classList.remove('show'); }
    function changeSpeed(speed) { document.getElementById('mainVideo').playbackRate = speed; toast(`Скорость: ${speed}x`); document.getElementById('settingsMenu').classList.remove('show'); }
    
    function toggleSubtitles() {
        subtitlesEnabled = !subtitlesEnabled;
        const container = document.getElementById('subtitlesContainer');
        if(subtitlesEnabled && currentSubtitles.length > 0) {
            container.style.display = 'block';
            startSubtitleTracking();
            toast('Субтитры включены');
        } else {
            container.style.display = 'none';
            if(subtitleInterval) clearInterval(subtitleInterval);
            toast('Субтитры выключены');
        }
    }
    
    function startSubtitleTracking() {
        if(subtitleInterval) clearInterval(subtitleInterval);
        const video = document.getElementById('mainVideo');
        const subtitleText = document.getElementById('subtitleText');
        subtitleInterval = setInterval(() => {
            if(!subtitlesEnabled || !video || video.paused) return;
            const currentTime = video.currentTime;
            let activeSubtitle = null;
            for(let i = 0; i < currentSubtitles.length; i++) {
                if(currentTime >= currentSubtitles[i].time) activeSubtitle = currentSubtitles[i];
                else break;
            }
            subtitleText.textContent = activeSubtitle ? activeSubtitle.text : '';
        }, 200);
    }
    
    function setupPlayer() {
        const video = document.getElementById('mainVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const player = document.getElementById('customPlayer');
        
        function formatTime(sec) {
            if(isNaN(sec)) return '0:00';
            const mins = Math.floor(sec / 60);
            const secs = Math.floor(sec % 60);
            return `${mins}:${secs < 10 ? '0' + secs : secs}`;
        }
        
        function updateProgress() {
            if(video.duration) {
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                progressFill.style.width = (video.currentTime / video.duration) * 100 + '%';
            }
        }
        
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('loadedmetadata', updateProgress);
        
        playPauseBtn.onclick = () => {
            if(video.paused) { video.play(); playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { video.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };
        video.onplay = () => playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        video.onpause = () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        
        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        };
        
        muteBtn.onclick = () => {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            volumeSlider.value = video.muted ? 0 : video.volume;
        };
        
        volumeSlider.oninput = (e) => {
            video.volume = parseFloat(e.target.value);
            video.muted = false;
            muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        };
        
        fullscreenBtn.onclick = () => {
            if(player.requestFullscreen) player.requestFullscreen();
            else if(player.webkitRequestFullscreen) player.webkitRequestFullscreen();
        };
        
        settingsBtn.onclick = (e) => { e.stopPropagation(); settingsMenu.classList.toggle('show'); };
        document.addEventListener('click', (e) => { if(!settingsBtn.contains(e.target)) settingsMenu.classList.remove('show'); });
        
        video.onended = () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        video.play();
    }
    
    function openProfileMenu() {
        if(!currentUser) return;
        const av = document.getElementById('profileAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        document.getElementById('profileDisplayName').innerText = currentUser.name || currentUser.login;
        document.getElementById('profileLogin').innerText = currentUser.login;
        
        // Создаем простое меню
        alert(`👤 ${currentUser.name || currentUser.login}\n📹 Видео: ${videos.filter(v => v.authorId === currentUser.id).length}\n👥 Подписчиков: ${getSubscriberCount(currentUser.id)}\n❤️ Лайков: ${getUserLikesCount(currentUser.id)}`);
    }
    
    function openSettings() {
        if(!currentUser) return;
        document.getElementById('settingsName').value = currentUser.name || '';
        document.getElementById('settingsAvatarUrl').value = currentUser.avatarUrl || '';
        const av = document.getElementById('settingsAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        openModal('settings');
    }
    
    function saveSettings() {
        const newName = document.getElementById('settingsName').value.trim();
        const newAvatar = document.getElementById('settingsAvatarUrl').value.trim();
        if(newName) currentUser.name = newName;
        if(newAvatar) currentUser.avatarUrl = newAvatar;
        else delete currentUser.avatarUrl;
        const idx = users.findIndex(u => u.id === currentUser.id);
        if(idx !== -1) users[idx] = currentUser;
        saveData();
        updateUI();
        closeModal('settings');
        toast("Профиль жаңартылды!");
        renderHomePage();
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    function openModal(type) { document.getElementById(type + 'Modal').style.display = 'flex'; }
    function closeModal(type) { document.getElementById(type + 'Modal').style.display = 'none'; }
    
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    document.getElementById('langSelect').onchange = () => {
        currentLang = document.getElementById('langSelect').value;
        localStorage.setItem('qaz_lang', currentLang);
        // Просто обновляем текст без накрутки просмотров
        if(currentPlayingVideo) openWatchPage(currentPlayingVideo.id);
    };
    
    window.onclick = (e) => { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; };
    
    loadData();
    updateUI();
    renderHomePage();
    
    // Переопределяем uploadNewVideo
    window.uploadNewVideo = openUploadModal;
    window.showProfile = showProfile;
    window.showHome = showHome;
    window.openWatchPage = openWatchPage;
    window.subscribeFromWatch = subscribeFromWatch;
    window.likeFromWatch = likeFromWatch;
    window.openSettings = openSettings;
    window.saveSettings = saveSettings;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.sendVerificationCode = sendVerificationCode;
    window.completeRegistration = completeRegistration;
    window.login = login;
    window.logout = logout;
    window.confirmUpload = confirmUpload;
    window.changeQuality = changeQuality;
    window.changeSpeed = changeSpeed;
    window.toggleSubtitles = toggleSubtitles;
</script>
