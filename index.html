<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube — Көк-сары видеохостинг</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2463 0%, #061845 50%, #030c1f 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Анимация градиента */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Стилизация скролла */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #061845; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #f5b042, #ffd966); border-radius: 10px; }

        /* Хедер */
        .header {
            background: rgba(3, 18, 43, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(245, 176, 66, 0.3);
            position: sticky;
            top: 0;
            z-index: 200;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f5b042, #ffd966, #fff5e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            background: none;
            -webkit-background-clip: unset;
            color: #f5b042;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .lang-select {
            background: rgba(15, 43, 110, 0.8);
            border: 1px solid rgba(245, 176, 66, 0.5);
            color: #f5b042;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .lang-select:hover {
            background: #f5b042;
            color: #0a2463;
            border-color: #fff;
        }

        button {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f5b042, #ffd966);
            color: #0a2463;
            box-shadow: 0 4px 15px rgba(245, 176, 66, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 176, 66, 0.5);
        }

        .btn-outline {
            background: rgba(255, 255, 240, 0.08);
            border: 1px solid rgba(245, 176, 66, 0.6);
            color: #ffd966;
            backdrop-filter: blur(4px);
        }

        .btn-outline:hover {
            background: rgba(245, 176, 66, 0.2);
            border-color: #f5b042;
            transform: scale(1.02);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 200, 0.08);
            padding: 5px 18px 5px 12px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245, 176, 66, 0.3);
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #0a2463;
            background-size: cover;
            background-position: center;
            transition: all 0.3s;
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Панель загрузки */
        .upload-area {
            background: rgba(10, 27, 68, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 176, 66, 0.4);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #f5b042;
            box-shadow: 0 8px 25px rgba(245, 176, 66, 0.15);
        }

        .upload-area h4 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #ffd966;
        }

        .upload-area input, .upload-area textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid rgba(245, 176, 66, 0.3);
            background: rgba(6, 27, 68, 0.8);
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .upload-area input:focus, .upload-area textarea:focus {
            outline: none;
            border-color: #f5b042;
            box-shadow: 0 0 0 3px rgba(245, 176, 66, 0.2);
        }

        /* Сетка видео */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .video-card {
            background: rgba(6, 28, 78, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(245, 176, 66, 0.3);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: #f5b042;
            box-shadow: 0 20px 35px -12px rgba(245, 176, 66, 0.3);
        }

        .video-thumb {
            width: 100%;
            height: 170px;
            background: linear-gradient(135deg, #071c47, #0a2463);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .video-card:hover .video-thumb video {
            transform: scale(1.05);
        }

        .video-thumb::after {
            content: "▶";
            position: absolute;
            font-size: 40px;
            color: rgba(245, 176, 66, 0.8);
            background: rgba(0,0,0,0.5);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-card:hover .video-thumb::after {
            opacity: 1;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .video-stats {
            font-size: 12px;
            color: #bbd4ff;
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
        }

        .video-actions {
            display: flex;
            gap: 12px;
        }

        .video-actions button {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 12, 35, 0.95);
            backdrop-filter: blur(12px);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #0e2360, #0a1b44);
            padding: 30px;
            border-radius: 32px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(245, 176, 66, 0.5);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid rgba(245, 176, 66, 0.3);
            background: rgba(6, 27, 68, 0.8);
            color: white;
            font-size: 14px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #f5b042;
        }

        .inline-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .code-hint {
            font-size: 12px;
            color: #ffd966;
            margin-bottom: 15px;
            text-align: center;
            padding: 8px;
            background: rgba(245, 176, 66, 0.1);
            border-radius: 12px;
        }

        /* КАСТОМНЫЙ ВИДЕОПЛЕЕР */
        .video-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 400;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .player-container {
            position: relative;
            width: 90%;
            max-width: 1100px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: playerFadeIn 0.3s ease;
        }

        @keyframes playerFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .player-video {
            width: 100%;
            background: #000;
            display: block;
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .player-container:hover .player-controls {
            opacity: 1;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f5b042, #ffd966);
            border-radius: 5px;
            width: 0%;
            position: relative;
        }

        .progress-fill::after {
            content: "";
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #f5b042;
            border-radius: 50%;
            box-shadow: 0 0 8px #f5b042;
        }

        .controls-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: all 0.2s;
            width: auto;
        }

        .control-btn:hover {
            color: #f5b042;
            transform: scale(1.1);
        }

        .time-display {
            color: white;
            font-size: 13px;
            font-family: monospace;
            margin-left: auto;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #f5b042;
            border-radius: 50%;
            cursor: pointer;
        }

        .close-player {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 32px;
            cursor: pointer;
            color: white;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 5;
        }

        .close-player:hover {
            background: #f5b042;
            color: #0a2463;
            transform: rotate(90deg);
        }

        /* Тосты */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f5b042, #ffd966);
            color: #0a2463;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            z-index: 500;
            animation: toastFadeOut 3s forwards;
            box-shadow: 0 8px 25px rgba(245, 176, 66, 0.4);
        }

        @keyframes toastFadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); visibility: hidden; }
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(245, 176, 66, 0.6);
            border-top: 1px solid rgba(245, 176, 66, 0.2);
            margin-top: 40px;
            font-size: 13px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .header { padding: 12px 15px; }
            .controls { gap: 8px; }
            button { padding: 6px 14px; font-size: 12px; }
            .logo { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><i class="fas fa-play-circle"></i> QAZAQ TUBE</div>
    <div class="controls">
        <select id="langSelect" class="lang-select">
            <option value="kk">🇰🇿 Қазақша</option>
            <option value="ru">🇷🇺 Русский</option>
        </select>
        <div id="unauthButtons">
            <button class="btn-outline" onclick="openModal('login')" data-lang-key="loginBtn">Кіру</button>
            <button class="btn-primary" onclick="openModal('register')" data-lang-key="registerBtn">Тіркелу</button>
        </div>
        <div id="authButtons" class="hidden">
            <div class="user-info">
                <span id="userNameSpan"></span>
                <div class="avatar" id="avatarSpan"></div>
                <button class="btn-outline" onclick="openSettings()"><i class="fas fa-cog"></i></button>
                <button class="btn-outline" onclick="logout()" data-lang-key="logoutBtn">Шығу</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="uploadSection" class="upload-area hidden">
        <h4 data-lang-key="uploadTitle"><i class="fas fa-cloud-upload-alt"></i> 📤 Жаңа бейне жүктеу</h4>
        <input type="text" id="videoTitle" data-lang-placeholder="videoTitlePlaceholder" placeholder="Бейне атауы">
        <textarea id="videoDesc" data-lang-placeholder="videoDescPlaceholder" placeholder="Сипаттама" rows="2"></textarea>
        <input type="file" id="videoFile" accept="video/mp4,video/webm">
        <button class="btn-primary" onclick="uploadVideo()" data-lang-key="uploadBtn"><i class="fas fa-upload"></i> ➕ Жүктеу</button>
    </div>
    <div id="videosContainer"></div>
</div>

<!-- Модалка регистрации -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2><i class="fas fa-user-plus"></i> 📝 <span data-lang-key="regTitle">Тіркелу</span></h2>
        <input type="email" id="regEmail" data-lang-placeholder="regEmailPlaceholder" placeholder="Email (только @gmail.com, @mail.com, @yandex.com)">
        <input type="text" id="regLogin" data-lang-placeholder="regLoginPlaceholder" placeholder="Логин">
        <input type="password" id="regPass" data-lang-placeholder="regPassPlaceholder" placeholder="Құпия сөз">
        <div class="inline-buttons">
            <button class="btn-primary" onclick="sendVerificationCode()" style="flex:1" data-lang-key="sendCodeBtn"><i class="fas fa-envelope"></i> 📧 Код жіберу</button>
        </div>
        <input type="text" id="regCode" data-lang-placeholder="regCodePlaceholder" placeholder="6 таңбалы код">
        <div class="code-hint" id="codeHint" style="display:none;"></div>
        <button class="btn-primary" onclick="completeRegistration()" data-lang-key="regSubmit" style="width:100%; margin-top:10px;"><i class="fas fa-check-circle"></i> ✅ Тіркелу</button>
        <button class="btn-outline" onclick="closeModal('register')" data-lang-key="regClose" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка входа -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2><i class="fas fa-sign-in-alt"></i> 🔐 <span data-lang-key="loginTitle">Кіру</span></h2>
        <input type="text" id="loginInput" data-lang-placeholder="loginInputPlaceholder" placeholder="Логин немесе Email">
        <input type="password" id="loginPass" data-lang-placeholder="loginPassPlaceholder" placeholder="Құпия сөз">
        <button class="btn-primary" onclick="login()" data-lang-key="loginSubmit" style="width:100%">Кіру</button>
        <button class="btn-outline" onclick="closeModal('login')" data-lang-key="loginClose" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка настроек -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2><i class="fas fa-sliders-h"></i> ⚙️ <span data-lang-key="settingsTitle">Профиль</span></h2>
        <div id="settingsAvatar" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#f5b042,#ffd966);margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;background-size:cover;background-position:center;"></div>
        <input type="text" id="settingsName" data-lang-placeholder="settingsNamePlaceholder" placeholder="Жаңа есім">
        <input type="text" id="settingsAvatarUrl" data-lang-placeholder="settingsAvatarPlaceholder" placeholder="Аватарка URL">
        <button class="btn-primary" onclick="saveSettings()" data-lang-key="settingsSave" style="width:100%">Сақтау</button>
        <button class="btn-outline" onclick="closeModal('settings')" data-lang-key="settingsClose" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- КАСТОМНЫЙ ВИДЕОПЛЕЕР -->
<div id="videoPlayer" class="video-player">
    <div class="close-player" onclick="closePlayer()">✕</div>
    <div class="player-container">
        <video id="playerVideo" class="player-video"></video>
        <div class="player-controls">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="controls-buttons">
                <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
                <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ============ ПЕРЕВОД ============
    const translations = {
        kk: {
            loginBtn: "Кіру", registerBtn: "Тіркелу", logoutBtn: "Шығу",
            uploadTitle: "📤 Жаңа бейне жүктеу", uploadBtn: "➕ Жүктеу",
            videoTitlePlaceholder: "Бейне атауы", videoDescPlaceholder: "Сипаттама",
            regTitle: "Тіркелу", regEmailPlaceholder: "Email (тек @gmail.com, @mail.com, @yandex.com)",
            regLoginPlaceholder: "Логин", regPassPlaceholder: "Құпия сөз", regCodePlaceholder: "6 таңбалы код",
            sendCodeBtn: "📧 Код жіберу", regSubmit: "✅ Тіркелу", regClose: "Жабу",
            loginTitle: "Кіру", loginInputPlaceholder: "Логин немесе Email", loginPassPlaceholder: "Құпия сөз",
            loginSubmit: "Кіру", loginClose: "Жабу",
            settingsTitle: "Профиль", settingsNamePlaceholder: "Жаңа есім", settingsAvatarPlaceholder: "Аватарка URL",
            settingsSave: "Сақтау", settingsClose: "Жабу",
            emptyVideos: "🎬 Бейнелер жоқ. Бірінші болып жүктеңіз!",
            fillAll: "Барлық өрістерді толтырыңыз!", invalidEmail: "Қате email! Тек @gmail.com, @mail.com, @yandex.com",
            emailExists: "Бұл email тіркелген!", loginExists: "Бұл логин алынған!",
            codeSent: "Код жіберілді! Тексеріңіз: ", wrongCode: "Қате код!",
            registerSuccess: "Тіркелу сәтті! Қош келдіңіз!", wrongCredentials: "Қате логин/email немесе құпия сөз!",
            loginSuccess: "Қош келдіңіз!", logoutSuccess: "Сіз шықтыңыз", needLogin: "Кіру қажет!",
            enterTitle: "Бейне атауын енгізіңіз!", selectFile: "Бейне файлды таңдаңыз!",
            videoUploaded: "Бейне жүктелді!", needLoginLike: "Лайк басу үшін кіріңіз!",
            needLoginSubscribe: "Жазылу үшін кіріңіз!", profileSaved: "Профиль жаңартылды!",
            like: "лайк", subscribed: "✅ Жазылдыңыз", subscribe: "🔔 Жазылу"
        },
        ru: {
            loginBtn: "Вход", registerBtn: "Регистрация", logoutBtn: "Выйти",
            uploadTitle: "📤 Загрузить новое видео", uploadBtn: "➕ Загрузить",
            videoTitlePlaceholder: "Название видео", videoDescPlaceholder: "Описание",
            regTitle: "Регистрация", regEmailPlaceholder: "Email (только @gmail.com, @mail.com, @yandex.com)",
            regLoginPlaceholder: "Логин", regPassPlaceholder: "Пароль", regCodePlaceholder: "6-значный код",
            sendCodeBtn: "📧 Отправить код", regSubmit: "✅ Зарегистрироваться", regClose: "Закрыть",
            loginTitle: "Вход", loginInputPlaceholder: "Логин или Email", loginPassPlaceholder: "Пароль",
            loginSubmit: "Войти", loginClose: "Закрыть",
            settingsTitle: "Профиль", settingsNamePlaceholder: "Новое имя", settingsAvatarPlaceholder: "URL аватара",
            settingsSave: "Сохранить", settingsClose: "Закрыть",
            emptyVideos: "🎬 Видео нет. Будьте первым!", fillAll: "Заполните все поля!",
            invalidEmail: "Неверный email! Только @gmail.com, @mail.com, @yandex.com",
            emailExists: "Этот email уже зарегистрирован!", loginExists: "Этот логин уже занят!",
            codeSent: "Код отправлен! Проверьте: ", wrongCode: "Неверный код!",
            registerSuccess: "Регистрация успешна! Добро пожаловать!", wrongCredentials: "Неверный логин/email или пароль!",
            loginSuccess: "Добро пожаловать!", logoutSuccess: "Вы вышли", needLogin: "Нужно войти!",
            enterTitle: "Введите название видео!", selectFile: "Выберите видео файл!",
            videoUploaded: "Видео загружено!", needLoginLike: "Войдите чтобы поставить лайк!",
            needLoginSubscribe: "Войдите чтобы подписаться!", profileSaved: "Профиль обновлён!",
            like: "лайков", subscribed: "✅ Вы подписаны", subscribe: "🔔 Подписаться"
        }
    };
    
    let currentLang = localStorage.getItem('qaz_lang') || 'kk';
    
    function applyTranslation() {
        const t = translations[currentLang];
        document.querySelectorAll('[data-lang-key]').forEach(el => {
            const key = el.getAttribute('data-lang-key');
            if (t[key]) {
                if (el.innerHTML.includes('<i')) {
                    const icon = el.querySelector('i');
                    if (icon) el.innerHTML = icon.outerHTML + ' ' + t[key];
                    else el.innerText = t[key];
                } else el.innerText = t[key];
            }
        });
        document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
            const key = el.getAttribute('data-lang-placeholder');
            if (t[key]) el.placeholder = t[key];
        });
    }
    
    document.getElementById('langSelect').value = currentLang;
    document.getElementById('langSelect').onchange = function() {
        currentLang = this.value;
        localStorage.setItem('qaz_lang', currentLang);
        applyTranslation();
        renderVideos(); 
    };
    
    // ============ ДАННЫЕ ============
    let users = [];
    let videos = [];
    let likes = {};
    let subs = {};
    let currentUser = null;
    let pendingRegistration = null;
    
    function loadData() {
        const savedUsers = localStorage.getItem('qaz_users');
        const savedVideos = localStorage.getItem('qaz_videos');
        const savedLikes = localStorage.getItem('qaz_likes');
        const savedSubs = localStorage.getItem('qaz_subs');
        const savedCurrent = localStorage.getItem('qaz_current');
        
        if(savedUsers) users = JSON.parse(savedUsers);
        if(savedVideos) videos = JSON.parse(savedVideos);
        if(savedLikes) likes = JSON.parse(savedLikes);
        if(savedSubs) subs = JSON.parse(savedSubs);
        if(savedCurrent) {
            const cur = JSON.parse(savedCurrent);
            const exists = users.find(u => String(u.id) === String(cur.id));
            if(exists) currentUser = exists;
        }
    }
    
    function saveData() {
        localStorage.setItem('qaz_users', JSON.stringify(users));
        localStorage.setItem('qaz_videos', JSON.stringify(videos));
        localStorage.setItem('qaz_likes', JSON.stringify(likes));
        localStorage.setItem('qaz_subs', JSON.stringify(subs));
        if(currentUser) localStorage.setItem('qaz_current', JSON.stringify(currentUser));
        else localStorage.removeItem('qaz_current');
    }
    
    function isValidEmail(email) {
        const allowedDomains = ['gmail.com', 'mail.com', 'yandex.com', 'yandex.kz', 'mail.ru', 'bk.ru', 'list.ru'];
        const domain = email.split('@')[1];
        return email.includes('@') && domain && allowedDomains.some(d => domain.toLowerCase() === d);
    }
    
    function sendVerificationCode() {
        const t = translations[currentLang];
        const email = document.getElementById('regEmail').value.trim();
        const login = document.getElementById('regLogin').value.trim();
        const password = document.getElementById('regPass').value;
        
        if(!email || !login || !password) { toast(t.fillAll); return; }
        if(!isValidEmail(email)) { toast(t.invalidEmail); return; }
        if(users.find(u => u.email === email)) { toast(t.emailExists); return; }
        if(users.find(u => u.login === login)) { toast(t.loginExists); return; }
        
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        pendingRegistration = { email, login, password, code };
        
        const hintDiv = document.getElementById('codeHint');
        hintDiv.style.display = 'block';
        hintDiv.innerHTML = `📧 ${t.codeSent} <strong style="font-size:18px;">${code}</strong>`;
        toast(`${t.codeSent} ${code}`);
        console.log("Код подтверждения:", code);
    }
    
    function completeRegistration() {
        const t = translations[currentLang];
        const enteredCode = document.getElementById('regCode').value.trim();
        
        if(!pendingRegistration) { toast(t.fillAll); return; }
        if(enteredCode !== pendingRegistration.code) { toast(t.wrongCode); return; }
        
        const newUser = {
            id: String(Date.now()),
            login: pendingRegistration.login,
            email: pendingRegistration.email,
            password: pendingRegistration.password,
            name: pendingRegistration.login,
            avatar: pendingRegistration.login[0].toUpperCase(),
            avatarType: 'text'
        };
        
        users.push(newUser);
        currentUser = newUser;
        saveData();
        
        closeModal('register');
        updateUI();
        renderVideos();
        toast(t.registerSuccess);
        
        document.getElementById('regEmail').value = '';
        document.getElementById('regLogin').value = '';
        document.getElementById('regPass').value = '';
        document.getElementById('regCode').value = '';
        document.getElementById('codeHint').style.display = 'none';
        pendingRegistration = null;
    }
    
    function login() {
        const t = translations[currentLang];
        const input = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('loginPass').value;
        const user = users.find(u => (u.login === input || u.email === input) && u.password === pass);
        
        if(!user) { toast(t.wrongCredentials); return; }
        
        currentUser = user;
        saveData();
        closeModal('login');
        updateUI();
        renderVideos();
        toast(t.loginSuccess);
        
        document.getElementById('loginInput').value = '';
        document.getElementById('loginPass').value = '';
    }
    
    function logout() {
        const t = translations[currentLang];
        currentUser = null;
        localStorage.removeItem('qaz_current');
        updateUI();
        renderVideos();
        toast(t.logoutSuccess);
    }
    
    function updateUI() {
        if(currentUser) {
            document.getElementById('unauthButtons').classList.add('hidden');
            document.getElementById('authButtons').classList.remove('hidden');
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('userNameSpan').innerText = currentUser.name || currentUser.login;
            
            const av = document.getElementById('avatarSpan');
            if(currentUser.avatarUrl) {
                av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
                av.style.backgroundSize = 'cover';
                av.innerText = '';
            } else {
                av.style.backgroundImage = 'none';
                av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
                av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
            }
        } else {
            document.getElementById('unauthButtons').classList.remove('hidden');
            document.getElementById('authButtons').classList.add('hidden');
            document.getElementById('uploadSection').classList.add('hidden');
        }
    }
    
    function uploadVideo() {
        const t = translations[currentLang];
        if(!currentUser) { toast(t.needLogin); return; }
        
        const title = document.getElementById('videoTitle').value.trim();
        const desc = document.getElementById('videoDesc').value.trim();
        const file = document.getElementById('videoFile').files[0];
        
        if(!title) { toast(t.enterTitle); return; }
        if(!file) { toast(t.selectFile); return; }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const newVideo = {
                id: String(Date.now()),
                title: title,
                desc: desc,
                authorId: currentUser.id,
                authorName: currentUser.name || currentUser.login,
                date: new Date().toISOString(),
                views: 0,
                src: e.target.result
            };
            videos.push(newVideo);
            saveData();
            
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDesc').value = '';
            document.getElementById('videoFile').value = '';
            
            renderVideos();
            toast(t.videoUploaded);
        };
        reader.readAsDataURL(file);
    }
    
    function likeVideo(videoId) {
        videoId = String(videoId);
        const t = translations[currentLang];
        if(!currentUser) { toast(t.needLoginLike); return; }
        
        if(!likes[videoId]) likes[videoId] = [];
        const index = likes[videoId].indexOf(currentUser.id);
        if(index === -1) likes[videoId].push(currentUser.id);
        else likes[videoId].splice(index, 1);
        
        saveData();
        renderVideos();
    }
    
    function subscribeTo(authorId) {
        authorId = String(authorId);
        const t = translations[currentLang];
        if(!currentUser) { toast(t.needLoginSubscribe); return; }
        
        if(!subs[currentUser.id]) subs[currentUser.id] = [];
        const index = subs[currentUser.id].indexOf(authorId);
        if(index === -1) subs[currentUser.id].push(authorId);
        else subs[currentUser.id].splice(index, 1);
        
        saveData();
        renderVideos();
    }
    
    function isLiked(videoId) {
        if(!currentUser) return false;
        return likes[videoId] && likes[videoId].includes(currentUser.id);
    }
    
    function isSubscribed(authorId) {
        if(!currentUser) return false;
        return subs[currentUser.id] && subs[currentUser.id].includes(authorId);
    }
    
    // КАСТОМНЫЙ ПЛЕЕР
    let currentVideoObj = null;
    
    function playVideoById(videoId) {
        const video = videos.find(v => String(v.id) === String(videoId));
        if(!video) return;
        
        currentVideoObj = video;
        const playerVideo = document.getElementById('playerVideo');
        playerVideo.src = video.src;
        
        video.views++;
        saveData();
        renderVideos();
        
        document.getElementById('videoPlayer').style.display = 'flex';
        
        // Настройка кастомного плеера
        setupCustomPlayer();
    }
    
    function setupCustomPlayer() {
        const video = document.getElementById('playerVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        
        // Функция форматирования времени
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' + secs : secs}`;
        }
        
        // Обновление времени
        function updateTime() {
            if(video.duration) {
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                const percent = (video.currentTime / video.duration) * 100;
                progressFill.style.width = percent + '%';
            }
        }
        
        video.addEventListener('timeupdate', updateTime);
        video.addEventListener('loadedmetadata', updateTime);
        
        // Play/Pause
        playPauseBtn.onclick = () => {
            if(video.paused) {
                video.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        };
        
        video.onplay = () => playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        video.onpause = () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        
        // Прогресс бар
        progressBar.onclick = (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        };
        
        // Громкость
        muteBtn.onclick = () => {
            if(video.muted) {
                video.muted = false;
                muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                volumeSlider.value = video.volume;
            } else {
                video.muted = true;
                muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            }
        };
        
        volumeSlider.oninput = (e) => {
            video.volume = parseFloat(e.target.value);
            video.muted = false;
            muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        };
        
        video.onended = () => {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        };
    }
    
    function closePlayer() {
        const video = document.getElementById('playerVideo');
        video.pause();
        video.src = '';
        document.getElementById('videoPlayer').style.display = 'none';
    }
    
    function openSettings() {
        if(!currentUser) return;
        document.getElementById('settingsName').value = currentUser.name || '';
        document.getElementById('settingsAvatarUrl').value = currentUser.avatarUrl || '';
        
        const av = document.getElementById('settingsAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        openModal('settings');
    }
    
    function saveSettings() {
        const t = translations[currentLang];
        const newName = document.getElementById('settingsName').value.trim();
        const newAvatar = document.getElementById('settingsAvatarUrl').value.trim();
        
        if(newName) currentUser.name = newName;
        if(newAvatar) { currentUser.avatarUrl = newAvatar; }
        else { delete currentUser.avatarUrl; }
        
        const index = users.findIndex(u => String(u.id) === String(currentUser.id));
        if(index !== -1) users[index] = currentUser;
        saveData();
        updateUI();
        closeModal('settings');
        renderVideos();
        toast(t.profileSaved);
    }
    
    function renderVideos() {
        const t = translations[currentLang];
        const container = document.getElementById('videosContainer');
        
        if(videos.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:60px;background:rgba(255,255,255,0.03);border-radius:40px;"><i class="fas fa-video" style="font-size:60px;color:#f5b042;margin-bottom:20px;display:block;"></i>${t.emptyVideos}</div>`;
            return;
        }
        
        let html = '<div class="videos-grid">';
        for(let i = videos.length - 1; i >= 0; i--) {
            const v = videos[i];
            const likeCount = likes[v.id] ? likes[v.id].length : 0;
            const liked = isLiked(v.id);
            const subscribed = isSubscribed(v.authorId);
            
            html += `
                <div class="video-card">
                    <div class="video-thumb" onclick="playVideoById('${v.id}')">
                        <video src="${v.src}" style="width:100%;height:100%;object-fit:cover;"></video>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(v.title)}</div>
                        <div class="video-stats">
                            <span><i class="fas fa-user"></i> ${escapeHtml(v.authorName)}</span>
                            <span><i class="fas fa-heart"></i> ${likeCount} ${t.like}</span>
                            <span><i class="fas fa-eye"></i> ${v.views}</span>
                        </div>
                        <div class="video-actions">
                            <button class="${liked ? 'btn-primary' : 'btn-outline'}" onclick="event.stopPropagation(); likeVideo('${v.id}')"><i class="fas fa-heart"></i> ${likeCount}</button>
                            <button class="${subscribed ? 'btn-primary' : 'btn-outline'}" onclick="event.stopPropagation(); subscribeTo('${v.authorId}')">${subscribed ? '<i class="fas fa-check"></i> ' + t.subscribed : '<i class="fas fa-bell"></i> ' + t.subscribe}</button>
                        </div>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    function openModal(type) { document.getElementById(type + 'Modal').style.display = 'flex'; }
    function closeModal(type) { document.getElementById(type + 'Modal').style.display = 'none'; }
    
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    window.onclick = function(e) {
        if(e.target.classList.contains('modal')) e.target.style.display = 'none';
        if(e.target.classList.contains('video-player')) closePlayer();
    };
    
    loadData();
    applyTranslation();
    updateUI();
    renderVideos();
</script>
