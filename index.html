<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0a2463;
            color: white;
        }

        /* Шапка */
        .header {
            background: #030c1f;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f5b042;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #f5b042;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary {
            background: #f5b042;
            color: #0a2463;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #f5b042;
            color: #f5b042;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(245,176,66,0.2);
            padding: 5px 15px;
            border-radius: 40px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f5b042;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a2463;
        }

        /* Панель загрузки (маленькая, справа сверху) */
        .upload-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #0a1b44;
            border: 1px solid #f5b042;
            border-radius: 15px;
            padding: 15px;
            width: 280px;
            z-index: 100;
            display: none;
        }

        .upload-panel.show {
            display: block;
        }

        .upload-panel input, .upload-panel textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #f5b042;
            background: #061b44;
            color: white;
        }

        .upload-panel input[type="file"] {
            background: #061b44;
        }

        /* Контейнер с видео */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background: rgba(6, 28, 78, 0.8);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(245,176,66,0.3);
        }

        .video-card:hover {
            transform: translateY(-3px);
            border-color: #f5b042;
        }

        .video-thumb {
            width: 100%;
            height: 160px;
            background: #071c47;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .video-stats {
            font-size: 12px;
            color: #bbd4ff;
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .video-actions {
            display: flex;
            gap: 10px;
        }

        .video-actions button {
            padding: 5px 12px;
            font-size: 12px;
        }

        .liked {
            background: #f5b042 !important;
            color: #0a2463 !important;
        }

        .subscribed {
            background: #FFD966 !important;
            color: #0a2463 !important;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #0a1b44;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #f5b042;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #f5b042;
            background: #061b44;
            color: white;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #f5b042;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #f5b042;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: #0a2463;
        }

        .video-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .video-player.show {
            display: flex;
        }

        .video-player video {
            max-width: 90%;
            max-height: 80%;
            border-radius: 15px;
        }

        .close-video {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: #f5b042;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5b042;
            color: #0a2463;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 400;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #f5b042aa;
            border-top: 1px solid #f5b04233;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🎬 QAZAQ TUBE</div>
    <div class="controls">
        <select id="langSelect" style="background:#0f2b6e; color:#f5b042; border:1px solid #f5b042; border-radius:20px; padding:5px 10px;">
            <option value="kk">Қазақша</option>
            <option value="ru">Русский</option>
        </select>
        <div id="authButtons">
            <button class="btn-outline" onclick="showModal('loginModal')">Кіру</button>
            <button class="btn-primary" onclick="showModal('registerModal')">Тіркелу</button>
        </div>
        <div id="userPanel" style="display:none">
            <div class="user-info">
                <span id="userName"></span>
                <div class="avatar" id="userAvatar"></div>
                <button class="btn-outline" onclick="toggleUpload()">📤 Жүктеу</button>
                <button class="btn-outline" onclick="showSettings()">⚙️</button>
                <button class="btn-outline" onclick="logout()">Шығу</button>
            </div>
        </div>
    </div>
</div>

<!-- Панель загрузки видео -->
<div id="uploadPanel" class="upload-panel">
    <h4 style="margin-bottom:10px;">📤 Жаңа бейне</h4>
    <input type="text" id="videoTitle" placeholder="Бейне атауы">
    <textarea id="videoDesc" placeholder="Сипаттама" rows="2"></textarea>
    <input type="file" id="videoFile" accept="video/mp4,video/webm">
    <button class="btn-primary" onclick="uploadVideo()" style="width:100%">➕ Жүктеу</button>
</div>

<div class="container">
    <div id="videosList"></div>
</div>

<!-- Модалка регистрации -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2>📝 Тіркелу</h2>
        <input type="email" id="regEmail" placeholder="Email (example@gmail.com)">
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPass" placeholder="Құпия сөз">
        <input type="text" id="regCode" placeholder="6 таңбалы код">
        <button class="btn-primary" onclick="sendCode()" style="width:100%; margin-bottom:5px;">📧 Код жіберу</button>
        <button class="btn-primary" onclick="register()" style="width:100%">✅ Тіркелу</button>
        <button class="btn-outline" onclick="hideModal('registerModal')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка входа -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Кіру</h2>
        <input type="text" id="loginInput" placeholder="Логин немесе Email">
        <input type="password" id="loginPass" placeholder="Құпия сөз">
        <button class="btn-primary" onclick="login()" style="width:100%">Кіру</button>
        <button class="btn-outline" onclick="hideModal('loginModal')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка настроек -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>⚙️ Профиль</h2>
        <div id="settingsAvatar" class="profile-avatar"></div>
        <input type="text" id="settingsName" placeholder="Жаңа есім (ник)">
        <input type="text" id="settingsAvatarUrl" placeholder="Аватарка URL (немесе әріп)">
        <button class="btn-primary" onclick="saveSettings()" style="width:100%">Сақтау</button>
        <button class="btn-outline" onclick="hideModal('settingsModal')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Видео плеер -->
<div id="videoPlayer" class="video-player">
    <div class="close-video" onclick="closePlayer()">✕</div>
    <video id="playerVideo" controls></video>
</div>

<script>
    // ============ ТІЛДЕР ============
    const lang = {
        kk: { empty: "🎬 Бейнелер жоқ. Бірінші болып жүктеңіз!", likes: "лайк", views: "көрсетілім" },
        ru: { empty: "🎬 Видео нет. Будьте первым!", likes: "лайков", views: "просмотров" }
    };
    let currentLang = "kk";

    document.getElementById('langSelect').onchange = function() {
        currentLang = this.value;
        renderVideos();
    };

    // ============ ДЕРЕКТЕР ============
    let users = JSON.parse(localStorage.getItem('qt_users')) || [];
    let videos = JSON.parse(localStorage.getItem('qt_videos')) || [];
    let likes = JSON.parse(localStorage.getItem('qt_likes')) || {};
    let subs = JSON.parse(localStorage.getItem('qt_subs')) || {};
    let currentUser = null;
    let pendingCode = null;

    function saveData() {
        localStorage.setItem('qt_users', JSON.stringify(users));
        localStorage.setItem('qt_videos', JSON.stringify(videos));
        localStorage.setItem('qt_likes', JSON.stringify(likes));
        localStorage.setItem('qt_subs', JSON.stringify(subs));
    }

    // Регистрация
    function sendCode() {
        let email = document.getElementById('regEmail').value.trim();
        let login = document.getElementById('regLogin').value.trim();
        let pass = document.getElementById('regPass').value;
        
        if(!email || !login || !pass) { toast("Толтырыңыз!"); return; }
        
        let emailValid = /@(gmail\.com|yandex\.com|mail\.com|yandex\.ru|inbox\.ru)$/i.test(email);
        if(!emailValid) { toast("Тек @gmail.com, @yandex.com, @mail.com"); return; }
        if(users.find(u=>u.email===email)) { toast("Email тіркелген"); return; }
        if(users.find(u=>u.login===login)) { toast("Логин алынған"); return; }
        
        let code = Math.floor(100000 + Math.random() * 900000).toString();
        pendingCode = { email, login, pass, code };
        toast(`📧 Код: ${code}`);
        console.log("Код:", code);
    }

    function register() {
        if(!pendingCode) { toast("Алдымен код жіберіңіз"); return; }
        if(document.getElementById('regCode').value !== pendingCode.code) { toast("Қате код"); return; }
        
        let newUser = {
            id: Date.now(),
            login: pendingCode.login,
            email: pendingCode.email,
            password: pendingCode.pass,
            name: pendingCode.login,
            avatar: pendingCode.login[0].toUpperCase(),
            avatarType: 'text'
        };
        users.push(newUser);
        saveData();
        currentUser = newUser;
        localStorage.setItem('qt_current', JSON.stringify(newUser));
        hideModal('registerModal');
        updateUI();
        renderVideos();
        toast("Тіркелу сәтті! Қош келдіңіз!");
        clearRegForm();
        pendingCode = null;
    }

    function clearRegForm() {
        document.getElementById('regEmail').value = '';
        document.getElementById('regLogin').value = '';
        document.getElementById('regPass').value = '';
        document.getElementById('regCode').value = '';
    }

    // Вход
    function login() {
        let input = document.getElementById('loginInput').value.trim();
        let pass = document.getElementById('loginPass').value;
        let user = users.find(u => (u.login === input || u.email === input) && u.password === pass);
        if(!user) { toast("Қате логин немесе құпия сөз"); return; }
        currentUser = user;
        localStorage.setItem('qt_current', JSON.stringify(user));
        hideModal('loginModal');
        updateUI();
        renderVideos();
        toast(`Қош келдің, ${user.name || user.login}`);
        document.getElementById('loginInput').value = '';
        document.getElementById('loginPass').value = '';
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('qt_current');
        updateUI();
        renderVideos();
        toast("Шықтыңыз");
    }

    function updateUI() {
        if(currentUser) {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userPanel').style.display = 'block';
            document.getElementById('userName').innerText = currentUser.name || currentUser.login;
            let av = document.getElementById('userAvatar');
            if(currentUser.avatarType === 'url' && currentUser.avatar) {
                av.style.backgroundImage = `url(${currentUser.avatar})`;
                av.style.backgroundSize = 'cover';
                av.innerText = '';
            } else {
                av.style.backgroundImage = 'none';
                av.style.background = '#f5b042';
                av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
            }
        } else {
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userPanel').style.display = 'none';
        }
    }

    // Загрузка видео
    function toggleUpload() {
        let panel = document.getElementById('uploadPanel');
        panel.classList.toggle('show');
    }

    function uploadVideo() {
        if(!currentUser) { toast("Кіріңіз"); return; }
        let title = document.getElementById('videoTitle').value.trim();
        let desc = document.getElementById('videoDesc').value.trim();
        let file = document.getElementById('videoFile').files[0];
        
        if(!title) { toast("Атау керек"); return; }
        if(!file) { toast("Бейне файлды таңдаңыз"); return; }
        
        let reader = new FileReader();
        reader.onload = function(e) {
            let video = {
                id: Date.now(),
                title: title,
                desc: desc,
                authorId: currentUser.id,
                authorName: currentUser.name || currentUser.login,
                date: new Date().toISOString(),
                views: 0,
                src: e.target.result
            };
            videos.push(video);
            saveData();
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDesc').value = '';
            document.getElementById('videoFile').value = '';
            document.getElementById('uploadPanel').classList.remove('show');
            renderVideos();
            toast("Бейне жүктелді!");
        };
        reader.readAsDataURL(file);
    }

    // Лайки и подписки
    function toggleLike(videoId) {
        if(!currentUser) { toast("Лайк үшін кіріңіз"); return; }
        if(!likes[videoId]) likes[videoId] = [];
        let idx = likes[videoId].indexOf(currentUser.id);
        if(idx === -1) likes[videoId].push(currentUser.id);
        else likes[videoId].splice(idx, 1);
        saveData();
        renderVideos();
    }

    function toggleSubscribe(authorId) {
        if(!currentUser) { toast("Жазылу үшін кіріңіз"); return; }
        if(!subs[currentUser.id]) subs[currentUser.id] = [];
        let idx = subs[currentUser.id].indexOf(authorId);
        if(idx === -1) subs[currentUser.id].push(authorId);
        else subs[currentUser.id].splice(idx, 1);
        saveData();
        renderVideos();
    }

    function isLiked(videoId) {
        if(!currentUser) return false;
        return likes[videoId] && likes[videoId].includes(currentUser.id);
    }

    function isSubscribed(authorId) {
        if(!currentUser) return false;
        return subs[currentUser.id] && subs[currentUser.id].includes(authorId);
    }

    // Просмотр видео
    function playVideo(video) {
        let player = document.getElementById('playerVideo');
        player.src = video.src;
        video.views++;
        saveData();
        renderVideos();
        document.getElementById('videoPlayer').classList.add('show');
    }

    function closePlayer() {
        document.getElementById('videoPlayer').classList.remove('show');
        document.getElementById('playerVideo').pause();
    }

    // Настройки профиля
    function showSettings() {
        if(!currentUser) return;
        document.getElementById('settingsName').value = currentUser.name || '';
        document.getElementById('settingsAvatarUrl').value = (currentUser.avatarType === 'url' ? currentUser.avatar : '');
        let avDiv = document.getElementById('settingsAvatar');
        if(currentUser.avatarType === 'url' && currentUser.avatar) {
            avDiv.style.backgroundImage = `url(${currentUser.avatar})`;
            avDiv.style.backgroundSize = 'cover';
            avDiv.innerText = '';
        } else {
            avDiv.style.backgroundImage = 'none';
            avDiv.style.background = '#f5b042';
            avDiv.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        showModal('settingsModal');
    }

    function saveSettings() {
        let newName = document.getElementById('settingsName').value.trim();
        let avatarVal = document.getElementById('settingsAvatarUrl').value.trim();
        if(newName) currentUser.name = newName;
        if(avatarVal) {
            currentUser.avatar = avatarVal;
            currentUser.avatarType = 'url';
        } else {
            currentUser.avatar = currentUser.login[0].toUpperCase();
            currentUser.avatarType = 'text';
        }
        let idx = users.findIndex(u => u.id === currentUser.id);
        if(idx !== -1) users[idx] = currentUser;
        saveData();
        localStorage.setItem('qt_current', JSON.stringify(currentUser));
        updateUI();
        hideModal('settingsModal');
        renderVideos();
        toast("Профиль жаңартылды");
    }

    // Рендер видео
    function renderVideos() {
        let container = document.getElementById('videosList');
        if(videos.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:50px;">${lang[currentLang].empty}</div>`;
            return;
        }
        let html = '<div class="videos-grid">';
        for(let v of [...videos].reverse()) {
            let likeCount = likes[v.id] ? likes[v.id].length : 0;
            let liked = isLiked(v.id);
            let subbed = isSubscribed(v.authorId);
            html += `
                <div class="video-card">
                    <div class="video-thumb" onclick="playVideo(${JSON.stringify(v).replace(/"/g, '&quot;')})">
                        <video src="${v.src}" style="width:100%;height:100%;object-fit:cover;"></video>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(v.title)}</div>
                        <div class="video-stats">
                            <span>👤 ${escapeHtml(v.authorName)}</span>
                            <span>❤️ ${likeCount} ${lang[currentLang].likes}</span>
                            <span>👁️ ${v.views} ${lang[currentLang].views}</span>
                        </div>
                        <div class="video-actions">
                            <button class="${liked ? 'liked' : 'btn-outline'}" onclick="toggleLike('${v.id}')">❤️ ${likeCount}</button>
                            <button class="${subbed ? 'subscribed' : 'btn-outline'}" onclick="toggleSubscribe('${v.authorId}')">${subbed ? '✅ Жазылдыңыз' : '🔔 Жазылу'}</button>
                        </div>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    // Вспомогательные
    function toast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function showModal(id) {
        document.getElementById(id).classList.add('show');
    }

    function hideModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    // Загрузка сессии
    let saved = localStorage.getItem('qt_current');
    if(saved) {
        let u = JSON.parse(saved);
        let exists = users.find(x => x.id === u.id);
        if(exists) currentUser = exists;
        else localStorage.removeItem('qt_current');
    }
    updateUI();
    renderVideos();
</script>

<div class="footer">
    💙💛 QazaqTube — Видео жүктеу, профиль, лайктар, жазылулар
</div>

</body>
</html>
