<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube — Как YouTube</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #fff;
        }

        /* Хедер как в YouTube */
        .header {
            background: #0f0f0f;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #272727;
            position: sticky;
            top: 0;
            z-index: 200;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo i {
            background: none;
            color: #f5b042;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .lang-select {
            background: #272727;
            border: none;
            color: #f5b042;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }

        button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #f5b042;
            color: #0f0f0f;
        }

        .btn-outline {
            background: #272727;
            color: #fff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #272727;
            padding: 5px 15px 5px 10px;
            border-radius: 30px;
            cursor: pointer;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #0f0f0f;
            background-size: cover;
            background-position: center;
        }

        .hidden { display: none !important; }

        /* Главный контейнер */
        .main-container {
            display: flex;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            gap: 30px;
        }

        /* Видео плеер секция */
        .video-section {
            flex: 2.5;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }

        .video-wrapper video {
            width: 100%;
            display: block;
        }

        /* КАСТОМНЫЙ ПЛЕЕР КАК В YOUTUBE */
        .custom-player {
            position: relative;
            width: 100%;
        }

        .custom-player video {
            width: 100%;
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 16px 20px 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .custom-player:hover .player-controls {
            opacity: 1;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: #f5b042;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }

        .progress-fill::after {
            content: "";
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #f5b042;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-container:hover .progress-fill::after {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            color: #f5b042;
            transform: scale(1.05);
        }

        .time-display {
            color: white;
            font-size: 13px;
            font-family: monospace;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #f5b042;
            border-radius: 50%;
            cursor: pointer;
        }

        .right-controls {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        /* Информация о видео */
        .video-info-section {
            margin-top: 20px;
        }

        .video-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .video-stats {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
        }

        .channel-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid #272727;
            border-bottom: 1px solid #272727;
        }

        .channel-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #f5b042;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin-right: 12px;
        }

        .channel-name {
            font-weight: 600;
            font-size: 16px;
        }

        .subscribe-btn {
            background: #f5b042;
            color: #0f0f0f;
            padding: 8px 20px;
        }

        /* Рекомендации */
        .recommendations-section {
            flex: 1;
        }

        .recommendation-card {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .recommendation-card:hover {
            background: #272727;
        }

        .rec-thumb {
            width: 168px;
            height: 94px;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }

        .rec-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rec-info {
            flex: 1;
        }

        .rec-title {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .rec-channel {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 3px;
        }

        .rec-stats {
            font-size: 12px;
            color: #aaa;
        }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #202020;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #f5b042;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            background: #121212;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5b042;
            color: #0f0f0f;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 400;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #5a5a5a;
            border-top: 1px solid #272727;
            margin-top: 30px;
        }

        @media (max-width: 1000px) {
            .main-container { flex-direction: column; }
            .recommendations-section { margin-top: 30px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="goHome()"><i class="fab fa-youtube"></i> QazaqTube</div>
    <div class="controls">
        <select id="langSelect" class="lang-select">
            <option value="kk">🇰🇿 Қазақша</option>
            <option value="ru">🇷🇺 Русский</option>
        </select>
        <div id="unauthButtons">
            <button class="btn-outline" onclick="openModal('login')" data-lang-key="loginBtn">Кіру</button>
            <button class="btn-primary" onclick="openModal('register')" data-lang-key="registerBtn">Тіркелу</button>
        </div>
        <div id="authButtons" class="hidden">
            <div class="user-info" onclick="openProfileMenu()">
                <span id="userNameSpan"></span>
                <div class="avatar" id="avatarSpan"></div>
            </div>
        </div>
    </div>
</div>

<!-- Профиль меню -->
<div id="profileMenu" class="modal" style="justify-content: flex-end; align-items: flex-start; padding-top: 70px;">
    <div class="modal-content" style="width: 280px; margin-right: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="avatar" id="profileAvatar" style="width: 80px; height: 80px; margin: 0 auto 10px; font-size: 30px;"></div>
            <h3 id="profileDisplayName"></h3>
            <p style="color:#aaa; font-size:12px;">@<span id="profileLogin"></span></p>
        </div>
        <hr style="border-color:#3a3a3a; margin: 15px 0;">
        <button class="btn-outline" onclick="openSettings()" style="width:100%; margin-bottom:8px;"><i class="fas fa-user-edit"></i> <span data-lang-key="editProfile">Профильді өңдеу</span></button>
        <button class="btn-outline" onclick="openUploadSection()" style="width:100%; margin-bottom:8px;"><i class="fas fa-upload"></i> <span data-lang-key="uploadVideoBtn">Видео жүктеу</span></button>
        <button class="btn-primary" onclick="logout()" style="width:100%;"><i class="fas fa-sign-out-alt"></i> <span data-lang-key="logoutBtn">Шығу</span></button>
    </div>
</div>

<!-- Главный контент -->
<div class="main-container" id="mainContainer">
    <div class="video-section" id="videoSection">
        <div class="video-wrapper">
            <div class="custom-player" id="customPlayer">
                <video id="mainVideo" src=""></video>
                <div class="player-controls">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="controls-row">
                        <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                        <div class="volume-container">
                            <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
                        </div>
                        <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                        <div class="right-controls">
                            <button class="control-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="video-info-section" id="videoInfoSection">
            <div class="video-title" id="videoTitleDisplay"></div>
            <div class="video-stats" id="videoStatsDisplay"></div>
            <div class="channel-info" id="channelInfoDisplay"></div>
        </div>
    </div>
    <div class="recommendations-section">
        <h3 style="margin-bottom: 15px; font-size: 18px;" data-lang-key="recommendations">Ұсыныстар</h3>
        <div id="recommendationsList"></div>
    </div>
</div>

<!-- Модалка регистрации -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2>📝 <span data-lang-key="regTitle">Тіркелу</span></h2>
        <input type="email" id="regEmail" placeholder="Email (только @gmail.com, @mail.com)">
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPass" placeholder="Пароль">
        <div class="inline-buttons" style="display:flex; gap:10px;">
            <button class="btn-primary" onclick="sendVerificationCode()" style="flex:1">📧 Код жіберу</button>
        </div>
        <input type="text" id="regCode" placeholder="6 таңбалы код">
        <div class="code-hint" id="codeHint" style="display:none; font-size:12px; margin-bottom:10px; text-align:center;"></div>
        <button class="btn-primary" onclick="completeRegistration()" style="width:100%; margin-top:10px;">✅ Тіркелу</button>
        <button class="btn-outline" onclick="closeModal('register')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка входа -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>🔐 <span data-lang-key="loginTitle">Кіру</span></h2>
        <input type="text" id="loginInput" placeholder="Логин немесе Email">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button class="btn-primary" onclick="login()" style="width:100%">Кіру</button>
        <button class="btn-outline" onclick="closeModal('login')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка настроек -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>⚙️ <span data-lang-key="settingsTitle">Профиль</span></h2>
        <div id="settingsAvatar" style="width:80px;height:80px;border-radius:50%;background:#f5b042;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:32px;background-size:cover;"></div>
        <input type="text" id="settingsName" placeholder="Жаңа есім">
        <input type="text" id="settingsAvatarUrl" placeholder="Аватарка URL">
        <button class="btn-primary" onclick="saveSettings()" style="width:100%">Сақтау</button>
        <button class="btn-outline" onclick="closeModal('settings')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<script>
    // ============ ПЕРЕВОД ============
    const translations = {
        kk: {
            loginBtn: "Кіру", registerBtn: "Тіркелу", logoutBtn: "Шығу", editProfile: "Профильді өңдеу",
            uploadVideoBtn: "Видео жүктеу", recommendations: "Ұсыныстар", regTitle: "Тіркелу",
            loginTitle: "Кіру", settingsTitle: "Профиль", fillAll: "Барлық өрістерді толтырыңыз!",
            invalidEmail: "Қате email! Тек @gmail.com, @mail.com", emailExists: "Бұл email тіркелген!",
            loginExists: "Бұл логин алынған!", codeSent: "Код жіберілді!", wrongCode: "Қате код!",
            registerSuccess: "Тіркелу сәтті!", wrongCredentials: "Қате логин немесе пароль!",
            loginSuccess: "Қош келдіңіз!", logoutSuccess: "Шықтыңыз", needLogin: "Кіру қажет!",
            enterTitle: "Атауын енгізіңіз!", selectFile: "Файл таңдаңыз!", videoUploaded: "Жүктелді!",
            profileSaved: "Сақталды!", like: "лайк", subscribed: "Жазылдыңыз", subscribe: "Жазылу",
            views: "көрсетілім"
        },
        ru: {
            loginBtn: "Вход", registerBtn: "Регистрация", logoutBtn: "Выйти", editProfile: "Редактировать профиль",
            uploadVideoBtn: "Загрузить видео", recommendations: "Рекомендации", regTitle: "Регистрация",
            loginTitle: "Вход", settingsTitle: "Профиль", fillAll: "Заполните все поля!",
            invalidEmail: "Неверный email! Только @gmail.com, @mail.com", emailExists: "Email уже зарегистрирован!",
            loginExists: "Логин уже занят!", codeSent: "Код отправлен!", wrongCode: "Неверный код!",
            registerSuccess: "Регистрация успешна!", wrongCredentials: "Неверный логин или пароль!",
            loginSuccess: "Добро пожаловать!", logoutSuccess: "Вы вышли", needLogin: "Нужно войти!",
            enterTitle: "Введите название!", selectFile: "Выберите файл!", videoUploaded: "Загружено!",
            profileSaved: "Сохранено!", like: "лайков", subscribed: "Вы подписаны", subscribe: "Подписаться",
            views: "просмотров"
        }
    };
    
    let currentLang = localStorage.getItem('qaz_lang') || 'kk';
    
    function applyTranslation() {
        const t = translations[currentLang];
        document.querySelectorAll('[data-lang-key]').forEach(el => {
            const key = el.getAttribute('data-lang-key');
            if (t[key]) el.innerText = t[key];
        });
        document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
            const key = el.getAttribute('data-lang-placeholder');
            if (t[key]) el.placeholder = t[key];
        });
        document.querySelectorAll('[data-lang-html]').forEach(el => {
            const key = el.getAttribute('data-lang-html');
            if (t[key]) el.innerHTML = t[key];
        });
    }
    
    // ============ ДАННЫЕ ============
    let users = [];
    let videos = [];
    let likes = {};
    let subs = {};
    let currentUser = null;
    let pendingRegistration = null;
    let currentPlayingVideo = null;
    
    function loadData() {
        const savedUsers = localStorage.getItem('qaz_users');
        const savedVideos = localStorage.getItem('qaz_videos');
        const savedLikes = localStorage.getItem('qaz_likes');
        const savedSubs = localStorage.getItem('qaz_subs');
        const savedCurrent = localStorage.getItem('qaz_current');
        
        if(savedUsers) users = JSON.parse(savedUsers);
        if(savedVideos) videos = JSON.parse(savedVideos);
        if(savedLikes) likes = JSON.parse(savedLikes);
        if(savedSubs) subs = JSON.parse(savedSubs);
        if(savedCurrent) {
            const cur = JSON.parse(savedCurrent);
            const exists = users.find(u => String(u.id) === String(cur.id));
            if(exists) currentUser = exists;
        }
    }
    
    function saveData() {
        localStorage.setItem('qaz_users', JSON.stringify(users));
        localStorage.setItem('qaz_videos', JSON.stringify(videos));
        localStorage.setItem('qaz_likes', JSON.stringify(likes));
        localStorage.setItem('qaz_subs', JSON.stringify(subs));
        if(currentUser) localStorage.setItem('qaz_current', JSON.stringify(currentUser));
        else localStorage.removeItem('qaz_current');
    }
    
    function isValidEmail(email) {
        const allowed = ['gmail.com', 'mail.com', 'yandex.com', 'yandex.kz', 'mail.ru', 'bk.ru'];
        const domain = email.split('@')[1];
        return email.includes('@') && domain && allowed.some(d => domain.toLowerCase() === d);
    }
    
    function sendVerificationCode() {
        const t = translations[currentLang];
        const email = document.getElementById('regEmail').value.trim();
        const login = document.getElementById('regLogin').value.trim();
        const password = document.getElementById('regPass').value;
        
        if(!email || !login || !password) { toast(t.fillAll); return; }
        if(!isValidEmail(email)) { toast(t.invalidEmail); return; }
        if(users.find(u => u.email === email)) { toast(t.emailExists); return; }
        if(users.find(u => u.login === login)) { toast(t.loginExists); return; }
        
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        pendingRegistration = { email, login, password, code };
        document.getElementById('codeHint').style.display = 'block';
        document.getElementById('codeHint').innerHTML = `📧 ${t.codeSent} <strong>${code}</strong>`;
        toast(`${t.codeSent} ${code}`);
    }
    
    function completeRegistration() {
        const t = translations[currentLang];
        const enteredCode = document.getElementById('regCode').value.trim();
        if(!pendingRegistration) { toast(t.fillAll); return; }
        if(enteredCode !== pendingRegistration.code) { toast(t.wrongCode); return; }
        
        const newUser = {
            id: String(Date.now()),
            login: pendingRegistration.login,
            email: pendingRegistration.email,
            password: pendingRegistration.password,
            name: pendingRegistration.login,
            avatar: pendingRegistration.login[0].toUpperCase(),
            avatarUrl: null
        };
        users.push(newUser);
        currentUser = newUser;
        saveData();
        closeModal('register');
        updateUI();
        renderRecommendations();
        toast(t.registerSuccess);
        clearRegForm();
        pendingRegistration = null;
    }
    
    function clearRegForm() {
        document.getElementById('regEmail').value = '';
        document.getElementById('regLogin').value = '';
        document.getElementById('regPass').value = '';
        document.getElementById('regCode').value = '';
        document.getElementById('codeHint').style.display = 'none';
    }
    
    function login() {
        const t = translations[currentLang];
        const input = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('loginPass').value;
        const user = users.find(u => (u.login === input || u.email === input) && u.password === pass);
        if(!user) { toast(t.wrongCredentials); return; }
        currentUser = user;
        saveData();
        closeModal('login');
        updateUI();
        renderRecommendations();
        toast(t.loginSuccess);
        document.getElementById('loginInput').value = '';
        document.getElementById('loginPass').value = '';
    }
    
    function logout() {
        const t = translations[currentLang];
        currentUser = null;
        localStorage.removeItem('qaz_current');
        updateUI();
        renderRecommendations();
        toast(t.logoutSuccess);
        goHome();
    }
    
    function updateUI() {
        if(currentUser) {
            document.getElementById('unauthButtons').classList.add('hidden');
            document.getElementById('authButtons').classList.remove('hidden');
            document.getElementById('userNameSpan').innerText = currentUser.name || currentUser.login;
            const av = document.getElementById('avatarSpan');
            if(currentUser.avatarUrl) {
                av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
                av.style.backgroundSize = 'cover';
                av.innerText = '';
            } else {
                av.style.backgroundImage = 'none';
                av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
                av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
            }
        } else {
            document.getElementById('unauthButtons').classList.remove('hidden');
            document.getElementById('authButtons').classList.add('hidden');
        }
    }
    
    // Загрузка видео
    function uploadNewVideo() {
        const t = translations[currentLang];
        if(!currentUser) { toast(t.needLogin); return; }
        
        const title = prompt(t.enterTitle);
        if(!title) return;
        
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'video/mp4,video/webm';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) { toast(t.selectFile); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                const newVideo = {
                    id: String(Date.now()),
                    title: title,
                    desc: "",
                    authorId: currentUser.id,
                    authorName: currentUser.name || currentUser.login,
                    date: new Date().toISOString(),
                    views: 0,
                    src: ev.target.result
                };
                videos.push(newVideo);
                saveData();
                renderRecommendations();
                toast(t.videoUploaded);
                playVideo(newVideo);
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }
    
    function openUploadSection() {
        uploadNewVideo();
        closeModal('profileMenu');
    }
    
    function playVideo(video) {
        currentPlayingVideo = video;
        const mainVideo = document.getElementById('mainVideo');
        mainVideo.src = video.src;
        mainVideo.load();
        mainVideo.play();
        
        document.getElementById('videoTitleDisplay').innerText = video.title;
        const t = translations[currentLang];
        document.getElementById('videoStatsDisplay').innerHTML = `<i class="fas fa-eye"></i> ${video.views} ${t.views} • <i class="fas fa-heart"></i> ${likes[video.id] ? likes[video.id].length : 0} ${t.like}`;
        
        const isSubbed = currentUser && subs[currentUser.id] && subs[currentUser.id].includes(video.authorId);
        document.getElementById('channelInfoDisplay').innerHTML = `
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="channel-avatar">${video.authorName[0].toUpperCase()}</div>
                <div>
                    <div class="channel-name">${escapeHtml(video.authorName)}</div>
                    <div style="font-size:12px; color:#aaa;">${video.authorName}</div>
                </div>
            </div>
            <button class="subscribe-btn" onclick="event.stopPropagation(); subscribeToChannel('${video.authorId}'); playVideo(currentPlayingVideo);">${isSubbed ? t.subscribed : t.subscribe}</button>
        `;
        
        video.views++;
        saveData();
        renderRecommendations();
        setupPlayer();
    }
    
    function subscribeToChannel(authorId) {
        const t = translations[currentLang];
        if(!currentUser) { toast(t.needLogin); return; }
        if(!subs[currentUser.id]) subs[currentUser.id] = [];
        const idx = subs[currentUser.id].indexOf(authorId);
        if(idx === -1) subs[currentUser.id].push(authorId);
        else subs[currentUser.id].splice(idx, 1);
        saveData();
        if(currentPlayingVideo) playVideo(currentPlayingVideo);
        renderRecommendations();
    }
    
    function likeCurrentVideo() {
        if(!currentPlayingVideo) return;
        const t = translations[currentLang];
        if(!currentUser) { toast(t.needLogin); return; }
        const videoId = currentPlayingVideo.id;
        if(!likes[videoId]) likes[videoId] = [];
        const idx = likes[videoId].indexOf(currentUser.id);
        if(idx === -1) likes[videoId].push(currentUser.id);
        else likes[videoId].splice(idx, 1);
        saveData();
        playVideo(currentPlayingVideo);
    }
    
    function renderRecommendations() {
        const container = document.getElementById('recommendationsList');
        if(videos.length === 0) {
            container.innerHTML = '<div style="color:#aaa;">🎬 Видео жоқ</div>';
            return;
        }
        let html = '';
        const otherVideos = currentPlayingVideo ? videos.filter(v => v.id !== currentPlayingVideo.id) : videos;
        for(let v of otherVideos.slice().reverse()) {
            const likeCount = likes[v.id] ? likes[v.id].length : 0;
            html += `
                <div class="recommendation-card" onclick="playVideo(${JSON.stringify(v).replace(/"/g, '&quot;')})">
                    <div class="rec-thumb"><video src="${v.src}" style="width:100%;height:100%;object-fit:cover;"></video></div>
                    <div class="rec-info">
                        <div class="rec-title">${escapeHtml(v.title)}</div>
                        <div class="rec-channel">${escapeHtml(v.authorName)}</div>
                        <div class="rec-stats">${v.views} views • ❤️ ${likeCount}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    // КАСТОМНЫЙ ПЛЕЕР КАК В ЮТУБЕ
    function setupPlayer() {
        const video = document.getElementById('mainVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const player = document.getElementById('customPlayer');
        
        function formatTime(sec) {
            const mins = Math.floor(sec / 60);
            const secs = Math.floor(sec % 60);
            return `${mins}:${secs < 10 ? '0' + secs : secs}`;
        }
        
        function updateProgress() {
            if(video.duration) {
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                const percent = (video.currentTime / video.duration) * 100;
                progressFill.style.width = percent + '%';
            }
        }
        
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('loadedmetadata', updateProgress);
        
        playPauseBtn.onclick = () => {
            if(video.paused) { video.play(); playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { video.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };
        video.onplay = () => playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        video.onpause = () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        
        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        };
        
        muteBtn.onclick = () => {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            volumeSlider.value = video.muted ? 0 : video.volume;
        };
        
        volumeSlider.oninput = (e) => {
            video.volume = parseFloat(e.target.value);
            video.muted = false;
            muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        };
        
        fullscreenBtn.onclick = () => {
            if(player.requestFullscreen) player.requestFullscreen();
            else if(player.webkitRequestFullscreen) player.webkitRequestFullscreen();
        };
        
        video.onended = () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    }
    
    function openProfileMenu() {
        if(!currentUser) return;
        const av = document.getElementById('profileAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        document.getElementById('profileDisplayName').innerText = currentUser.name || currentUser.login;
        document.getElementById('profileLogin').innerText = currentUser.login;
        document.getElementById('profileMenu').style.display = 'flex';
    }
    
    function openSettings() {
        if(!currentUser) return;
        document.getElementById('settingsName').value = currentUser.name || '';
        document.getElementById('settingsAvatarUrl').value = currentUser.avatarUrl || '';
        const av = document.getElementById('settingsAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = 'linear-gradient(135deg, #f5b042, #ffd966)';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        closeModal('profileMenu');
        openModal('settings');
    }
    
    function saveSettings() {
        const t = translations[currentLang];
        const newName = document.getElementById('settingsName').value.trim();
        const newAvatar = document.getElementById('settingsAvatarUrl').value.trim();
        if(newName) currentUser.name = newName;
        if(newAvatar) currentUser.avatarUrl = newAvatar;
        else delete currentUser.avatarUrl;
        const idx = users.findIndex(u => u.id === currentUser.id);
        if(idx !== -1) users[idx] = currentUser;
        saveData();
        updateUI();
        closeModal('settings');
        toast(t.profileSaved);
        if(currentPlayingVideo) playVideo(currentPlayingVideo);
    }
    
    function goHome() {
        if(videos.length > 0) playVideo(videos[videos.length - 1]);
        else {
            document.getElementById('videoTitleDisplay').innerText = 'Видео жоқ';
            document.getElementById('videoStatsDisplay').innerHTML = '';
            document.getElementById('channelInfoDisplay').innerHTML = '';
            document.getElementById('mainVideo').src = '';
        }
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    function openModal(type) { document.getElementById(type + 'Modal').style.display = 'flex'; }
    function closeModal(type) { document.getElementById(type + 'Modal').style.display = 'none'; }
    
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    document.getElementById('langSelect').value = currentLang;
    document.getElementById('langSelect').onchange = () => {
        currentLang = document.getElementById('langSelect').value;
        localStorage.setItem('qaz_lang', currentLang);
        applyTranslation();
        if(currentPlayingVideo) playVideo(currentPlayingVideo);
        renderRecommendations();
    };
    
    window.onclick = (e) => {
        if(e.target.classList.contains('modal')) e.target.style.display = 'none';
    };
    
    loadData();
    applyTranslation();
    updateUI();
    if(videos.length > 0) playVideo(videos[videos.length - 1]);
    else renderRecommendations();
</script>

<div class="footer">
    <i class="fas fa-heart" style="color:#f5b042;"></i> QazaqTube — Как YouTube | Все данные в браузере
</div>
