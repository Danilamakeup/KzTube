<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube — AI Субтитры как в YouTube</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #fff; }
        
        .header {
            background: #0f0f0f;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #272727;
            position: sticky;
            top: 0;
            z-index: 200;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .lang-select {
            background: #272727;
            border: none;
            color: #f5b042;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }
        button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: #f5b042; color: #0f0f0f; }
        .btn-outline { background: #272727; color: #fff; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #272727;
            padding: 5px 15px 5px 10px;
            border-radius: 30px;
            cursor: pointer;
        }
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #0f0f0f;
            background-size: cover;
            background-position: center;
        }
        .hidden { display: none !important; }
        
        .nav-links {
            display: flex;
            gap: 30px;
            padding: 0 20px;
            border-bottom: 1px solid #272727;
        }
        .nav-link {
            padding: 12px 0;
            cursor: pointer;
            font-weight: 500;
            position: relative;
        }
        .nav-link.active { color: #f5b042; }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #f5b042;
        }
        
        .home-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; }
        .video-details { display: flex; gap: 12px; margin-top: 12px; }
        .video-channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f5b042;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .video-meta { flex: 1; }
        .video-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-name { font-size: 13px; color: #aaa; margin-bottom: 3px; }
        .video-stats { font-size: 12px; color: #aaa; }
        
        .profile-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 30px;
            background: #1a1a1a;
            border-radius: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .profile-big-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            background-size: cover;
        }
        .profile-stats { display: flex; gap: 40px; margin-top: 15px; flex-wrap: wrap; }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 24px; font-weight: bold; }
        .profile-stat-label { font-size: 13px; color: #aaa; }
        
        .watch-container { display: flex; max-width: 1600px; margin: 0 auto; padding: 20px; gap: 30px; flex-wrap: wrap; }
        .video-section { flex: 2.5; min-width: 280px; }
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 16px; overflow: hidden; }
        .custom-player { position: relative; width: 100%; }
        .custom-player video { width: 100%; display: block; }
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 16px 20px 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .custom-player:hover .player-controls { opacity: 1; }
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: #f5b042;
            border-radius: 2px;
            width: 0%;
        }
        .controls-row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
        .control-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 5px; }
        .control-btn:hover { color: #f5b042; }
        .time-display { color: white; font-size: 13px; font-family: monospace; }
        .volume-container { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 80px; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #f5b042; border-radius: 50%; cursor: pointer; }
        .right-controls { margin-left: auto; display: flex; gap: 15px; align-items: center; }
        .settings-btn { position: relative; }
        .settings-menu {
            position: absolute;
            bottom: 40px;
            right: 0;
            background: #202020;
            border-radius: 12px;
            padding: 10px;
            width: 180px;
            display: none;
            z-index: 300;
        }
        .settings-menu.show { display: block; }
        .settings-menu button { background: none; color: white; padding: 8px 12px; width: 100%; text-align: left; border-radius: 8px; }
        .settings-menu button:hover { background: #3a3a3a; }
        
        .video-info-section { margin-top: 20px; }
        .watch-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .watch-stats { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        .channel-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid #272727;
            border-bottom: 1px solid #272727;
            flex-wrap: wrap;
            gap: 15px;
        }
        .channel-left { display: flex; align-items: center; gap: 12px; }
        .channel-avatar-big { width: 48px; height: 48px; border-radius: 50%; background: #f5b042; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .subscribe-btn { background: #f5b042; color: #0f0f0f; padding: 8px 20px; }
        .subscribe-btn.disabled { background: #3a3a3a; color: #aaa; cursor: not-allowed; }
        .action-buttons { display: flex; gap: 20px; margin-top: 15px; }
        .action-btn { background: #272727; padding: 8px 16px; border-radius: 40px; font-size: 14px; cursor: pointer; }
        .action-btn.liked { background: #f5b042; color: #0f0f0f; }
        
        .recommendations-section { flex: 1; min-width: 280px; }
        .rec-title { font-size: 18px; margin-bottom: 15px; }
        .recommendation-card { display: flex; gap: 12px; margin-bottom: 15px; cursor: pointer; padding: 10px; border-radius: 12px; }
        .recommendation-card:hover { background: #272727; }
        .rec-thumb { width: 168px; height: 94px; background: #1a1a1a; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .rec-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .rec-info { flex: 1; }
        .rec-video-title { font-weight: 500; font-size: 14px; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Субтитры как в YouTube */
        .subtitles-container {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .subtitle-text {
            display: inline-block;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
            max-width: 85%;
            word-break: break-word;
            animation: subtitleFade 0.2s ease;
        }
        @keyframes subtitleFade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #202020;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content h2 { margin-bottom: 20px; color: #f5b042; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            background: #121212;
            color: white;
            font-family: inherit;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5b042;
            color: #0f0f0f;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 400;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .footer { text-align: center; padding: 20px; color: #5a5a5a; border-top: 1px solid #272727; margin-top: 30px; }
        @media (max-width: 768px) {
            .profile-header { flex-direction: column; text-align: center; }
            .watch-container { flex-direction: column; }
            .subtitle-text { font-size: 14px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="showHome()"><i class="fab fa-youtube"></i> QazaqTube</div>
    <div class="controls">
        <select id="langSelect" class="lang-select">
            <option value="kk">🇰🇿 Қазақша</option>
            <option value="ru">🇷🇺 Русский</option>
        </select>
        <div id="unauthButtons">
            <button class="btn-outline" id="loginBtn" onclick="openModal('login')">Кіру</button>
            <button class="btn-primary" id="registerBtn" onclick="openModal('register')">Тіркелу</button>
        </div>
        <div id="authButtons" class="hidden">
            <div class="user-info" onclick="openProfileMenu()">
                <span id="userNameSpan"></span>
                <div class="avatar" id="avatarSpan"></div>
            </div>
        </div>
    </div>
</div>

<div class="nav-links" id="navLinks" style="display: none;">
    <div class="nav-link active" id="homeNav" onclick="showHome()">🏠 Басты</div>
    <div class="nav-link" id="profileNav" onclick="showProfile()">👤 Менің каналым</div>
</div>

<div id="homePage" class="home-container">
    <div class="videos-grid" id="homeVideosGrid"></div>
</div>

<div id="profilePage" class="profile-container" style="display: none;">
    <div class="profile-header">
        <div class="profile-big-avatar" id="profileBigAvatar"></div>
        <div>
            <h2 id="profileName"></h2>
            <p style="color:#aaa;">@<span id="profileLoginName"></span></p>
            <div class="profile-stats">
                <div class="profile-stat"><div class="profile-stat-value" id="profileSubsCount">0</div><div class="profile-stat-label" id="subsLabel">жазылушы</div></div>
                <div class="profile-stat"><div class="profile-stat-value" id="profileVideosCount">0</div><div class="profile-stat-label" id="videosLabel">видео</div></div>
                <div class="profile-stat"><div class="profile-stat-value" id="profileLikesCount">0</div><div class="profile-stat-label" id="likesLabel">лайк</div></div>
            </div>
            <button class="btn-outline" id="editProfileBtn" onclick="openEditProfileModal()" style="margin-top: 15px;"><i class="fas fa-edit"></i> <span id="editProfileText">Профильді өңдеу</span></button>
            <button class="btn-primary" id="uploadVideoBtn" onclick="openUploadModal()" style="margin-top: 15px; margin-left: 10px;"><i class="fas fa-upload"></i> <span id="uploadVideoText">Видео жүктеу</span></button>
        </div>
    </div>
    <h3 id="myVideosTitle" style="margin-bottom: 20px;">📹 Менің видеоым</h3>
    <div class="videos-grid" id="profileVideosGrid"></div>
</div>

<div id="watchPage" class="watch-container" style="display: none;">
    <div class="video-section">
        <div class="video-wrapper">
            <div class="custom-player" id="customPlayer">
                <video id="mainVideo" src=""></video>
                <div class="subtitles-container" id="subtitlesContainer" style="display: none;">
                    <div class="subtitle-text" id="subtitleText"></div>
                </div>
                <div class="player-controls">
                    <div class="progress-container" id="progressContainer"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="controls-row">
                        <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                        <div class="volume-container">
                            <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
                        </div>
                        <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                        <div class="right-controls">
                            <div class="settings-btn">
                                <button class="control-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                                <div class="settings-menu" id="settingsMenu">
                                    <button id="qualityAuto" onclick="changeQuality('auto')">Авто качество</button>
                                    <button id="quality1080" onclick="changeQuality('1080p')">1080p</button>
                                    <hr style="margin:5px 0;">
                                    <button id="speed05" onclick="changeSpeed(0.5)">0.5x</button>
                                    <button id="speed075" onclick="changeSpeed(0.75)">0.75x</button>
                                    <button id="speed1" onclick="changeSpeed(1)">1x</button>
                                    <button id="speed125" onclick="changeSpeed(1.25)">1.25x</button>
                                    <button id="speed15" onclick="changeSpeed(1.5)">1.5x</button>
                                    <button id="speed2" onclick="changeSpeed(2)">2x</button>
                                    <hr style="margin:5px 0;">
                                    <button id="subtitlesBtn" onclick="toggleSubtitles()">Субтитры (AI)</button>
                                </div>
                            </div>
                            <button class="control-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="video-info-section" id="watchInfoSection"></div>
    </div>
    <div class="recommendations-section">
        <div class="rec-title" id="recommendationsTitle">Ұсыныстар</div>
        <div id="recommendationsList"></div>
    </div>
</div>

<!-- Модалки -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2 id="uploadModalTitle">📤 Видео жүктеу</h2>
        <input type="text" id="uploadTitle" id="uploadTitleInput" placeholder="Бейне атауы *">
        <textarea id="uploadDesc" placeholder="Сипаттама" rows="3"></textarea>
        <input type="file" id="uploadFile" accept="video/mp4,video/webm">
        <button class="btn-primary" id="uploadConfirmBtn" onclick="confirmUpload()" style="width:100%; margin-top:10px;">✅ Жүктеу</button>
        <button class="btn-outline" id="uploadCloseBtn" onclick="closeModal('upload')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="editProfileModal" class="modal">
    <div class="modal-content">
        <h2 id="editProfileModalTitle">✏️ Профильді өңдеу</h2>
        <div id="editAvatar" style="width:80px;height:80px;border-radius:50%;background:#f5b042;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:32px;background-size:cover;"></div>
        <input type="text" id="editName" id="editNameInput" placeholder="Жаңа есім (ник)">
        <input type="text" id="editAvatarUrl" placeholder="Аватарка URL">
        <button class="btn-primary" id="saveProfileBtn" onclick="saveProfileEdit()" style="width:100%">💾 Сақтау</button>
        <button class="btn-outline" id="closeProfileBtn" onclick="closeModal('editProfile')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2 id="regTitle">📝 Тіркелу</h2>
        <input type="email" id="regEmail" id="regEmailInput" placeholder="Email (@gmail.com, @mail.com)">
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPass" placeholder="Пароль">
        <button class="btn-primary" id="sendCodeBtn" onclick="sendVerificationCode()" style="width:100%">📧 Код жіберу</button>
        <input type="text" id="regCode" placeholder="6 таңбалы код" style="margin-top:10px;">
        <div id="codeHint" style="display:none; font-size:12px; text-align:center; margin:10px 0;"></div>
        <button class="btn-primary" id="completeRegBtn" onclick="completeRegistration()" style="width:100%; margin-top:10px;">✅ Тіркелу</button>
        <button class="btn-outline" id="closeRegBtn" onclick="closeModal('register')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 id="loginTitle">🔐 Кіру</h2>
        <input type="text" id="loginInput" placeholder="Логин немесе Email">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button class="btn-primary" id="loginSubmitBtn" onclick="login()" style="width:100%">Кіру</button>
        <button class="btn-outline" id="loginCloseBtn" onclick="closeModal('login')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<script>
    // ============ ПЕРЕВОД ============
    const translations = {
        kk: {
            loginBtn: "Кіру", registerBtn: "Тіркелу", logoutBtn: "Шығу",
            editProfileText: "Профильді өңдеу", uploadVideoText: "Видео жүктеу",
            myVideosTitle: "📹 Менің видеоым", recommendationsTitle: "Ұсыныстар",
            subsLabel: "жазылушы", videosLabel: "видео", likesLabel: "лайк",
            homeNav: "🏠 Басты", profileNav: "👤 Менің каналым",
            uploadModalTitle: "📤 Видео жүктеу", uploadConfirmBtn: "✅ Жүктеу", uploadCloseBtn: "Жабу",
            editProfileModalTitle: "✏️ Профильді өңдеу", saveProfileBtn: "💾 Сақтау", closeProfileBtn: "Жабу",
            regTitle: "📝 Тіркелу", sendCodeBtn: "📧 Код жіберу", completeRegBtn: "✅ Тіркелу", closeRegBtn: "Жабу",
            loginTitle: "🔐 Кіру", loginSubmitBtn: "Кіру", loginCloseBtn: "Жабу",
            qualityAuto: "Авто качество", quality1080: "1080p", subtitlesBtn: "Субтитры (AI)",
            speed05: "0.5x", speed075: "0.75x", speed1: "1x", speed125: "1.25x", speed15: "1.5x", speed2: "2x",
            fillAll: "Барлық өрістерді толтырыңыз!", invalidEmail: "Қате email! Тек @gmail.com, @mail.com, @yandex.com",
            emailExists: "Бұл email тіркелген!", loginExists: "Бұл логин алынған!",
            codeSent: "Код жіберілді!", wrongCode: "Қате код!", registerSuccess: "Тіркелу сәтті! Қош келдіңіз!",
            wrongCredentials: "Қате логин немесе пароль!", loginSuccess: "Қош келдіңіз!",
            logoutSuccess: "Шықтыңыз", needLogin: "Кіру қажет!", enterTitle: "Атауын енгізіңіз!",
            selectFile: "Файл таңдаңыз!", videoUploaded: "Видео жүктелді!", profileSaved: "Профиль жаңартылды!",
            cantSubscribe: "Өзіңізге жазыла алмайсыз!", subscribed: "Жазылдыңыз ✅", unsubscribed: "Жазылымнан шықтыңыз ❌",
            needLoginSubscribe: "Кіру қажет!", needLoginLike: "Кіру қажет!",
            views: "көрсетілім", like: "лайк", subscribers: "жазылушы"
        },
        ru: {
            loginBtn: "Вход", registerBtn: "Регистрация", logoutBtn: "Выйти",

    function generateRealAISubtitles(duration) {
        const phrases = subtitlePhrases[currentLang] || subtitlePhrases.kk;
        const subtitles = [];
        const interval = 4; // фраза каждые 4 секунды
        let time = 1;
        while(time < duration) {
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            subtitles.push({ time: time, text: randomPhrase });
            time += interval;
        }
        return subtitles;
    }
    
    function loadData() {
        const savedUsers = localStorage.getItem('qaz_users_final2');

        const savedSubs = localStorage.getItem('qaz_subs_final2');
        const savedCurrent = localStorage.getItem('qaz_current_final2');
        const savedViews = localStorage.getItem('qaz_views_final2');
        
        if(savedUsers) users = JSON.parse(savedUsers);
        if(savedVideos) videos = JSON.parse(savedVideos);
        if(savedLikes) likes = JSON.parse(savedLikes);
        if(savedSubs) subs = JSON.parse(savedSubs);
        if(savedCurrent) {
            const cur = JSON.parse(savedCurrent);
            const exists = users.find(u => String(u.id) === String(cur.id));
            if(exists) currentUser = exists;
        }
        if(savedViews) viewsRecord = new Set(JSON.parse(savedViews));
    }
    
    function saveData() {
        localStorage.setItem('qaz_users_final2', JSON.stringify(users));
        localStorage.setItem('qaz_videos_final2', JSON.stringify(videos));
        localStorage.setItem('qaz_likes_final2', JSON.stringify(likes));
        localStorage.setItem('qaz_subs_final2', JSON.stringify(subs));
        localStorage.setItem('qaz_views_final2', JSON.stringify([...viewsRecord]));
        if(currentUser) localStorage.setItem('qaz_current_final2', JSON.stringify(currentUser));
        else localStorage.removeItem('qaz_current_final2');
    }
    
    function getSubscriberCount(channelId) {
        let count = 0;
        for(let userId in subs) {
            if(subs[userId] && subs[userId].includes(channelId)) count++;
        }
        return count;
    }
    
    function getUserLikesCount(userId) {
        let total = 0;
        for(let video of videos) {
            if(video.authorId === userId && likes[video.id]) total += likes[video.id].length;
        }
        return total;
    }
    
    function isValidEmail(email) {
        const allowed = ['gmail.com', 'mail.com', 'yandex.com', 'yandex.kz', 'mail.ru', 'bk.ru'];
        const domain = email.split('@')[1];
        return email.includes('@') && domain && allowed.some(d => domain.toLowerCase() === d);
    }

    function openWatchPage(videoId) {
        const t = translations[currentLang];
        const video = videos.find(v => v.id === videoId);

        currentPlayingVideo = video;
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('profilePage').style.display = 'none';

        document.querySelectorAll('.nav-link')[0].classList.add('active');
        
        const mainVideo = document.getElementById('mainVideo');
        mainVideo.src = video.src;
        mainVideo.load();
        
        // Получаем длительность видео для генерации субтитров
        mainVideo.onloadedmetadata = () => {
            if(!video.subtitles || video.subtitles.length === 0) {
                video.subtitles = generateRealAISubtitles(mainVideo.duration || 60);
                saveData();
            }
            currentSubtitles = video.subtitles;
        };
        
        const likeCount = likes[video.id] ? likes[video.id].length : 0;
        const isLiked = currentUser && likes[video.id] && likes[video.id].includes(currentUser.id);
        const isSubscribed = currentUser && subs[currentUser.id] && subs[currentUser.id].includes(video.authorId);
        const isOwn = currentUser && currentUser.id === video.authorId;
        
        document.getElementById('watchInfoSection').innerHTML = `
            <div class="watch-title">${escapeHtml(video.title)}</div>
            <div class="watch-stats" id="watchStats">${video.views} ${t.views} • ${likeCount} ${t.like}</div>
            <div class="channel-info">
                <div class="channel-left">
                    <div class="channel-avatar-big">${video.authorName[0].toUpperCase()}</div>
                    <div>
                        <div class="channel-name-big">${escapeHtml(video.authorName)}</div>
                        <div style="font-size:12px;">${getSubscriberCount(video.authorId)} ${t.subscribers}</div>
                    </div>
                </div>
                <button class="subscribe-btn ${isOwn ? 'disabled' : ''}" onclick="subscribeAction('${video.authorId}')" ${isOwn ? 'disabled' : ''}>${isOwn ? 'Бұл сізсіз' : (isSubscribed ? '✅ ' + t.subscribed : '🔔 ' + t.subscribe)}</button>
            </div>
            <div class="action-buttons">
                <div class="action-btn ${isLiked ? 'liked' : ''}" onclick="likeAction()"><i class="fas fa-thumbs-up"></i> <span id="likeCountDisplay">${likeCount}</span></div>
            </div>
        `;
        
        // Просмотр только один раз
        const viewKey = `${currentUser ? currentUser.id : 'guest'}_${video.id}`;
        if(!viewsRecord.has(viewKey) && (!currentUser || currentUser.id !== video.authorId)) {
            video.views++;
            viewsRecord.add(viewKey);
            saveData();
            const statsEl = document.getElementById('watchStats');
            if(statsEl) statsEl.innerHTML = `${video.views} ${t.views} • ${likeCount} ${t.like}`;
        }
        
        renderRecommendations(video.id);
        setupPlayer();
    }

                        <div class="rec-video-title">${escapeHtml(v.title)}</div>
                        <div class="rec-channel-name">${escapeHtml(v.authorName)}</div>
                        <div class="rec-video-stats">${v.views} ${t.views}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function subscribeAction(authorId) {
        const t = translations[currentLang];
        if(!currentUser) { toast(t.needLoginSubscribe); return; }
        if(currentUser.id === authorId) { toast(t.cantSubscribe); return; }
        if(!subs[currentUser.id]) subs[currentUser.id] = [];
        const idx = subs[currentUser.id].indexOf(authorId);
        if(idx === -1) {
            subs[currentUser.id].push(authorId);
            toast(t.subscribed);
        } else {
            subs[currentUser.id].splice(idx, 1);
            toast(t.unsubscribed);
        }
        saveData();
        if(currentPlayingVideo) openWatchPage(currentPlayingVideo.id);
    }
    
    function likeAction() {
        const t = translations[currentLang];
        if(!currentPlayingVideo) return;
        if(!currentUser) { toast(t.needLoginLike); return; }
        if(!likes[currentPlayingVideo.id]) likes[currentPlayingVideo.id] = [];
        const idx = likes[currentPlayingVideo.id].indexOf(currentUser.id);
        if(idx === -1) likes[currentPlayingVideo.id].push(currentUser.id);
        else likes[currentPlayingVideo.id].splice(idx, 1);
        saveData();
        openWatchPage(currentPlayingVideo.id);
    }
    
    function showHome() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('watchPage').style.display = 'none';
        document.getElementById('profilePage').style.display = 'none';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.nav-link')[0].classList.add('active');
        const video = document.getElementById('mainVideo');
        if(video) video.pause();
        renderHomePage();
    }
    
    function changeQuality(q) { 
        const t = translations[currentLang];
        toast(`${t.qualityAuto}: ${q}`); 
        document.getElementById('settingsMenu').classList.remove('show'); 
    }
    function changeSpeed(s) { 
        document.getElementById('mainVideo').playbackRate = s; 
        const t = translations[currentLang];
        toast(`${t.speed1}: ${s}x`); 
        document.getElementById('settingsMenu').classList.remove('show'); 
    }
    
    function toggleSubtitles() {
        const t = translations[currentLang];
        subtitlesEnabled = !subtitlesEnabled;
        const container = document.getElementById('subtitlesContainer');
        if(subtitlesEnabled && currentSubtitles && currentSubtitles.length) {
            container.style.display = 'block';
            if(subtitleInterval) clearInterval(subtitleInterval);
            const video = document.getElementById('mainVideo');
            const subtitleText = document.getElementById('subtitleText');
            subtitleInterval = setInterval(() => {
                if(!subtitlesEnabled || !video || video.paused) return;
                const ct = video.currentTime;
                let active = null;
                for(let s of currentSubtitles) {
                    if(ct >= s.time) active = s;
                    else break;
                }
                if(active) subtitleText.textContent = active.text;
                else subtitleText.textContent = '';
            }, 200);
            toast(t.subtitlesBtn + ' ✅');
        } else {
            container.style.display = 'none';
            if(subtitleInterval) clearInterval(subtitleInterval);
            toast(t.subtitlesBtn + ' ❌');
        }
    }
    
    function setupPlayer() {
        const video = document.getElementById('mainVideo');
        const playPause = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const muteBtn = document.getElementById('muteBtn');
        const volume = document.getElementById('volumeSlider');
        const timeDisp = document.getElementById('timeDisplay');
        const fullscreen = document.getElementById('fullscreenBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const player = document.getElementById('customPlayer');
        
        function format(sec) {
            if(isNaN(sec)) return '0:00';
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' + s : s}`;
        }
        function update() {
            if(video.duration) {
                timeDisp.textContent = `${format(video.currentTime)} / ${format(video.duration)}`;
                progressFill.style.width = (video.currentTime / video.duration) * 100 + '%';
            }
        }
        video.addEventListener('timeupdate', update);
        video.addEventListener('loadedmetadata', update);
        playPause.onclick = () => video.paused ? video.play() : video.pause();
        video.onplay = () => playPause.innerHTML = '<i class="fas fa-pause"></i>';
        video.onpause = () => playPause.innerHTML = '<i class="fas fa-play"></i>';
        progressBar.onclick = (e) => {
            const rect = progressBar.getBoundingClientRect();
            video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
        };
        muteBtn.onclick = () => {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            volume.value = video.muted ? 0 : video.volume;
        };
        volume.oninput = (e) => { video.volume = parseFloat(e.target.value); video.muted = false; muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>'; };
        fullscreen.onclick = () => { if(player.requestFullscreen) player.requestFullscreen(); };
        settingsBtn.onclick = (e) => { e.stopPropagation(); settingsMenu.classList.toggle('show'); };
        document.addEventListener('click', () => settingsMenu.classList.remove('show'));
        video.play();
    }
    
    function openProfileMenu() {
        const t = translations[currentLang];
        if(!currentUser) return;
        toast(`👤 ${currentUser.name || currentUser.login}\n📹 ${t.videosLabel}: ${videos.filter(v => v.authorId === currentUser.id).length}\n👥 ${t.subsLabel}: ${getSubscriberCount(currentUser.id)}\n❤️ ${t.likesLabel}: ${getUserLikesCount(currentUser.id)}`);
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    function openModal(type) { document.getElementById(type + 'Modal').style.display = 'flex'; }
    function closeModal(type) { document.getElementById(type + 'Modal').style.display = 'none'; }
    
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    window.onclick = (e) => { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; };
    
    loadData();
    applyTranslation();
    updateUI();
    renderHomePage();
    
    // Экспорт
    window.showHome = showHome;
    window.showProfile = showProfile;
    window.openWatchPage = openWatchPage;
    window.openUploadModal = openUploadModal;
    window.confirmUpload = confirmUpload;
    window.openEditProfileModal = openEditProfileModal;
    window.saveProfileEdit = saveProfileEdit;
    window.subscribeAction = subscribeAction;
    window.likeAction = likeAction;
    window.changeQuality = changeQuality;
    window.changeSpeed = changeSpeed;
    window.toggleSubtitles = toggleSubtitles;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.sendVerificationCode = sendVerificationCode;
    window.completeRegistration = completeRegistration;
    window.login = login;
    window.logout = logout;
</script>

<div class="footer">
    <i class="fas fa-heart" style="color:#f5b042;"></i> QazaqTube — AI субтитры как в YouTube | Просмотры только 1 раз
