<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QazaqTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a2463;
            color: white;
        }
        .header {
            background: #030c1f;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f5b042;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #f5b042;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-primary {
            background: #f5b042;
            color: #0a2463;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #f5b042;
            color: #f5b042;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(245,176,66,0.2);
            padding: 5px 15px;
            border-radius: 40px;
        }
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f5b042;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a2463;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .upload-area {
            background: #0a1b44;
            border: 1px solid #f5b042;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .upload-area input, .upload-area textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #f5b042;
            background: #061b44;
            color: white;
        }
        .upload-area input[type="file"] {
            background: #061b44;
        }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-card {
            background: rgba(6, 28, 78, 0.8);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(245,176,66,0.3);
        }
        .video-card:hover {
            transform: translateY(-3px);
            border-color: #f5b042;
        }
        .video-thumb {
            width: 100%;
            height: 160px;
            background: #071c47;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-info {
            padding: 12px;
        }
        .video-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .video-stats {
            font-size: 12px;
            color: #bbd4ff;
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .video-actions {
            display: flex;
            gap: 10px;
        }
        .video-actions button {
            padding: 5px 12px;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0a1b44;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #f5b042;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #f5b042;
            background: #061b44;
            color: white;
        }
        .modal-content h2 {
            margin-bottom: 15px;
            color: #f5b042;
        }
        .video-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .video-player video {
            max-width: 90%;
            max-height: 80%;
        }
        .close-video {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: #f5b042;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5b042;
            color: #0a2463;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 300;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #f5b042aa;
            border-top: 1px solid #f5b04233;
            margin-top: 30px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🎬 QAZAQ TUBE</div>
    <div class="controls">
        <select id="langSelect" style="background:#0f2b6e; color:#f5b042; border:1px solid #f5b042; border-radius:20px; padding:5px 10px;">
            <option value="kk">Қазақша</option>
            <option value="ru">Русский</option>
        </select>
        <div id="unauthButtons">
            <button class="btn-outline" onclick="openModal('login')">Кіру</button>
            <button class="btn-primary" onclick="openModal('register')">Тіркелу</button>
        </div>
        <div id="authButtons" class="hidden">
            <div class="user-info">
                <span id="userNameSpan"></span>
                <div class="avatar" id="avatarSpan"></div>
                <button class="btn-outline" onclick="openSettings()">⚙️</button>
                <button class="btn-outline" onclick="logout()">Шығу</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="uploadSection" class="upload-area hidden">
        <h4>📤 Жаңа бейне жүктеу</h4>
        <input type="text" id="videoTitle" placeholder="Бейне атауы">
        <textarea id="videoDesc" placeholder="Сипаттама" rows="2"></textarea>
        <input type="file" id="videoFile" accept="video/mp4,video/webm">
        <button class="btn-primary" onclick="uploadVideo()">➕ Жүктеу</button>
    </div>
    <div id="videosContainer"></div>
</div>

<!-- Модалка регистрации -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2>📝 Тіркелу</h2>
        <input type="email" id="regEmail" placeholder="Email">
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPass" placeholder="Құпия сөз">
        <button class="btn-primary" onclick="register()" style="width:100%">Тіркелу</button>
        <button class="btn-outline" onclick="closeModal('register')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка входа -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Кіру</h2>
        <input type="text" id="loginInput" placeholder="Логин немесе Email">
        <input type="password" id="loginPass" placeholder="Құпия сөз">
        <button class="btn-primary" onclick="login()" style="width:100%">Кіру</button>
        <button class="btn-outline" onclick="closeModal('login')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Модалка настроек -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>⚙️ Профиль</h2>
        <div id="settingsAvatar" style="width:80px;height:80px;border-radius:50%;background:#f5b042;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:bold;"></div>
        <input type="text" id="settingsName" placeholder="Жаңа есім">
        <input type="text" id="settingsAvatarUrl" placeholder="Аватарка URL">
        <button class="btn-primary" onclick="saveSettings()" style="width:100%">Сақтау</button>
        <button class="btn-outline" onclick="closeModal('settings')" style="width:100%; margin-top:10px;">Жабу</button>
    </div>
</div>

<!-- Видео плеер -->
<div id="videoPlayer" class="video-player">
    <div class="close-video" onclick="closePlayer()">✕</div>
    <video id="playerVideo" controls></video>
</div>

<script>
    // Данные
    let users = [];
    let videos = [];
    let likes = {};
    let subs = {};
    let currentUser = null;
    
    // Загрузка сохраненных данных
    function loadData() {
        let savedUsers = localStorage.getItem('qaz_users');
        let savedVideos = localStorage.getItem('qaz_videos');
        let savedLikes = localStorage.getItem('qaz_likes');
        let savedSubs = localStorage.getItem('qaz_subs');
        let savedCurrent = localStorage.getItem('qaz_current');
        
        if(savedUsers) users = JSON.parse(savedUsers);
        if(savedVideos) videos = JSON.parse(savedVideos);
        if(savedLikes) likes = JSON.parse(savedLikes);
        if(savedSubs) subs = JSON.parse(savedSubs);
        if(savedCurrent) {
            let cur = JSON.parse(savedCurrent);
            let exists = users.find(u => u.id === cur.id);
            if(exists) currentUser = exists;
        }
    }
    
    // Сохранение данных
    function saveData() {
        localStorage.setItem('qaz_users', JSON.stringify(users));
        localStorage.setItem('qaz_videos', JSON.stringify(videos));
        localStorage.setItem('qaz_likes', JSON.stringify(likes));
        localStorage.setItem('qaz_subs', JSON.stringify(subs));
        if(currentUser) localStorage.setItem('qaz_current', JSON.stringify(currentUser));
        else localStorage.removeItem('qaz_current');
    }
    
    // Регистрация (без кода для простоты)
    function register() {
        let email = document.getElementById('regEmail').value.trim();
        let login = document.getElementById('regLogin').value.trim();
        let pass = document.getElementById('regPass').value;
        
        if(!email || !login || !pass) {
            toast("Барлық өрістерді толтырыңыз!");
            return;
        }
        
        if(users.find(u => u.email === email)) {
            toast("Бұл email тіркелген!");
            return;
        }
        
        if(users.find(u => u.login === login)) {
            toast("Бұл логин алынған!");
            return;
        }
        
        let newUser = {
            id: Date.now(),
            login: login,
            email: email,
            password: pass,
            name: login,
            avatar: login[0].toUpperCase()
        };
        
        users.push(newUser);
        currentUser = newUser;
        saveData();
        
        closeModal('register');
        updateUI();
        renderVideos();
        toast("Тіркелу сәтті! Қош келдіңіз!");
        
        document.getElementById('regEmail').value = '';
        document.getElementById('regLogin').value = '';
        document.getElementById('regPass').value = '';
    }
    
    // Вход
    function login() {
        let input = document.getElementById('loginInput').value.trim();
        let pass = document.getElementById('loginPass').value;
        
        let user = users.find(u => (u.login === input || u.email === input) && u.password === pass);
        
        if(!user) {
            toast("Қате логин/email немесе құпия сөз!");
            return;
        }
        
        currentUser = user;
        saveData();
        closeModal('login');
        updateUI();
        renderVideos();
        toast(`Қош келдің, ${user.name || user.login}!`);
        
        document.getElementById('loginInput').value = '';
        document.getElementById('loginPass').value = '';
    }
    
    // Выход
    function logout() {
        currentUser = null;
        localStorage.removeItem('qaz_current');
        updateUI();
        renderVideos();
        toast("Сіз шықтыңыз");
    }
    
    // Обновление интерфейса
    function updateUI() {
        if(currentUser) {
            document.getElementById('unauthButtons').classList.add('hidden');
            document.getElementById('authButtons').classList.remove('hidden');
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('userNameSpan').innerText = currentUser.name || currentUser.login;
            
            let av = document.getElementById('avatarSpan');
            if(currentUser.avatarUrl) {
                av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
                av.style.backgroundSize = 'cover';
                av.innerText = '';
            } else {
                av.style.backgroundImage = 'none';
                av.style.background = '#f5b042';
                av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
            }
        } else {
            document.getElementById('unauthButtons').classList.remove('hidden');
            document.getElementById('authButtons').classList.add('hidden');
            document.getElementById('uploadSection').classList.add('hidden');
        }
    }
    
    // Загрузка видео
    function uploadVideo() {
        if(!currentUser) {
            toast("Кіру қажет!");
            return;
        }
        
        let title = document.getElementById('videoTitle').value.trim();
        let desc = document.getElementById('videoDesc').value.trim();
        let file = document.getElementById('videoFile').files[0];
        
        if(!title) {
            toast("Бейне атауын енгізіңіз!");
            return;
        }
        
        if(!file) {
            toast("Бейне файлды таңдаңыз!");
            return;
        }
        
        let reader = new FileReader();
        reader.onload = function(e) {
            let newVideo = {
                id: Date.now(),
                title: title,
                desc: desc,
                authorId: currentUser.id,
                authorName: currentUser.name || currentUser.login,
                date: new Date().toISOString(),
                views: 0,
                src: e.target.result
            };
            videos.push(newVideo);
            saveData();
            
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDesc').value = '';
            document.getElementById('videoFile').value = '';
            
            renderVideos();
            toast("Бейне жүктелді!");
        };
        reader.readAsDataURL(file);
    }
    
    // Лайк
    function likeVideo(videoId) {
        if(!currentUser) {
            toast("Лайк басу үшін кіріңіз!");
            return;
        }
        
        if(!likes[videoId]) likes[videoId] = [];
        let index = likes[videoId].indexOf(currentUser.id);
        
        if(index === -1) {
            likes[videoId].push(currentUser.id);
        } else {
            likes[videoId].splice(index, 1);
        }
        
        saveData();
        renderVideos();
    }
    
    // Подписка
    function subscribeTo(authorId) {
        if(!currentUser) {
            toast("Жазылу үшін кіріңіз!");
            return;
        }
        
        if(!subs[currentUser.id]) subs[currentUser.id] = [];
        let index = subs[currentUser.id].indexOf(authorId);
        
        if(index === -1) {
            subs[currentUser.id].push(authorId);
        } else {
            subs[currentUser.id].splice(index, 1);
        }
        
        saveData();
        renderVideos();
    }
    
    // Проверка лайка
    function isLiked(videoId) {
        if(!currentUser) return false;
        return likes[videoId] && likes[videoId].includes(currentUser.id);
    }
    
    // Проверка подписки
    function isSubscribed(authorId) {
        if(!currentUser) return false;
        return subs[currentUser.id] && subs[currentUser.id].includes(authorId);
    }
    
    // Просмотр видео
    function playVideo(video) {
        let player = document.getElementById('playerVideo');
        player.src = video.src;
        video.views++;
        saveData();
        renderVideos();
        document.getElementById('videoPlayer').style.display = 'flex';
    }
    
    function closePlayer() {
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('playerVideo').pause();
    }
    
    // Настройки
    function openSettings() {
        if(!currentUser) return;
        
        document.getElementById('settingsName').value = currentUser.name || '';
        document.getElementById('settingsAvatarUrl').value = currentUser.avatarUrl || '';
        
        let av = document.getElementById('settingsAvatar');
        if(currentUser.avatarUrl) {
            av.style.backgroundImage = `url(${currentUser.avatarUrl})`;
            av.style.backgroundSize = 'cover';
            av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.background = '#f5b042';
            av.innerText = currentUser.avatar || currentUser.login[0].toUpperCase();
        }
        
        openModal('settings');
    }
    
    function saveSettings() {
        let newName = document.getElementById('settingsName').value.trim();
        let newAvatar = document.getElementById('settingsAvatarUrl').value.trim();
        
        if(newName) currentUser.name = newName;
        if(newAvatar) {
            currentUser.avatarUrl = newAvatar;
        } else {
            delete currentUser.avatarUrl;
        }
        
        let index = users.findIndex(u => u.id === currentUser.id);
        if(index !== -1) users[index] = currentUser;
        saveData();
        updateUI();
        closeModal('settings');
        renderVideos();
        toast("Профиль жаңартылды!");
    }
    
    // Рендер видео
    function renderVideos() {
        let container = document.getElementById('videosContainer');
        
        if(videos.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:50px;">🎬 Бейнелер жоқ. Бірінші болып жүктеңіз!</div>';
            return;
        }
        
        let html = '<div class="videos-grid">';
        
        for(let i = videos.length - 1; i >= 0; i--) {
            let v = videos[i];
            let likeCount = likes[v.id] ? likes[v.id].length : 0;
            let liked = isLiked(v.id);
            let subscribed = isSubscribed(v.authorId);
            
            html += `
                <div class="video-card">
                    <div class="video-thumb" onclick="playVideo(${JSON.stringify(v).replace(/"/g, '&quot;')})">
                        <video src="${v.src}" style="width:100%;height:100%;object-fit:cover;"></video>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(v.title)}</div>
                        <div class="video-stats">
                            <span>👤 ${escapeHtml(v.authorName)}</span>
                            <span>❤️ ${likeCount}</span>
                            <span>👁️ ${v.views}</span>
                        </div>
                        <div class="video-actions">
                            <button class="${liked ? 'btn-primary' : 'btn-outline'}" onclick="likeVideo('${v.id}')">❤️ ${likeCount}</button>
                            <button class="${subscribed ? 'btn-primary' : 'btn-outline'}" onclick="subscribeTo('${v.authorId}')">${subscribed ? '✅ Жазылдыңыз' : '🔔 Жазылу'}</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        html += '</div>';
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // Модалки
    function openModal(type) {
        document.getElementById(type + 'Modal').style.display = 'flex';
    }
    
    function closeModal(type) {
        document.getElementById(type + 'Modal').style.display = 'none';
    }
    
    // Тосты
    function toast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    // Перевод (простой)
    let lang = 'kk';
    document.getElementById('langSelect').onchange = function() {
        lang = this.value;
        // просто обновляем текст (можно расширить)
    };
    
    // Закрытие модалок по клику вне
    window.onclick = function(e) {
        if(e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
        }
        if(e.target.classList.contains('video-player')) {
            closePlayer();
        }
    };
    
    // Инициализация
    loadData();
    updateUI();
    renderVideos();
</script>

<div class="footer">
    💙💛 QazaqTube — Видео хостинг. Барлық деректер браузерде сақталады.
</div>
</body>
</html>
