<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>QazaqTube — Көк-сары стриминг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0a2463 0%, #1e3a8a 100%);
            color: #f0f4ff;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        /* Кастом скролл */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a2463;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #f5b042;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffcc66;
        }

        /* Хедер — стекло + золото */
        .header {
            background: rgba(10, 36, 99, 0.85);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f5b042;
            position: sticky;
            top: 0;
            z-index: 200;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFB347, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .logo span {
            font-size: 1rem;
            font-weight: 500;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #FFD966;
            letter-spacing: 0;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .lang-select {
            background: #0f2b6e;
            border: 1px solid #f5b042;
            color: #FFE6B3;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .lang-select:hover {
            background: #f5b042;
            color: #0a2463;
            border-color: white;
        }

        .auth-buttons {
            display: flex;
            gap: 0.8rem;
        }

        .btn {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.25s ease;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: linear-gradient(95deg, #f5b042, #FFD966);
            color: #0a2463;
            box-shadow: 0 4px 12px rgba(245,176,66,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(245,176,66,0.5);
            background: linear-gradient(95deg, #ffbb4a, #ffe08c);
        }
        .btn-outline {
            background: rgba(255,255,240,0.1);
            border: 1.5px solid #f5b042;
            color: #FFE6B3;
            backdrop-filter: blur(4px);
        }
        .btn-outline:hover {
            background: #f5b042;
            color: #0a2463;
            border-color: white;
            transform: scale(1.02);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,200,0.08);
            padding: 0.3rem 1rem 0.3rem 0.8rem;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #FFD966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #0a2463;
            box-shadow: 0 0 0 2px #ffdd99;
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Панель загрузки — неон-желтый акцент */
        .upload-panel {
            background: rgba(15, 43, 110, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.8rem;
            margin-bottom: 2.5rem;
            border: 1px solid #f5b042;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .upload-panel h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: #FFE6B3;
            border-left: 5px solid #f5b042;
            padding-left: 1rem;
        }
        .upload-form input, .upload-form textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            margin-bottom: 1rem;
            background: #0a2463cc;
            border: 1px solid #3b5baa;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        .upload-form input:focus, .upload-form textarea:focus {
            outline: none;
            border-color: #f5b042;
            box-shadow: 0 0 0 3px rgba(245,176,66,0.3);
        }
        .upload-form textarea {
            border-radius: 24px;
            min-height: 90px;
            resize: vertical;
        }

        /* Сетка видео — карточки с блеском */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .video-card {
            background: rgba(6, 28, 78, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(245,176,66,0.4);
            box-shadow: 0 12px 25px -12px black;
        }
        .video-card:hover {
            transform: translateY(-8px);
            border-color: #f5b042;
            box-shadow: 0 25px 35px -12px #f5b04240;
            background: rgba(10, 45, 100, 0.85);
        }

        .video-thumb {
            width: 100%;
            height: 190px;
            background: radial-gradient(circle at 30% 20%, #1f489b, #071c47);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.2s;
        }
        .video-thumb::after {
            content: "🎬";
            font-size: 3.8rem;
            opacity: 0.8;
            text-shadow: 0 4px 12px #f5b042;
            transition: 0.2s;
        }
        .video-card:hover .video-thumb::after {
            transform: scale(1.05);
            opacity: 1;
        }

        .video-info {
            padding: 1.3rem;
        }
        .video-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 0.6rem;
            color: #FFFAF0;
            line-height: 1.3;
        }
        .video-stats {
            font-size: 0.8rem;
            color: #bbd4ff;
            display: flex;
            gap: 1rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        /* Кнопки лайк / подписка */
        .video-actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .like-btn, .subscribe-btn {
            background: rgba(255, 255, 210, 0.08);
            backdrop-filter: blur(4px);
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            color: #f0f4ff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .like-btn.liked {
            background: #f5b042;
            color: #0a2463;
            box-shadow: 0 0 6px #ffcc66;
        }
        .subscribe-btn.subscribed {
            background: #FFD966;
            color: #0a2463;
        }
        .like-btn:hover, .subscribe-btn:hover {
            background: #f5b042cc;
            color: #0a2463;
            transform: scale(0.96);
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(15, 43, 110, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            margin-top: 2rem;
            border: 1px dashed #f5b042;
        }
        .empty-state h3 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.8rem;
        }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 12, 35, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #0a1b44;
            border-radius: 40px;
            padding: 2rem;
            width: 90%;
            max-width: 460px;
            border: 2px solid #f5b042;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
        }
        .modal-content h2 {
            font-size: 1.9rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(120deg, #FFE6B3, #f5b042);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 60px;
            border: 1px solid #3b5baa;
            background: #061b44;
            color: white;
            font-size: 1rem;
        }
        .close-modal {
            margin-top: 1rem;
            background: #2a4180;
            color: white;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: #FFE6B3aa;
            font-size: 0.85rem;
            border-top: 1px solid #f5b04233;
            margin-top: 2rem;
        }

        @media (max-width: 680px) {
            .header { flex-direction: column; text-align: center; }
            .container { padding: 1rem; }
            .logo { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">QAZAQ TUBE <span>💙💛 10x kúsh</span></div>
    <div class="controls">
        <select id="languageSelect" class="lang-select" onchange="changeLanguage()">
            <option value="kk">Қазақша</option>
            <option value="ru">Русский</option>
        </select>
        <div class="auth-buttons" id="authButtons">
            <button class="btn btn-outline" id="loginBtn" onclick="openModal('loginModal')">Kіru</button>
            <button class="btn btn-primary" id="registerBtn" onclick="openModal('registerModal')">Tirkeлу</button>
        </div>
        <div class="user-info" id="userInfo" style="display: none;">
            <span id="userNameDisplay"></span>
            <div class="avatar" id="userAvatar"></div>
            <button class="btn btn-outline" id="logoutBtn" onclick="logout()" style="padding: 0.3rem 1rem;">Shyǵu</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="uploadPanel" class="upload-panel" style="display: none;">
        <h3 id="uploadTitle">📤 Jańa beıne jukteý</h3>
        <div class="upload-form">
            <input type="text" id="videoTitle" placeholder="Beıne ataýy">
            <textarea id="videoDesc" placeholder="Sıpattama"></textarea>
            <button class="btn btn-primary" id="uploadBtn" onclick="uploadVideo()">➕ Beıne qosý</button>
        </div>
    </div>

    <div id="videosContainer">
        <div class="empty-state">
            <h3 id="emptyTitle">📭 Ázirge beıne joq</h3>
            <p id="emptyText">Munda paıdalanýshylardyń beıneleri paıda bolady. Birinshi bolý!</p>
        </div>
    </div>
</div>

<!-- Register Modal -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2 id="regTitle">📝 Tirkeý</h2>
        <div class="input-group"><input type="text" id="regUsername" placeholder="Qoldanýshy aty"></div>
        <div class="input-group"><input type="email" id="regEmail" placeholder="Elektrondyq poshta"></div>
        <div class="input-group"><input type="password" id="regPassword" placeholder="Qúpıa sóz"></div>
        <button class="btn btn-primary" id="regSubmitBtn" onclick="register()">Tirkeý</button>
        <button class="btn close-modal" onclick="closeModal('registerModal')">Jabu</button>
    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 id="loginTitle">🔐 Kіru</h2>
        <div class="input-group"><input type="text" id="loginUsername" placeholder="Qoldanýshy aty"></div>
        <div class="input-group"><input type="password" id="loginPassword" placeholder="Qúpıa sóz"></div>
        <button class="btn btn-primary" id="loginSubmitBtn" onclick="login()">Kіru</button>
        <button class="btn close-modal" onclick="closeModal('loginModal')">Jabu</button>
    </div>
</div>

<script>
    // ========== TILDER ==========
    const translations = {
        kk: {
            appName: "QazaqTube",
            login: "Kіru",
            register: "Tirkeлу",
            logout: "Shyǵu",
            uploadTitle: "📤 Jańa beıne jukteý",
            uploadBtn: "➕ Beıne qosý",
            videoTitlePlaceholder: "Beıne ataýy",
            videoDescPlaceholder: "Sıpattama",
            emptyTitle: "📭 Ázirge beıne joq",
            emptyText: "Munda paıdalanýshylardyń beıneleri paıda bolady. Birinshi bolý!",
            regTitle: "📝 Tirkeý",
            regUsernamePlace: "Qoldanýshy aty",
            regEmailPlace: "Elektrondyq poshta",
            regPasswordPlace: "Qúpıa sóz",
            regSubmit: "Tirkeý",
            close: "Jabu",
            loginTitle: "🔐 Kіru",
            loginUsernamePlace: "Qoldanýshy aty",
            loginPasswordPlace: "Qúpıa sóz",
            loginSubmit: "Kіru",
            authRequired: "Aldymen kirińiz!",
            fillAll: "Barlyq órіsterdi tolturyńyz!",
            userExists: "Qoldanýshy bar!",
            regSuccess: "Tirkeý sátti! Endi kirińiz.",
            wrongCreds: "Qate aty nemese qúpıa sóz",
            needLoginLike: "Laık basý úshin kirińiz",
            needLoginSub: "Jazylý úshin kirińiz",
            videoAdded: "Beıne qosyldy!",
            enterTitle: "Beıne ataýyn engizińiz",
            likes: "laık",
            views: "kórsetilim",
            subscribe: "🔔 Jazylý",
            subscribed: "✅ Jazyldyńyz",
            unsubscribe: "Basy tartý",
            footer: "💙💛 QazaqTube — óz videohostingińiz. Derekter jergilikti saqtalady."
        },
        ru: {
            appName: "QazaqTube",
            login: "Вход",
            register: "Регистрация",
            logout: "Выйти",
            uploadTitle: "📤 Загрузить новое видео",
            uploadBtn: "➕ Добавить видео",
            videoTitlePlaceholder: "Название видео",
            videoDescPlaceholder: "Описание",
            emptyTitle: "📭 Пока нет видео",
            emptyText: "Здесь будут видео пользователей. Будьте первым!",
            regTitle: "📝 Регистрация",
            regUsernamePlace: "Имя пользователя",
            regEmailPlace: "Email",
            regPasswordPlace: "Пароль",
            regSubmit: "Зарегистрироваться",
            close: "Закрыть",
            loginTitle: "🔐 Вход",
            loginUsernamePlace: "Имя пользователя",
            loginPasswordPlace: "Пароль",
            loginSubmit: "Войти",
            authRequired: "Сначала войдите!",
            fillAll: "Заполните все поля!",
            userExists: "Пользователь уже существует!",
            regSuccess: "Регистрация успешна! Теперь войдите.",
            wrongCreds: "Неверное имя или пароль",
            needLoginLike: "Войдите чтобы поставить лайк",
            needLoginSub: "Войдите чтобы подписаться",
            videoAdded: "Видео добавлено!",
            enterTitle: "Введите название видео",
            likes: "лайков",
            views: "просмотров",
            subscribe: "🔔 Подписаться",
            subscribed: "✅ Вы подписаны",
            unsubscribe: "Отписаться",
            footer: "💙💛 QazaqTube — ваш видеохостинг. Все данные локально."
        }
    };

    let currentLang = "kk";

    function changeLanguage() {
        const select = document.getElementById("languageSelect");
        currentLang = select.value;
        applyLanguage();
        renderAllVideos();
    }

    function applyLanguage() {
        const t = translations[currentLang];
        if(!t) return;
        document.title = t.appName;
        document.getElementById("loginBtn") && (document.getElementById("loginBtn").innerText = t.login);
        document.getElementById("registerBtn") && (document.getElementById("registerBtn").innerText = t.register);
        if(document.getElementById("logoutBtn")) document.getElementById("logoutBtn").innerText = t.logout;
        const upTitle = document.getElementById("uploadTitle");
        if(upTitle) upTitle.innerText = t.uploadTitle;
        const upBtn = document.getElementById("uploadBtn");
        if(upBtn) upBtn.innerText = t.uploadBtn;
        const titleInp = document.getElementById("videoTitle");
        if(titleInp) titleInp.placeholder = t.videoTitlePlaceholder;
        const descInp = document.getElementById("videoDesc");
        if(descInp) descInp.placeholder = t.videoDescPlaceholder;
        const emptyH = document.getElementById("emptyTitle");
        if(emptyH) emptyH.innerText = t.emptyTitle;
        const emptyP = document.getElementById("emptyText");
        if(emptyP) emptyP.innerText = t.emptyText;
        const regH = document.querySelector("#registerModal h2");
        if(regH) regH.innerText = t.regTitle;
        document.getElementById("regUsername") && (document.getElementById("regUsername").placeholder = t.regUsernamePlace);
        document.getElementById("regEmail") && (document.getElementById("regEmail").placeholder = t.regEmailPlace);
        document.getElementById("regPassword") && (document.getElementById("regPassword").placeholder = t.regPasswordPlace);
        const regSub = document.getElementById("regSubmitBtn");
        if(regSub) regSub.innerText = t.regSubmit;
        document.querySelectorAll(".close-modal").forEach(btn => btn.innerText = t.close);
        const loginH = document.querySelector("#loginModal h2");
        if(loginH) loginH.innerText = t.loginTitle;
        const logUser = document.getElementById("loginUsername");
        if(logUser) logUser.placeholder = t.loginUsernamePlace;
        const logPass = document.getElementById("loginPassword");
        if(logPass) logPass.placeholder = t.loginPasswordPlace;
        const logSub = document.getElementById("loginSubmitBtn");
        if(logSub) logSub.innerText = t.loginSubmit;
        const footerDiv = document.querySelector(".footer");
        if(footerDiv) footerDiv.innerHTML = t.footer + "<br style='margin:6px'> 🌐 Жұмыс істейді: GitHub Pages, Netlify, Vercel";
    }

    // ========== Деректер ==========
    let users = JSON.parse(localStorage.getItem('qaz_users_blue')) || [];
    let videos = JSON.parse(localStorage.getItem('qaz_videos_blue')) || [];
    let subscriptions = JSON.parse(localStorage.getItem('qaz_subs_blue')) || {};
    let likes = JSON.parse(localStorage.getItem('qaz_likes_blue')) || {};
    let currentUser = null;

    function saveAll() {
        localStorage.setItem('qaz_users_blue', JSON.stringify(users));
        localStorage.setItem('qaz_videos_blue', JSON.stringify(videos));
        localStorage.setItem('qaz_subs_blue', JSON.stringify(subscriptions));
        localStorage.setItem('qaz_likes_blue', JSON.stringify(likes));
    }

    function loadSession() {
        const saved = localStorage.getItem('qaz_current_user_blue');
        if(saved) {
            const user = JSON.parse(saved);
            const exists = users.find(u => u.id === user.id);
            if(exists) { currentUser = exists; updateUIForAuth(); }
            else localStorage.removeItem('qaz_current_user_blue');
        }
        renderAllVideos();
    }

    function updateUIForAuth() {
        if(currentUser) {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userNameDisplay').innerText = currentUser.username;
            document.getElementById('userAvatar').innerText = currentUser.username[0].toUpperCase();
            document.getElementById('uploadPanel').style.display = 'block';
        } else {
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('uploadPanel').style.display = 'none';
        }
    }

    function register() {
        const t = translations[currentLang];
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if(!username || !email || !password) { alert(t.fillAll); return; }
        if(users.find(u => u.username === username)) { alert(t.userExists); return; }
        const newUser = { id: Date.now()+Math.random(), username, email, password, createdAt: new Date().toISOString() };
        users.push(newUser); saveAll();
        alert(t.regSuccess);
        closeModal('registerModal');
        document.getElementById('regUsername').value = ''; document.getElementById('regEmail').value = ''; document.getElementById('regPassword').value = '';
        openModal('loginModal');
    }

    function login() {
        const t = translations[currentLang];
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const user = users.find(u => u.username === username && u.password === password);
        if(!user) { alert(t.wrongCreds); return; }
        currentUser = user;
        localStorage.setItem('qaz_current_user_blue', JSON.stringify(user));
        updateUIForAuth(); closeModal('loginModal');
        renderAllVideos();
        document.getElementById('loginUsername').value = ''; document.getElementById('loginPassword').value = '';
    }

    function logout() { currentUser = null; localStorage.removeItem('qaz_current_user_blue'); updateUIForAuth(); renderAllVideos(); }
    function uploadVideo() {
        const t = translations[currentLang];
        if(!currentUser) { alert(t.authRequired); return; }
        const title = document.getElementById('videoTitle').value.trim();
        const desc = document.getElementById('videoDesc').value.trim();
        if(!title) { alert(t.enterTitle); return; }
        const newVideo = { id: Date.now()+Math.random(), title, description: desc || (currentLang==="kk"?"Sıpattama joq":"Без описания"), authorId: currentUser.id, authorName: currentUser.username, createdAt: new Date().toISOString(), views:0 };
        videos.push(newVideo); saveAll();
        document.getElementById('videoTitle').value = ''; document.getElementById('videoDesc').value = '';
        renderAllVideos(); alert(t.videoAdded);
    }
    function toggleLike(vidId) { const t=translations[currentLang]; if(!currentUser){alert(t.needLoginLike); return;} if(!likes[vidId]) likes[vidId]=[]; const idx=likes[vidId].indexOf(currentUser.id); idx===-1? likes[vidId].push(currentUser.id): likes[vidId].splice(idx,1); saveAll(); renderAllVideos(); }
    function toggleSubscribe(chId) { const t=translations[currentLang]; if(!currentUser){alert(t.needLoginSub); return false;} if(!subscriptions[currentUser.id]) subscriptions[currentUser.id]=[]; const arr=subscriptions[currentUser.id]; const idx=arr.indexOf(chId); idx===-1? arr.push(chId): arr.splice(idx,1); saveAll(); renderAllVideos(); return true; }
    function isSubscribedTo(chId){ if(!currentUser) return false; return (subscriptions[currentUser.id]||[]).includes(chId); }
    function isLiked(vidId){ if(!currentUser) return false; return likes[vidId] && likes[vidId].includes(currentUser.id); }
    function getLikeCount(vidId){ return likes[vidId] ? likes[vidId].length : 0; }

    function renderAllVideos() {
        const container = document.getElementById('videosContainer');
        const t = translations[currentLang];
        if(!videos.length) { container.innerHTML = `<div class="empty-state"><h3>${t.emptyTitle}</h3><p>${t.emptyText}</p></div>`; return; }
        const sorted = [...videos].reverse();
        let html = `<div class="videos-grid">`;
        for(let v of sorted) {
            const liked = isLiked(v.id);
            const subbed = isSubscribedTo(v.authorId);
            let subText = subbed ? (currentLang==="kk"?"✅ Jazyldyńyz":"✅ Отписаться") : (currentLang==="kk"?"🔔 Jazylý":"🔔 Подписаться");
            html += `
            <div class="video-card">
                <div class="video-thumb"></div>
                <div class="video-info">
                    <div class="video-title">${escapeHtml(v.title)}</div>
                    <div class="video-stats"><span>👤 ${escapeHtml(v.authorName)}</span><span>❤️ ${getLikeCount(v.id)} ${t.likes}</span><span>👁️ ${v.views} ${t.views}</span></div>
                    <div class="video-actions">
                        <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${v.id}')">❤️ ${getLikeCount(v.id)}</button>
                        <button class="subscribe-btn ${subbed ? 'subscribed' : ''}" onclick="toggleSubscribe('${v.authorId}')">${subText}</button>
                    </div>
                    <div style="font-size:0.7rem; margin-top:0.6rem; color:#FFD966;">📅 ${new Date(v.createdAt).toLocaleDateString()}</div>
                </div>
            </div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
    }

    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function openModal(id){ document.getElementById(id).classList.add('active'); }
    function closeModal(id){ document.getElementById(id).classList.remove('active'); }
    window.onclick = e => { if(e.target.classList.contains('modal')) e.target.classList.remove('active'); };

    loadSession();
    applyLanguage();
    document.getElementById("languageSelect").value = currentLang;
</script>
<div class="footer"></div>
</body>
</html>
